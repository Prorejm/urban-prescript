      { t: '你在第二十区看到了色彩回收装置的运作。整个区域的颜色被抽走，只剩下灰白。然后有人付钱恢复了色彩。', e: { wea: -1, int: 1 }, cond: () => bp === 'S20' && chance(0.7) },
      { t: '一个异端审判官（N公司锤部门）从你面前经过。他的义体散发着不祥的红光，手中握着巨大的"锤"。', e: { wil: 1 }, cond: () => age >= 20 && chance(0.2) },
      { t: '你在后巷深宵前找到了一个安全的藏身处。3:13的钟声即将敲响，你听到远处传来清道夫的声响。你活了下来。', e: { wil: 2 }, cond: () => age >= 10 && chance(0.3) },
    );

    const spec = pick(specPool.filter(s => s.cond()));
    if (spec) {
      addEvent({ text: spec.t, effect: 'special_event', effText: '特殊事件', major: true, milestone: null });
      for (const [k, v] of Object.entries(spec.e)) modAttr(k, v);
    }
  }

  // ========== 一般事件（概率 40%，大量填充） ==========
  if (chance(0.06)) {
    const generalPool = [];

    // 通用一般事件（全年龄段）
    generalPool.push(
      { t: '你在街角的自动售货机买到了最后一罐饮料。那是你喜欢的口味。在这个城市里，这种小小的幸运足以让你微笑一整天。', e: { wil: 1 }, cond: () => true },
      { t: '下雨。都市很少下雨，但当雨水冲刷过后巷的街道时，空气中会有一种奇怪的清冽感。你站在窗前，看了很久。', e: { wil: 1 }, cond: () => true },
      { t: '你帮一个陌生人搬了重物。对方道谢后匆匆离去。你不知道他的名字，但那种「被需要」的感觉让你心情变好了。', e: { wil: 1 }, cond: () => true },
      { t: '你在便利店排队时，前面的人少找了收银员一枚眼。你指出了错误。那个人瞪了你一眼，但收银员对你笑了笑。', e: { wil: 1 }, cond: () => true },
      { t: '你的鞋磨破了底。你在后巷的修鞋摊上花了三枚眼修好它。修鞋匠是个沉默的老人，但他修的鞋比新的还耐穿。', e: { wea: -1, wil: 1 }, cond: () => true },
      { t: '你捡到了一只流浪猫。它很瘦，很脏，但眼睛很亮。你喂了它一块合成肉，它蹭了蹭你的腿，然后消失在废墟中。', e: { wil: 1 }, cond: () => true },
      { t: '你今天没有遇到任何危险。没有清道夫，没有帮派，没有扭曲者。在都市里，「无事发生」本身就是最好的消息。', e: { wil: 1 }, cond: () => true },
      { t: '你在旧货市场淘到了一本旧书。书页泛黄，散发着霉味，但里面的故事让你暂时忘记了都市的压抑。', e: { int: 1 }, cond: () => true },
      { t: '今天食堂的饭菜意外地好吃。你多要了一份，虽然那意味着明天的预算会更紧。', e: { con: 1, wea: -1 }, cond: () => true },
      { t: '你路过了一个街头艺人的表演。他拉小提琴的样子很专注，仿佛周围的一切都不存在。你丢了一枚眼在他的琴盒里。', e: { wil: 1, wea: -1 }, cond: () => true },
      { t: '你的邻居送了你一碟自己做的食物。味道很怪，但你吃完了。在都市里，这种邻里之间的信任比黄金还珍贵。', e: { wil: 1, con: 1 }, cond: () => true },
      { t: '你在后巷的墙上看到了一幅新的涂鸦。画的是一个笑脸，下面写着：「今天也要活下去。」你对着那个笑脸点了点头。', e: { wil: 1 }, cond: () => true },
      { t: '你今天比平时多走了三千步。你的腿很酸，但你知道，能走路本身就是一种幸福——尤其是在这个都市里。', e: { con: 1 }, cond: () => true },
      { t: '你听到了一个笑话。很烂的笑话，但你笑出了声。在都市里，笑声是稀缺资源。', e: { wil: 1 }, cond: () => true },
      { t: '你在垃圾堆里发现了一个还能用的杯子。洗干净后，它成了你最喜欢的杯子。你给它起名叫「幸存者」。', e: { wil: 1 }, cond: () => true },
      { t: '今天的阳光穿透了烟雾，照在了你的脸上。虽然只有短短几分钟，但你闭上眼睛，享受了那片刻的温暖。', e: { wil: 1 }, cond: () => true },
      { t: '你在网上看到了一张郊区的照片。照片里有一片绿色的草地，和一只白色的兔子。你把它设为了手机壁纸。', e: { wil: 1 }, cond: () => true },
      { t: '你今天早早地睡了。没有噩梦，没有枪声，没有清道夫的嗡嗡声。一觉到天亮。', e: { con: 1, wil: 1 }, cond: () => true },
      { t: '你在洗衣房里等衣服时，和一个陌生人聊了半小时。你们交换了名字，然后各自离去。你们都知道，不会再见面了。', e: { wil: 1 }, cond: () => true },
      { t: '你找到了一首老歌。旋律很舒缓，让你想起了某个你已经忘记的人。你单曲循环了一整晚。', e: { wil: 1 }, cond: () => true },
    );

    // 负面一般事件
    generalPool.push(
      { t: '你今天被上司骂了。原因是你没有在他开口之前猜到他要说什么。你低头道歉，心里想着今晚吃什么。', e: { wil: -1 }, cond: () => true },
      { t: '你买到过期食品，吃坏了肚子。黑市药店卖的止泻药价格是正常药的三倍。你买了，因为你别无选择。', e: { con: -1, wea: -1 }, cond: () => true },
      { t: '你的住所停水了整整一天。你用储备水勉强洗漱，但那种黏腻感让你整晚都睡不着。', e: { wil: -1 }, cond: () => true },
      { t: '你在街上被人撞了一下，口袋里的眼少了几枚。你回头时，那人已经消失在人群中了。', e: { wea: -1 }, cond: () => true },
      { t: '你今天偏头痛发作。你没有钱去买K公司的特效药，只能用冷水敷额头，等到疼痛自己消退。', e: { con: -1 }, cond: () => true },
      { t: '你的邻居在深宵中大声争吵。你塞着耳朵试图入睡，但那种噪音像针一样刺进你的大脑。', e: { wil: -1 }, cond: () => true },
      { t: '你在公交车上被扒手光顾了。幸运的是，你今天刚好没带钱包。扒手瞪了你一眼，仿佛那是你的错。', e: { wil: -1 }, cond: () => true },
      { t: '你今天踩到了一滩不明液体。味道很难闻，你花了半小时清理鞋子，但那种气味似乎渗进了皮肤里。', e: { wil: -1 }, cond: () => true },
      { t: '你收到了一张罚单，理由是「在不应该呼吸的地方呼吸了」。罚单金额不高，但你感到某种无名的愤怒。', e: { wea: -1, wil: -1 }, cond: () => true },
      { t: '你今天的工作出了差错。不是什么大问题，但你的同事把责任推给了你。你承担了，因为辩解需要花费更多精力。', e: { wil: -1 }, cond: () => true },
    );

    // 巢/后巷差异
    if (bp.includes('nest')) {
      generalPool.push(
        { t: '巢的电梯又坏了。你爬了十二层楼，气喘吁吁地到达公司。上司看了你一眼，说：「下次早点出门。」', e: { con: 1, wil: -1 }, cond: () => true },
        { t: '你在巢的公园里看到了一株真正的植物。不是合成的，而是真正的、有根的、会开花的植物。你站在那里看了很久，直到保安来赶你走。', e: { wil: 2 }, cond: () => true },
        { t: '巢的空气净化系统发出了一种奇怪的声音，像是某种生物的呼吸。维修人员说是「正常现象」，但你开始怀疑。', e: { int: 1, wil: -1 }, cond: () => true },
        { t: '你在巢的商场里参加了抽奖活动。没有中奖，但店员给了你一个小挂件作为安慰奖。你把它挂在了钥匙上。', e: { wil: 1 }, cond: () => true },
        { t: '你今天在巢的街道上看到了一只真正的鸽子。不是机械仿生的，而是真正的、会拉屎的鸽子。你喂了它一点面包屑。', e: { wil: 1 }, cond: () => true },
      );
    } else {
      generalPool.push(
        { t: '后巷的地面又塌陷了一块。你绕路走了二十分钟，但你知道，那条捷径已经永远消失了。', e: { con: 1 }, cond: () => true },
        { t: '你今天在后巷的垃圾堆里淘到了一件还能穿的夹克。虽然上面有几个弹孔，但款式还不错。你补了补，穿上了它。', e: { wea: 1, wil: 1 }, cond: () => true },
        { t: '后巷的广播里播放了一条消息：「今日深宵清扫范围扩大，请居民提前避险。」你检查了自己的应急物资，又补了一些水。', e: { wil: 1 }, cond: () => true },
        { t: '你在后巷的墙角看到了一只老鼠。它不怕人，只是看着你。你丢给它一块面包，它叼着面包钻进了墙缝。', e: { wil: 1 }, cond: () => true },
        { t: '后巷的某个帮派换了老大。新老大上任的第一件事是「减税」——保护费从每月二十枚眼降到了十五枚。你感到短暂的欣慰。', e: { wea: 1 }, cond: () => true },
      );
    }

    // 季节/天气类
    generalPool.push(
      { t: '今天格外冷。你把所有的衣服都穿上了，还是忍不住发抖。后巷的冬天没有暖气，只有一层又一层的破布。', e: { con: -1 }, cond: () => true },
      { t: '今天格外热。汗水浸透了你的衣服，后巷的空气中弥漫着腐烂和汗水混合的味道。你喝了很多水，但还是口渴。', e: { con: -1 }, cond: () => true },
      { t: '雾很大。你几乎看不到五米以外的东西。这种天气在都市里很危险，因为你看不到危险，危险也看不到你——但愿如此。', e: { wil: -1 }, cond: () => true },
      { t: '风很大。后巷的破招牌在风中吱嘎作响，像是一群垂死的人在呻吟。你把窗户关紧了。', e: { wil: -1 }, cond: () => true },
    );

    // 新一般事件
    generalPool.push(
      { t: '你在街头看到一家新开的工坊。招牌上写着"琅琊工坊——拳套与短刀"。你走进去看了看，但没有买任何东西。', e: { wil: 1 }, cond: () => true },
      { t: '一个Девять协会的送货员骑着摩托车从你身边飞驰而过。他的派送箱在颠簸中发出奇怪的电子音。', e: { int: 1 }, cond: () => true },
      { t: '你在第十区的赌场外看到一个人哭喊着被拖走。"愿力输光了……"他喃喃自语。你摸了摸自己的口袋。', e: { wil: 1 }, cond: () => true },
      { t: 'K公司的推销员向你推销再生安瓿。"试试这个，包治百病！"他的笑容过于灿烂，让你有些不安。', e: { con: 1 }, cond: () => true },
      { t: '你在后巷发现了一家卖血棒的小店。店主是个看起来疲惫的血魔。"来一根？"他问。你摇了摇头。', e: { wil: -1 }, cond: () => true },
      { t: 'WARP列车的广告在街头闪烁。"跨越空间，只需一瞬。"你想起了那些关于折叠空间的恐怖故事。', e: { int: 1 }, cond: () => true },
      { t: '一个R公司的退役士兵坐在街角喝酒。他的义肢在月光下泛着冷光。"战场……不是人待的地方。"', e: { wil: 1 }, cond: () => true },
      { t: '你在第十三区看到月面骑士团巡逻。他们的盔甲在月光下闪闪发亮，像是在守护什么珍贵的东西。', e: { wil: 1 }, cond: () => true },
      { t: '一个Dieci协会的学者在废墟边缘采集样本。"这里面蕴含着都市的秘密……"他兴奋地说，完全没有注意到身后的危险。', e: { int: 1 }, cond: () => true },
      { t: 'T公司的色彩回收装置正在运作。你看到一个人的色彩被抽走，变得灰白。然后他掏出一笔钱，恢复了颜色。', e: { int: 1, wil: -1 }, cond: () => true },
      { t: '你在X区的魔窟入口外看到了招聘广告。"高薪诚聘矿工，无需经验，风险自负。"', e: { con: 1 }, cond: () => true },
      { t: '一个S公司的推奴人从你身边走过。他身上的烙印器具在阳光下反射着刺眼的光。你屏住了呼吸。', e: { wil: -1 }, cond: () => true },
      { t: '你在后巷的近岸湖域闻到了熟悉的臭味。一只废料蟹从水面探出头来，又迅速沉了下去。', e: { wil: 1 }, cond: () => true },
      { t: 'N公司的自杀自动售货机引起了你的注意。投币后可以选择"遗忘"或"死亡"。你加快了脚步。', e: { wil: -1 }, cond: () => true },
      { t: 'P公司的完全保护装置让第十六区的建筑坚不可摧。你抬头看着那些极高的建筑，感到一阵眩晕。', e: { wil: 1 }, cond: () => true },
      { t: '一个齿轮教团的成员在街头宣传机械飞升的好处。他的半边脸已经是金属了。"加入我们，抛弃软弱！"', e: { int: 1 }, cond: () => true },
      { t: '你在黑市上看到一块月长石正在拍卖。起拍价高得离谱，但竞价者依然络绎不绝。', e: { wea: -1 }, cond: () => true },
      { t: 'Hana协会的色彩评定员路过你身边时停顿了一下。他看了你一眼，摇了摇头，然后走开了。', e: { wil: -1 }, cond: () => true },
      { t: '一个Q公司的符咒师向你推销护身符。"这个可以让你的武器附带火焰效果！只要一百眼！"', e: { int: 1 }, cond: () => true },
      { t: 'J公司的锁匠在街头表演。他用一把钥匙锁住了风，然后解开了它。围观者发出惊叹。', e: { int: 1 }, cond: () => true },
    );

    const gen = pick(generalPool.filter(g => g.cond()));
    if (gen) {
      addEvent({ text: gen.t, effect: 'general_event', effText: '一般事件', major: false, milestone: null });
      for (const [k, v] of Object.entries(gen.e)) modAttr(k, v);
    }
  }
}

// ============================================================
// 奇点科技事件系统（Singularity Events）
// WARP列车故障、各翼公司奇点、清道夫、工坊事故等
// ============================================================
function runSingularityEvents(age, a, f, bp, tags) {
  if (age < 5) return; // 幼儿期不触发

  // ========== WARP 列车事件（W公司奇点） ==========
  if (chance(0.05) || (bp === 'w_nest' && chance(0.1))) {
    const warpEvents = [
      {
        t: '你乘坐的WARP列车突然剧烈震动。窗外的景色开始扭曲，空间像被揉皱的纸张。广播里传来乘务员的声音：「各位乘客请注意，本次列车正在进行空间校正，请勿恐慌。」——但所有人的脸都白了。',
        e: { wil: -1, int: 1 },
        ms: 'WARP空间校正',
        cond: () => age >= 10
      },
      {
        t: 'WARP列车的车门在行驶中意外打开。你看到了门外——不是隧道，而是一片虚无。某种东西正从虚无中凝视着你。乘务员冲过来关上了门，但你的手已经伸出去了一半。你感到手指一阵刺痛，收回手时，指节似乎比以前长了一点。',
        e: { con: 1, wil: -2 },
        ms: 'WARP空间泄漏',
        cond: () => age >= 10
      },
      {
        t: '你乘坐的WARP列车到达了错误的车站。站台上的指示牌写着你不认识的名字。乘客们惊慌失措，但乘务员面不改色：「W公司对此次偏差深表歉意。请各位耐心等待，列车将在……不确定时间内返回。」你被困在了一个不属于任何地图的地方。',
        e: { int: 2, wil: -1 },
        ms: 'WARP空间偏差',
        cond: () => age >= 15
      },
      {
        t: 'WARP列车上发生了劫持事件。三个蒙面人声称掌握了「空间炸弹」，要求W公司释放某些政治犯。列车内的空间开始不稳定，墙壁像呼吸一样起伏。你必须在车厢被折叠成二维之前做出选择。',
        e: { con: 1, wil: 2 },
        ms: 'WARP列车劫持',
        cond: () => age >= 18 && (a.con + a.wil) >= 10
      },
      {
        t: 'WARP列车正常运行中，但窗外的景象让你不安——你看到了自己。在空间撕裂的扭曲中，另一个「你」站在裂开的月台上，正好奇地向这边张望。你们的目光穿过空间的裂缝交汇了。列车加速，那个身影消失在撕裂的空间中。',
        e: { int: 2, wil: 1 },
        ms: 'WARP折叠观测',
        cond: () => age >= 16
      },
      {
        t: 'WARP列车上的乘务员递给你一份免责声明：「亲爱的乘客，本次列车将于途经H巷的空间撕裂密集区域，部分乘客可能会因空间撕裂产生视觉错觉。W公司不对任何因此产生的心理创伤负责。」话音刚落，你注意到对面座位上的老人在空间的扭曲中看起来像一个孩子——那只是撕裂空间造成的错觉。',
        e: { int: 2, wil: -1 },
        ms: 'WARP褶皱错觉',
        cond: () => age >= 20
      },
      {
        t: 'WARP列车在运行中突然完全静止。窗外不再是空间隧道，而是——你自己的一生。像电影一样快进播放。你看到了出生、童年、那些你已经忘记的面孔。当画面到达现在时，列车恢复了运行。广播说这是「正常的空间映照现象」。',
        e: { wil: 3, int: 1 },
        ms: 'WARP人生映照',
        cond: () => age >= 30
      },
      {
        t: '你在WARP列车上遇到了一个神情慌张的常客。他说自己曾多次乘坐这趟列车，对空间撕裂的不稳定区域有所了解。他预测列车将在三分钟后经过一段危险的撕裂区域，建议你躲进三号车厢的维修通道。你选择相信他。三分钟后，列车确实剧烈震荡，空间像被撕裂的布匹一样抖动，但你按照他的指示行动，毫发无伤。',
        e: { wil: 2, con: 1 },
        ms: 'WARP褶皱预警',
        cond: () => age >= 20

// 运行L公司事件链系统
function runLobotomyChain(age) {
  if (!gameState.alive || gameState.dead) return;

  // 检查是否已进入脑叶公司路线
  if (!getFlag('joinedLCompany')) return;

  // 检查是否已经完成光之种
  if (getFlag('lightSeedLaunched')) {
    // 光之种发射后的世界线
    runPostLightSeed(age);
    return;
  }

  // 获取当前Sephirah进度
  const currentStage = getFlag('sephirahStage') || 0;

  // 尝试推进Sephirah事件链
  for (let i = 0; i < SEPHIRAH_CHAIN.length; i++) {
    const chain = SEPHIRAH_CHAIN[i];
    const flagKey = 'sephirah_' + chain.id;

    // 如果已开始但未完成
    if (getFlag(flagKey + '_started') && !getFlag(flagKey + '_done')) {
      const progress = getFlag(flagKey + '_progress') || 0;
      if (progress < chain.eventTexts.length - 1 && chance(0.35)) {
        // 推进一个事件
        const evtText = chain.eventTexts[progress];
        let finalText = evtText;
        // 如果文本包含{abno}或{work}，替换为随机异想体
        if (typeof evtText === 'object' && evtText.text) {
          finalText = evtText.text;
        }
        if (finalText.includes('{abno}')) {
          const abno = pick(ABNORMALITIES.filter(a => a.level === chain.level || a.level === 'HE'));
          finalText = finalText.replace('{abno}', abno ? abno.name : '一个未知的异想体');
        }
        if (finalText.includes('{work}')) {
          const wt = pick(Object.keys(WORK_TYPES));
          finalText = finalText.replace('{work}', wt);
        }
        addEvent({ text: finalText, major: false });
        setFlag(flagKey + '_progress', progress + 1);
        return;
      }
    }

    // 如果到了该Sephirah的年龄且前面的都完成了
    if (i === currentStage && age >= chain.ageStart && age <= chain.ageEnd && chance(0.06)) {
      if (i === 0 || getFlag('sephirah_' + SEPHIRAH_CHAIN[i-1].id + '_done')) {
        const progress = getFlag(flagKey + '_progress') || 0;
        const evtText = chain.eventTexts[progress];
        let finalText;
        if (typeof evtText === 'object' && evtText.text) {
          finalText = evtText.text;
          // 最后一个事件
          setFlag(flagKey + '_done', true);
          setFlag('sephirahStage', i + 1);
          addMilestone(chain.milestone);
          // 应用奖励
          if (chain.reward) {
            const a = gameState.attrs;
            if (chain.reward.con) a.con = (a.con||0) + chain.reward.con;
            if (chain.reward.int) a.int = (a.int||0) + chain.reward.int;
            if (chain.reward.wil) a.wil = (a.wil||0) + chain.reward.wil;
            if (chain.reward.wea) a.wea = (a.wea||0) + chain.reward.wea;
          }
        } else {
          finalText = evtText;
          setFlag(flagKey + '_started', true);
          setFlag(flagKey + '_progress', progress + 1);
        }
        // 替换占位符
        if (finalText.includes('{abno}')) {
          const abno = pick(ABNORMALITIES);
          finalText = finalText.replace('{abno}', abno ? abno.name : '一个未知的异想体');
        }
        if (finalText.includes('{work}')) {
          const wt = pick(Object.keys(WORK_TYPES));
          finalText = finalText.replace('{work}', wt);
        }
        addEvent({ text: finalText, major: false });
        return;
      }
    }
  }
}

// 随机异想体工作事件
function runAbnormalityWork(age) {
  if (!gameState.alive || gameState.dead) return;
  if (!getFlag('joinedLCompany')) return;
  if (getFlag('lightSeedLaunched')) return;

  if (age >= 20 && chance(0.06)) {
    const abno = pick(ABNORMALITIES);
    if (!abno) return;
    const work = pick(Object.keys(WORK_TYPES));
    const success = abno.level === 'ZAYIN' ? chance(0.9) :
                    abno.level === 'TETH' ? chance(0.75) :
                    abno.level === 'HE' ? chance(0.5) :
                    abno.level === 'WAW' ? chance(0.3) :
                    chance(0.15);

    if (success) {
      const peBox = abno.level === 'ALEPH' ? randBetween(20,35) :
                    abno.level === 'WAW' ? randBetween(12,25) :
                    abno.level === 'HE' ? randBetween(8,18) :
                    randBetween(4,14);
      const texts = [
        `你对 ${abno.name}（${abno.level}级）进行了${work}工作。工作顺利完成，产出了 ${peBox} 个PE-BOX。${WORK_TYPES[work]}`,
        `管理部通知：${abno.name} 的${work}工作由你执行。异想体看起来比较平静，脑啡肽收集成功。`,
      ];
      addEvent({ text: pick(texts), effect: '智力+1', major: false });
      gameState.attrs.int = (gameState.attrs.int||0) + 1;
    } else {
      const damage = abno.level === 'ALEPH' ? randBetween(2,4) :
                    abno.level === 'WAW' ? randBetween(1,3) :
                    randBetween(0,2);
      const texts = [
        `你对 ${abno.name}（${abno.level}级）的${work}工作失败了。异想体失控，你受到了${damage}点伤害。`,
        `警报！${abno.name} 在工作中对你的${work}操作产生了强烈反应。紧急撤退，但已受伤。`,
      ];
      addEvent({ text: pick(texts), effect: `体质-${damage}`, major: false });
      gameState.attrs.con = Math.max(0, (gameState.attrs.con||0) - damage);
    }
  }
}

// ==================== 事件链辅助适配器 ====================
function hasTalent(tag) {
  return (gameState.tags || []).some(t => (t||'').indexOf(tag) !== -1);
}
function rollCheck(attr, diff) {
  const a = gameState.attrs || {};
  return (a[attr] || 0) + randBetween(1, 6) >= diff + 3;
}
function addLog(msg) { /* 兼容，不做额外操作 */ }
function showEvent(text, choices, flag) {
  addEvent({ text: text, effText: '抉择事件', major: true, milestone: flag });
  if (choices && choices.length > 0) {
    const c = choices[Math.floor(Math.random() * choices.length)];
    if (c && c.effect) setTimeout(() => c.effect(), 100);
  }
}
function takeDamage(n) {
  modAttr('con', -n);
  if ((gameState.attrs.con || 0) <= 0) death('事件链战斗中伤重不治');
}

// 时间裂缝解释系统
function getTimeCrackExplanation(age) {
  // 当玩家出生年份与都市事件时间不匹配时，用时间裂缝解释
  if (!gameState.alive || gameState.dead) return;
  const birthYear = gameState.birthYear || 900;

  // 检测时间异常
  const anomalies = [];
  if (birthYear > 950 && age >= 20 && age <= 50) anomalies.push('WARP列车的发展');
  if (birthYear < 880 && age >= 20) anomalies.push('都市现代科技');
  if (birthYear > 970 && age < 30) anomalies.push('过早的都市事件');

  if (anomalies.length > 0 && !getFlag('timeCrackExplained') && age === 15) {
    addEvent({ text: '你注意到，你所经历的时间线似乎有些不连贯——你看到的都市事件似乎属于不同的时代。也许，WARP列车的空间裂缝不只是地理上的……时间，也会在这里折叠。', major: true, milestone: '时间裂缝' });
    addMilestone('时间裂缝');
    setFlag('timeCrackExplained', true);
  }
}

  function isOnCooldown(eventKey, cooldownYears) {
    const lastTrigger = gameState.eventCooldown[eventKey];

    addMilestone(fixer.grade + "收尾人遭遇");

    // 数值对比决定结果
    const playerPower = a.con + a.wil + Math.floor(a.int / 2);
    const fixerPower = fixer.rank * 3 + randBetween(-2, 2); // 九阶=27, 一阶=3+随机
    const powerDiff = playerPower - fixerPower;

    if (powerDiff >= 5) {
      addEvent({ text: "你的实力远超这名" + fixer.grade + "收尾人。战斗几乎是一面倒的。他倒下时瞪大了眼睛，显然没想到自己会输得这么彻底。「你……到底是什么级别的？」他挣扎着问道。你没收了他的装备作为战利品。", effect: "win", effText: "体质+1，家境+1，获得装备", major: true, milestone: "击败" + fixer.grade + "收尾人" });
      addMilestone("击败" + fixer.grade + "收尾人");
      modAttr('con', 1);
      modAttr('wea', 1);
    } else if (powerDiff >= 0) {
      addEvent({ text: "一场势均力敌的战斗后，你和" + fixer.grade + "收尾人都受了伤。最终他选择撤退：「今天就算了。」他捂着伤口消失在巷口。你也带着一身伤离开了。虽然没人赢，但你积累了宝贵的战斗经验。", effect: "draw", effText: "体质+1，智力+1", major: false, milestone: "与" + fixer.grade + "收尾人平手" });
      addMilestone("与" + fixer.grade + "收尾人平手");
      modAttr('con', 1);
      modAttr('int', 1);
    } else if (powerDiff >= -3) {
      addEvent({ text: "你被" + fixer.grade + "收尾人击败了。他的实力确实在你之上。「在后巷混，实力不够就别逞强。」他留下了这句话后转身离去。你躺在地上，庆幸他只是打败了你而非杀了你。", effect: "lose", effText: "体质-1，意志+1", major: true, milestone: "败给" + fixer.grade + "收尾人" });
      addMilestone("败给" + fixer.grade + "收尾人");
      modAttr('con', -1);
      modAttr('wil', 1);
    } else {
      addEvent({ text: fixer.grade + "收尾人的实力碾压了你。你几乎没有任何还手的机会。他的武器划过你的身体，你倒在了血泊中。在意识消散前，你意识到在都市的等级制度中，差距就是差距。", effect: "death", effText: "死亡", major: true });
      death('被' + fixer.grade + '收尾人击杀');
      return;
    }
  }

  // 连续收尾人战斗事件
  if (age >= 25 && getFlag('random_fixer_duel') && !getFlag('fixer_tournament') && chance(0.02)) {
    setFlag('fixer_tournament', true);
    addEvent({ text: "后巷举办了一场非正式的收尾人比武大会。各路收尾人齐聚一堂，从九阶到三阶都有。你报名参加了。", effect: "event", effText: "连续三场战斗", major: true, milestone: "收尾人比武大会" });
    addMilestone("收尾人比武大会");
    let wins = 0;
    for (let i = 0; i < 3; i++) {
      const oppRank = 8 - i * 2 + randBetween(-1, 1); // 对手从八阶到四阶左右
      const oppPower = Math.max(3, oppRank) * 3 + randBetween(-2, 2);
      const playerPower = a.con + a.wil + Math.floor(a.int / 2);
      if (playerPower >= oppPower) {
        wins++;
        modAttr('con', 1);
      } else {
        modAttr('con', -1);
      }
    }
    if (wins === 3) {
      addEvent({ text: "三战三胜！你在比武大会上一路过关斩将，最终夺得了冠军。观众席上传来掌声和欢呼。一个神秘人递给你一张名片：「有兴趣加入我的事务所吗？」", effect: "champion", effText: "体质+3，家境+2", major: true, milestone: "比武大会冠军" });
      addMilestone("比武大会冠军");
      modAttr('con', 3);
      modAttr('wea', 2);
    } else if (wins >= 2) {
      addEvent({ text: "你赢得了" + wins + "场比赛。虽然不是冠军，但你的表现引起了不少人的注意。一些事务所开始对你发出邀请。", effect: "runnerup", effText: "体质+1，家境+1", major: false, milestone: "比武大会佳绩" });
      addMilestone("比武大会佳绩");
      modAttr('con', 1);
      modAttr('wea', 1);
    } else {
      addEvent({ text: "你只赢了" + wins + "场。比武大会的残酷让你明白了自己的不足。回到训练场后，你加倍努力修炼。", effect: "defeat", effText: "意志+1", major: false, milestone: "比武大会落败" });
      addMilestone("比武大会落败");
      modAttr('wil', 1);
    }
  }
}

    setFlag('glass_window', true);
    if (a.wil >= 7) {
      addEvent({ text: '拍卖会的真相远比想象中可怕——环指的玻璃窗技术可以将人转化为纯粹的本能源体。你的同伴加内特在玻璃窗的作用下化为了本能的罪孽之物。环指大师占顺也变为了扭曲。你在维吉利乌斯的E.G.O保护下勉强幸存。', effect: 'trauma', effText: '意志+1，智力+1', major: true, milestone: '玻璃窗事件' });
      modAttr('wil', 1);
      modAttr('int', 1);
    } else {
      addEvent({ text: '玻璃窗——环指的技术将你同伴的内心扭曲成了实体。加内特化为了凝固的宝石，占顺变为了扭曲的怪物。你精神几近崩溃，幸存了下来，但那段记忆将永远折磨着你。', effect: 'trauma', effText: '意志-2', major: true, milestone: '玻璃窗事件' });
      modAttr('wil', -2);
    }
  }

  // === 11. 都市之星路线 ===
  if (age >= 30 && age <= 45 && !getFlag('urban_star') && a.con + a.wea >= 14 && chance(0.02)) {
    setFlag('urban_star', true);
    addEvent({ text: '你被协会指定为都市之星。这意味着你的力量已经威胁到了都市的平衡，所有协会都将你视为必须消灭的存在。从这一刻起，你的名字将出现在所有收尾人的委托板上。逃亡，还是迎战？', effect: 'star', effText: '武器+2，体质+1', major: true, milestone: '都市之星' });
    modAttr('wea', 2);
    modAttr('con', 1);
    setFlag('urbanStar', true);
  }
  if (age >= 32 && age <= 47 && getFlag('urbanStar') && !getFlag('star_battle') && chance(0.06)) {
    setFlag('star_battle', true);
    if (a.con * 0.4 + a.wil * 0.6 + a.wea * 0.3 >= 10) {
      addEvent({ text: '一群收尾人循着都市之星的委托找到了你。战斗中你展现出了压倒性的力量，将挑战者一一击败。都市之星的名号更加响亮了。但你也知道，总有一天，会有更强的存在来挑战你。', effect: 'victory', effText: '武器+1', major: true, milestone: '都市之星保卫战' });
      modAttr('wea', 1);
    } else {
      addEvent({ text: '收尾人们循着都市之星的委托找到了你。尽管你奋力战斗，但寡不敌众。你侥幸逃脱，但身负重伤。都市之星的光环已经不再安全——你决定隐姓埋名，消失在都市的暗处。', effect: 'defeat', effText: '体质-2', major: true });
      modAttr('con', -2);
      if (a.con <= 0) {
        death('都市之星围剿');
      }
    }
  }

  // === 12. 脑叶公司扩展路线（时序约束：需烟霾战争之后，被图书馆阻断） ===
  if (age >= 25 && age <= 32 && !getFlag('lobotomy_join') && a.int >= 6 && getFlag('era_smog_done') && !getFlag('blockLCorp') && chance(0.03)) {
    setFlag('lobotomy_join', true);
    addEvent({ text: '一封来自L公司的录用通知书出现在你的邮箱中。工作内容被标记为机密，薪资高得离谱。进入设施后，你被分配为一名员工——负责管理被称为『异想体』的神秘存在。部长们面带微笑地欢迎你，但你总觉得这里有什么不对。', effect: 'join', effText: '智力+2，加入脑叶公司', major: true, milestone: '加入脑叶公司' });
    modAttr('int', 2);
    setFlag('joinedLCompany', true);
  }
  if (age >= 28 && age <= 38 && getFlag('joinedLCompany') && !getFlag('lobotomy_work') && chance(0.08)) {
    setFlag('lobotomy_work', true);
    var abnorms = ['告白', '魔弹', '小王子', '审判鸟', '寄生', '天蝎'];
    var abnorm = abnorms[Math.floor(Math.random() * abnorms.length)];
    addEvent({ text: '今天的工作对象是' + abnorm + '。你按照Sephirah的指示执行工作，异想体在被满足需求后安静了下来。然而，每一次工作结束后，你都会感到一丝难以言喻的不安——这些被囚禁的存在，究竟在想什么？', effect: 'work', effText: '', major: true, milestone: '异想体工作' });
  }
  if (age >= 35 && age <= 45 && getFlag('joinedLCompany') && !getFlag('lobotomy_suppress') && chance(0.06)) {
    setFlag('lobotomy_suppress', true);
    addEvent({ text: '警报声回荡在整个设施——异想体突破了收容。走廊中充斥着异想体的咆哮和员工的惨叫。你拼命地跑向最近的避难所，身后是不属于这个世界的恐怖存在。在部长们的镇压下，危机暂时解除。但每个人都明白，下一次突破收容可能就是最后一次。', effect: 'danger', effText: '意志+1', major: true, milestone: '异想体突破收容' });
    modAttr('wil', 1);
  }
}

// =============================
// 清道夫/血魔/鲸鱼/扭曲神备大罪详细事件
// =============================
function runLoreDetailEvents(age) {
  if (!gameState.alive || gameState.dead) return;
  if (gameState.ageEventCount && gameState.ageEventCount[age] >= 3) return;
  if (!gameState.eventCooldown) gameState.eventCooldown = {};
  function isOnCooldown(eventKey, cooldownYears) {
    const lastTrigger = gameState.eventCooldown[eventKey];
    if (!lastTrigger) return false;
    return (age - lastTrigger) < cooldownYears;
  }
  function setCooldown(eventKey) {
    gameState.eventCooldown[eventKey] = age;
  }
  const bp = gameState.birthplace ? gameState.birthplace.id : 'backstreet';
  const a = gameState.attrs;

  // === 清道夫详细事件 ===

  // 清道夫深宵出动
  if (age >= 15 && !getFlag('sweeper_night') && chance(0.04)) {
    setFlag('sweeper_night', true);
    addEvent({ text: "后巷的时间来到了凌晨3:13——深宵开始了。那些身穿密封特制服装的身影从暗处涌出，他们完全由液体组成，运动时衣服内的液体会晃动。他们互称\"家人\"和\"邻居\"，声音嗡嗡作响，像液体在容器中振荡。「燃料不足了……」一个清道夫低声说。你屏住呼吸躲在一旁，祈祷他们不要发现你——清道夫的武器能将人体液化，被液化后就会被吸收作为他们的\"燃料\"。", effect: "encounter", effText: "意志+1", major: true, milestone: "清道夫深宵遭遇" });
    addMilestone("清道夫深宵遭遇");
    modAttr('wil', 1);
    if (checkCombat(7, 'con')) {
      addEvent({ text: "你在清道夫的追杀中逃了出来。一个清道夫在追击时摔倒了，密封服裂开了一条缝，液体从中缓缓流出。「家人……救我……」其他清道夫围了上来，将自己的液体注入他的身体。你趁机逃离了这个恐怖的深宵。", effect: "escape", effText: "体质+1", major: false, milestone: "清道夫追杀逃脱" });
      addMilestone("清道夫追杀逃脱");
      modAttr('con', 1);
    } else {
      addEvent({ text: "清道夫的武器击中了你。你的身体开始从边缘液化，一种奇异的温暖感蔓延全身——那是被液化的感觉。你的意识在消散前最后看到的，是一个清道夫俯下身来：「欢迎成为我们的一部分，新邻居。」", effect: "death", effText: "死亡", major: true });
      death('被清道夫液化');
      return;
    }
  }

  // 清道夫嬷嬷
  if (age >= 20 && getFlag('sweeper_night') && !getFlag('sweeper_mama') && chance(0.02)) {
    setFlag('sweeper_mama', true);
    addEvent({ text: "你听到了清道夫们提到的\"嬷嬷\"——清道夫的管理者。据说嬷嬷负责指挥所有清道夫的行动，并维持他们独特的社会结构。还有传闻说清道夫通过绑架后巷与郊区的孩童来壮大自身。你不敢去验证这个传闻的真实性。", effect: "lore", effText: "智力+1", major: false, milestone: "清道夫嬷嬷" });
    addMilestone("清道夫嬷嬷");
    modAttr('int', 1);
  }

  // 清道夫被首脑命令出动
  if (age >= 25 && !getFlag('sweeper_head_order') && chance(0.01)) {
    setFlag('sweeper_head_order', true);
    addEvent({ text: "大白天——清道夫出动了。不是因为深宵，而是因为首脑的命令。那些密封服装的身影在正午的阳光下穿梭，无视时间的限制。后巷的居民们惊恐地四散奔逃。你第一次亲眼见证了清道夫与首脑之间的联系——那是超越你理解的存在。整个街区被清空了。", effect: "lore", effText: "意志+1，智力+1", major: true, milestone: "清道夫首脑命令" });
    addMilestone("清道夫首脑命令");
    modAttr('wil', 1);
    modAttr('int', 1);
  }

  // === 血魔详细事件 ===

  // 血魔遭遇（红眼、恐水）
  if (age >= 18 && !getFlag('vampire_encounter') && chance(0.04)) {
    setFlag('vampire_encounter', true);
    addEvent({ text: "你在巷口遇到了一个奇怪的人。他的眼睛是红色的——不是普通的红色，而是仿佛血液在瞳孔中摇曳的鲜红。他的目光中带着一种本能的渴望，但他在克制着什么。你注意到他刻意避开了路边的水洼。「血……」他低语了一声，然后迅速转身离去。你从文献中读到过：红色眼睛、对水的恐惧、对血液的渴望——这是血魔的三大特征。", effect: "encounter", effText: "智力+1", major: true, milestone: "血魔遭遇" });
    addMilestone("血魔遭遇");
    modAttr('int', 1);
  }

  // 血魔失去理性
  if (age >= 22 && !getFlag('vampire_frenzy') && chance(0.03)) {
    setFlag('vampire_frenzy', true);
    addEvent({ text: "你目睹了一个血魔失去理性的瞬间。他的红眼从鲜红变成了猩红，瞳孔中的血光剧烈摇曳，血腥味从他的眼中溢出。他的力量暴涨——周围的墙壁在他面前如纸片般碎裂。「血……给我血……」他不再是那个理性的人了，此刻他只剩下了本能。幸运的是他的目标不是你——他冲向了另一群路人。", effect: "encounter", effText: "意志-1", major: true, milestone: "血魔失控" });
    addMilestone("血魔失控");
    modAttr('wil', -1);
  }

  // L巢血魔长老拉里尔
  if (age >= 25 && (bp === 'L巢' || bp === 'Lnest') && !getFlag('lariel_hotel') && chance(0.04)) {
    setFlag('lariel_hotel', true);
    addEvent({ text: "你入住了L巢的一家酒店。酒店老板是一位面容慈祥的老妇人——但你知道她是血魔。L巢的长老拉里尔，一代眷属。她经营这家酒店的同时会暗中吸取住客的血液，但确实会保障住客的安全。在白夜黑昼事件后，酒店与하나协会的拉斯克事务所签订了保护契约——住宿费用因此高得离谱。拉里尔借这个由头将新生血魔拉斯克及其眷属带到了身边监控。你决定小心行事——毕竟住在这里虽然贵，但在L巢这已经是最安全的选择了。", effect: "lore", effText: "家境-1，体质+1，智力+1", major: true, milestone: "L巢拉里尔酒店" });
    addMilestone("L巢拉里尔酒店");
    modAttr('wea', -1);
    modAttr('con', 1);
    modAttr('int', 1);
  }

  // 拉曼却领游乐园
  if (age >= 20 && !getFlag('ramancha_park') && chance(0.03)) {
    setFlag('ramancha_park', true);
    addEvent({ text: "你来到了传说中的拉曼却领——一座由血魔建造的游乐园。淡金色长发的长老吉诃德是一代眷属，他曾为了让人与血魔友好相处，将这片领地改造成了供所有人欢笑的乐园。入园的条件很简单：献血。作为交换，你可以尽情游玩。乐园中的设施由硬血铸造——血魔将血液化为质地极为坚硬的材料，制作了摩天轮和各种游乐设施。但你知道，这座乐园曾经失控过——血棒无法满足血魔的鲜血欲望，事态最终由吉诃德亲手关闭。如今它再度开放了。", effect: "lore", effText: "体质+1，智力+1", major: true, milestone: "拉曼却领游乐园" });
    addMilestone("拉曼却领游乐园");
    modAttr('con', 1);
    modAttr('int', 1);
    if (chance(0.3)) {
      addEvent({ text: "在游乐园深处，你遇到了一个正在分发血棒的血魔。血棒是凝固的血液制成的棒状食物，能部分满足血魔的饥饿。「来尝尝吧。」他的笑容友善，但你注意到他的红眼在微微颤抖——血棒永远无法真正替代鲜血。", effect: "encounter", effText: "体质+1", major: false, milestone: "血棒体验" });
      addMilestone("血棒体验");
      modAttr('con', 1);
    }
  }

  // 血魔的家系与宗族
  if (age >= 25 && !getFlag('vampire_clan') && chance(0.03)) {
    setFlag('vampire_clan', true);
    const clans = [
      { name: 'L巢家系', desc: '长老拉里尔经营酒店，维持着与人类的微妙平衡。每个巢的血魔都有"长老"管理，超出数量的血魔会被强制"浴血沉眠"。' },
      { name: '拉曼却领家系', desc: '长老吉诃德的理想主义导致了游乐园的建立与崩塌。他的家系将血液化为硬血武器，甚至能扭曲空间。' },
      { name: '采佩什家系', desc: '来自不明地区。二代眷属的一颗眼球被环指野兽派画廊展览——这就是环指对血魔的"收藏"。' }
    ];
    const clan = pick(clans);
    addEvent({ text: "你了解到血魔社会中的宗族制度。血魔们存在宗族关系，忤逆亲族在心理上几乎不可能。每个家系的能力因上位眷属不同而各异。" + clan.name + "——" + clan.desc + "一代眷属是最初的血魔，力量强大，能创造大量眷属。而二代及以下的眷属在其漫长的一生中最多只能创造两个眷属。代数越高，力量差距越大。", effect: "lore", effText: "智力+2", major: true, milestone: "血魔家系" });
    addMilestone("血魔家系");
    modAttr('int', 2);
  }

  // 血袋转化
  if (age >= 22 && !getFlag('blood_bag') && chance(0.02)) {
    setFlag('blood_bag', true);
    addEvent({ text: "你亲眼看到了血魔\"咬\"人的瞬间。被摄取血液的人类在一段时间后必然转化为血袋——那是无法成为眷属的残渣，只是补充血液的便携干粮。转化过程不可中断，眷属地位越高变化越快。血袋保有生前部分战斗习惯，但已经不再是人类了。你庆幸自己没有被盯上。", effect: "encounter", effText: "意志+1", major: true, milestone: "血袋目击" });
    addMilestone("血袋目击");
    modAttr('wil', 1);
  }

  // === 鲸鱼与人鱼事件 ===

  // 大湖航行——鲸油
  if (age >= 20 && !getFlag('whale_oil') && chance(0.04)) {
    setFlag('whale_oil', true);
    addEvent({ text: "你的船航行在大湖上。湖水深处偶尔会涌出一种粘稠的油脂——鲸油。鲸油会尝试吞噬一切它接触到的东西，被吞噬的物体会被排列重组为完全不同的东西。船员们小心翼翼地避开鲸油的聚集区。「别碰到那东西，」老船长警告你，「被活鲸油脂吞没的人会变成人鱼。」", effect: "encounter", effText: "智力+1", major: true, milestone: "鲸油遭遇" });
    addMilestone("鲸油遭遇");
    modAttr('int', 1);
  }

  // 穴掌鲸遭遇
  if (age >= 22 && (bp === 'greatlake' || bp === 'GL') && !getFlag('cave_palm_whale') && chance(0.03)) {
    setFlag('cave_palm_whale', true);
    addEvent({ text: "你的船驶入了浑浊而腥臭的旋转蓝色湖域。水面下出现了一个巨大的轮廓——穴掌鲸。它如同一只拥有无数孔洞的巨大手掌，从每个孔洞中钻出一个人鱼。那些人鱼的身躯与鲸相连，眼神空洞。「呜——」鲸发出了低沉的鸣叫。老船长命令全速逃离。在慌乱中，一个人鱼试图爬上甲板，你拼死将其推了下去。", effect: "encounter", effText: "体质+1，意志+1", major: true, milestone: "穴掌鲸遭遇" });
    addMilestone("穴掌鲸遭遇");
    modAttr('con', 1);
    modAttr('wil', 1);
    if (checkCombat(6, 'con')) {
      addEvent({ text: "你成功击退了人鱼的登船尝试。穴掌鲸感受到疼痛后潜入了深处——人鱼与鲸相连，伤害人鱼会让鲸感到痛。你们趁机逃离了这个死亡湖域。", effect: "escape", effText: "体质+1", major: false, milestone: "穴掌鲸逃脱" });
      addMilestone("穴掌鲸逃脱");
      modAttr('con', 1);
    } else {
      addEvent({ text: "人鱼的攻击力超出了你的预期。你被拖入了湖水，粘稠的鲸油包裹了你的身体。你的意识在变形中逐渐模糊——当你再次\"醒来\"时，你发现自己从孔穴中钻出，成为了穴掌鲸的新人鱼。你与鲸融为一体，再也无法离开。", effect: "death", effText: "转化为人鱼", major: true });
      death('被穴掌鲸转化为人鱼');
      return;
    }
  }

  // 白鲸五大灾害
  if (age >= 30 && !getFlag('white_whale') && chance(0.01)) {
    setFlag('white_whale', true);
    addEvent({ text: "五大灾害之一——白鲸出现了。它的身体过于庞大，以至于心脏都需要一个额外的心脏来维持运作。它途径的一切都被一层苍白色的薄膜覆盖——这种现象被称为\"白化\"。被吞噬的人保留下一切原本的习惯与技能，然后攻击一切它们能发现的东西。水手们疯狂地操控船只躲避。你看到了远处漂浮在湖面上的苍白色伪船——那是白鲸的受害者。传说中，遇到苍白色的伪船必须绕行，即便绕很大一圈路。", effect: "disaster", effText: "意志+2", major: true, milestone: "白鲸遭遇" });
    addMilestone("白鲸遭遇");
    modAttr('wil', 2);
    if (checkCombat(10, 'wil')) {
      addEvent({ text: "你奇迹般地在白鲸的路径中存活了下来。白鲸缓慢地游过，苍白的浪潮从你们身旁涌过，但没有吞没你们的船。当你回头望去，白鲸的身影消失在了湖雾之中，只留下一片苍白的残骸。", effect: "survive", effText: "意志+2，体质+1", major: true, milestone: "白鲸生还" });
      addMilestone("白鲸生还");
      modAttr('wil', 2);
      modAttr('con', 1);
    } else {
      addEvent({ text: "白鲸的苍白浪潮吞没了你们。你感到一层苍白的薄膜包裹了全身，意识开始模糊。当你再次\"醒来\"时——你已经不是你了。白化后的你保留着所有战斗技能，但你不再是人类，你只知道攻击一切你能发现的东西。", effect: "death", effText: "白化死亡", major: true });
      death('被白鲸白化');
      return;
    }
  }

  // 马林鲸五大灾害（已过时期）
  if (age >= 25 && !getFlag('marlin_whale') && chance(0.01)) {
    setFlag('marlin_whale', true);
    addEvent({ text: "老水手们讲述着五大灾害中另一个——马林鲸的故事。贯穿一切的马林鲸，它的身躯如同一条贯穿天际的长矛。据说在边狱公司LCB活跃的时期，马林鲸已经被靛蓝老人钓起。老水手们对靛蓝老人的名字充满了敬畏：「那个老人……大湖最古老的色彩级收尾人，独自一人钓起了马林鲸。」你望着大湖的深处，不知该庆幸还是恐惧——五大灾害中，至少有一个已经不在了。", effect: "lore", effText: "智力+2", major: true, milestone: "马林鲸传说" });
    addMilestone("马林鲸传说");
    modAttr('int', 2);
  }

  // 熔岩鲸
  if (age >= 25 && !getFlag('lava_whale') && chance(0.02)) {
    setFlag('lava_whale', true);
    addEvent({ text: "大湖深处传来一阵剧烈的震颤。一艘路过的船报告说看到了一头心脏搏动异常剧烈的鲸——熔岩鲸。它的血液鲜红炽热，周围的湖水都在沸腾。熔岩鲸喷出的热气甚至能在湖面上制造小型的热浪。你的船员们拼命划桨远离了那片沸腾的水域。", effect: "encounter", effText: "体质+1", major: true, milestone: "熔岩鲸目击" });
    addMilestone("熔岩鲸目击");
    modAttr('con', 1);
  }

  // === 扭曲/神备/大罪详细事件 ===

  // 扭曲前兆——情绪积累
  if (age >= 20 && !getFlag('distortion_sign') && chance(0.03)) {
    setFlag('distortion_sign', true);
    const emotions = ['压抑的愤怒', '无法言说的悲伤', '扭曲的嫉妒', '深不见底的空虚', '灼热的渴望'];
    const emotion = pick(emotions);
    addEvent({ text: "你感到体内有一种" + emotion + "在积累。这不是普通的心情波动——它像是一颗种子在你意识深处扎根。偶尔你的身体边缘会出现轻微的变形——手指的轮廓模糊了一瞬，镜中的影子似乎比实际大了一圈。你知道这是扭曲的前兆：情绪的积累期、潜伏期。如果某天有一个冲击性的事件，或者这个情绪积累到极限……你可能会面临选择。", effect: "distortion", effText: "意志-1", major: true, milestone: "扭曲前兆" });
    addMilestone("扭曲前兆");
    modAttr('wil', -1);
  }

  // 金枝现象
  if (age >= 22 && getFlag('distortion_sign') && !getFlag('golden_branch') && chance(0.02)) {
    setFlag('golden_branch', true);
    addEvent({ text: "一块金色的枝状物不知何时出现在你手中——金枝。它能展现附着于身体的异常变形，也能加速扭曲倾向。边狱公司从脑叶公司支部废墟中发掘的黑石碑据称也有类似的效果。你凝视着金枝，一个甜美而温柔的声音在意识深处响起：\"你愿意了解自己真实的样子吗？\"", effect: "distortion", effText: "智力+1，面临选择", major: true, milestone: "金枝共鸣" });
    addMilestone("金枝共鸣");
    modAttr('int', 1);
  }

  // 神备觉醒——完全接受自我
  if (age >= 25 && getFlag('distortion_sign') && !getFlag('ego_awakened') && chance(0.02)) {
    setFlag('ego_awakened', true);
    addEvent({ text: "冲击来了。那个甜美而温柔的声音再次响起，引导你去面对自我的真实形象。你看到了自己的一切——不仅是作为被害者承受的痛苦，还有你因为都市的规则而加害于他人的罪孽。你选择了接受。全部接受。「我理解自己的痛苦，也承认自己的罪孽。」那个声音微笑着离开了。你感到一股力量从内心涌出——专属的武器与装备在光芒中成型，你的精神面貌前所未有地坚定。这就是\"神备\"——绽放的E.G.O。", effect: "good", effText: "体质+2，意志+3，获得神备", major: true, milestone: "神备觉醒" });
    addMilestone("神备觉醒");
    modAttr('con', 2);
    modAttr('wil', 3);
    gameState.egoForm = (gameState.egoForm || '') + '神备';
  }

  // 扭曲——部分接受自我
  if (age >= 25 && getFlag('distortion_sign') && !getFlag('ego_awakened') && !getFlag('distorted') && chance(0.03)) {
    setFlag('distorted', true);
    const distortions = [
      { name: '音符扭曲', desc: '你的身体开始发出不和谐的旋律，周围的空气振动成了可见的音波。你的存在变成了音乐——而所有听到的人都会化为音符。' },
      { name: '气球扭曲', desc: '你的头部慢慢膨胀，最终变成了一个浮空的气球。你的身体变得没有知觉，向天空飘去。周围的人在同一时刻也开始头部膨胀。' },
      { name: '荆棘扭曲', desc: '你的皮肤上长出了密密麻麻的荆棘，每一根荆棘都连接着你内心的一处伤痕。你变成了一个行走的荆棘丛林。' },
      { name: '镜面扭曲', desc: '你身边的一切开始被镜面覆盖。每一面镜子中映出的是不同时期、不同选择的你。你被困在了无数个平行自我的倒影中。' }
    ];
    const dist = pick(distortions);
    addEvent({ text: "你只接受了痛苦，却拒绝承认自己的罪孽。那个声音说：\"只保留你希望拥有的部分吧。\"扭曲发生了。" + dist.desc, effect: "distortion", effText: "变为扭曲", major: true, milestone: "扭曲化" });
    addMilestone("扭曲化");
    if (checkCombat(9, 'wil')) {
      addEvent({ text: "你以扭曲后的形态存活了下来，但代价是你不再完全是人类。扭曲的存在通常会随着时间破碎崩溃，届时你将彻底消散于光中，化为虚无。你的时间不多了。", effect: "survive", effText: "体质+2，智力+2，但寿命缩短", major: true, milestone: "扭曲存活" });
      addMilestone("扭曲存活");
      modAttr('con', 2);
      modAttr('int', 2);
    } else {
      addEvent({ text: "你的扭曲彻底失控了。身体在变形中崩溃，意识在碎片中消散。一个异想体从你扭曲的残骸中诞生，取代了你曾经存在的一切痕迹。", effect: "death", effText: "扭曲崩溃→异想体诞生", major: true });
      death('扭曲崩溃');
      return;
    }
  }

  // 大罪——拒绝一切
  if (age >= 30 && getFlag('distortion_sign') && !getFlag('ego_awakened') && !getFlag('distorted') && !getFlag('became_sin') && chance(0.01)) {
    setFlag('became_sin', true);
    const sins = [
      { name: '傲慢', desc: '你认为自己是世界上唯一有价值的存在。其他人都只是你脚下的尘埃。你的身体开始散发出压倒性的气场，让所有接近你的人不由自主地跪下。' },
      { name: '嫉妒', desc: '你对一切拥有你所没有之物的人感到无尽的嫉恨。你的目光所及之处，万物都在枯萎——因为你无法忍受它们的存在。' },
      { name: '暴怒', desc: '纯粹的、无法熄灭的愤怒火焰吞噬了你的一切。你只剩下了破坏的本能，你的拳头可以击碎一切。' },
      { name: '倦怠', desc: '你对一切都失去了兴趣。你的身体开始变得虚无，存在感越来越稀薄。你躺倒在后巷的角落，对世界不再关心。' },
      { name: '暴食', desc: '你吞噬一切——食物、金钱、希望、甚至其他人的存在。你的饥饿永远不会被满足，因为你要吞噬的不仅仅是物质。' },
      { name: '忧郁', desc: '永恒的悲伤笼罩着你。你的存在本身就是一个悲伤的源点，接近你的人都会被绝望感染。世界从未有过光明——这是你唯一的信念。' },
      { name: '色欲', desc: '你对美好的渴求扭曲成了对占有的极端欲望。你想要的不仅是拥有，而是独占一切美好的事物。' }
    ];
    const sin = pick(sins);
    addEvent({ text: "你拒绝了自我真实形象的一切。你褪掉了所有曾经属于自身的部分——记忆、情感、自我认知，全部抛弃。你成为了纯粹的、只剩一种本能的存在。大罪。" + sin.name + "——" + sin.desc, effect: "sin", effText: "成为大罪", major: true, milestone: sin.name + "之大罪" });
    addMilestone(sin.name + "之大罪");
    modAttr('con', 3);
    modAttr('wil', -3);
    if (checkCombat(10, 'wil')) {
      addEvent({ text: "作为大罪的你在都市中横行了一段时间，但最终被收尾人们联手压制。你被关进了某个设施中，永远无法离开。", effect: "sealed", effText: "生存但被永久封印", major: true, milestone: "大罪被封印" });
      addMilestone("大罪被封印");
    } else {
      addEvent({ text: "作为大罪的你被一群色彩级收尾人联合讨伐。你的力量虽然强大，但在面对都市顶尖战力时还是败下阵来。你的存在被彻底抹消。", effect: "death", effText: "大罪被讨伐", major: true });
      death('大罪被讨伐');
      return;
    }
  }

  // 心望体验
  if (age >= 20 && !getFlag('mind_heart') && chance(0.02)) {
    setFlag('mind_heart', true);
    addEvent({ text: "你在战斗中突然感到了一种奇异的状态——内心的某种愿望凝聚为实质的力量。你的身躯开始散发细微的光芒，增强了你对攻击的抵挡能力；而你的武器上附着了光环，每一次挥击都带着远超以往的破坏力。这就是\"心望\"——心用于防御，望用于攻击。效果结束后，你的精神感到一阵疲惫。心望的代价是心理负担，但它确实是都市中一种特殊而强大的力量。", effect: "power", effText: "体质+1，意志+1", major: true, milestone: "心望觉醒" });
    addMilestone("心望觉醒");
    modAttr('con', 1);
    modAttr('wil', 1);
  }

  // 血魔战争历史
  if (age >= 20 && !getFlag('vampire_war_history') && chance(0.02)) {
    setFlag('vampire_war_history', true);
    addEvent({ text: "你从一本旧书里读到了两百年前血魔战争的历史。血魔最初的来源是很久以前一栋宅邸的异变——\"从在那宅子里浸满血的瞬间开始，我们的血脉相互连接，产生了血统。在扭曲现象以前很久，我们就一直在阴影中生存、互相斗争了。\"一位收尾人劝说拉曼却领的血魔长老吉诃德站在人类一方。吉诃德率家系参战，使人类最终获得了胜利。但和平的代价是沉重的。", effect: "lore", effText: "智力+2", major: true, milestone: "血魔战争历史" });
    addMilestone("血魔战争历史");
    modAttr('int', 2);
  }
}

// =============================
// 永生/不朽特殊事件
// =============================
function runImmortalEvents(age) {
  if (!gameState.alive || gameState.dead) return;
  if (gameState.ageEventCount && gameState.ageEventCount[age] >= 3) return;
  const bp = gameState.birthplace ? gameState.birthplace.id : 'backstreet';
  const a = gameState.attrs;

  // 事件冷却机制
  if (!gameState.eventCooldown) gameState.eventCooldown = {};
  function isOnCooldown(eventKey, cooldownYears) {
    const lastTrigger = gameState.eventCooldown[eventKey];
    if (!lastTrigger) return false;
    return (age - lastTrigger) < cooldownYears;
  }
  function setCooldown(eventKey) {
    gameState.eventCooldown[eventKey] = age;
  }

  // === 清道夫同化永生 ===
  if (age >= 30 && !getFlag('sweeper_assimilated') && getFlag('sweeper_night') && chance(0.01)) {
    setFlag('sweeper_assimilated', true);
    addEvent({ text: "在一次深宵中，你被清道夫的武器击中了。但奇迹发生了——你的身体没有完全液化，而是与清道夫的液体产生了某种融合。你的意识在液体中漂浮，然后重新凝聚。当你『醒来』时，你穿着密封的特制服装，感受到了『家人』和『邻居』的存在。嬷嬷接纳了你。你成为了清道夫的一员——不再受凡人生死的束缚，只要不耗尽燃料就能永远活动。", effect: "immortal", effText: "成为清道夫，寿命不再终结", major: true, milestone: "清道夫同化" });
    addMilestone("清道夫同化");
    modAttr('con', 3);
    modAttr('wil', -2);
  }

  // === 扭曲化永生 ===
  if (age >= 35 && !getFlag('distortion_survived') && getFlag('distorted') && chance(0.02)) {
    setFlag('distortion_survived', true);
    addEvent({ text: "你的扭曲形态稳定了下来。时间对你失去了意义——你不会衰老，不会饥饿，不会被疾病侵蚀。你以扭曲之姿在都市中游荡，成为了一种介于人类与怪物之间的存在。但你知道，这个状态不是永恒的——扭曲存在过久会崩溃消散，据说会在该区域留下某种异常——一种被称为\"黑石碑\"的神秘遗迹。在那之前，你拥有无尽的岁月。", effect: "immortal", effText: "扭曲存活，寿命不再终结", major: true, milestone: "扭曲化永生" });
    addMilestone("扭曲化永生");
    modAttr('con', 2);
    modAttr('int', 2);
    modAttr('wil', -2);
  }

  // === 大罪化身永生 ===
  if (age >= 40 && !getFlag('sin_incarnate') && getFlag('became_sin') && chance(0.02)) {
    setFlag('sin_incarnate', true);
    addEvent({ text: "作为大罪的你彻底脱离了人类的范畴。你没有寿命，没有衰老，没有死亡——只有纯粹的、永恒的本能。你在都市中横行，无人能挡。大罪的存在本身就是对都市规则的终极挑战。你将一直存在下去，直到有人能终结你。", effect: "immortal", effText: "大罪化身，寿命不再终结", major: true, milestone: "大罪永生" });
    addMilestone("大罪永生");
    modAttr('con', 5);
    modAttr('wil', -5);
  }

  // === 图书馆司书永生 ===
  if (age >= 35 && !getFlag('librarian_immortal') && getFlag('librarian') && chance(0.03)) {
    setFlag('librarian_immortal', true);
    addEvent({ text: "安吉拉授予了你图书馆司书的正式职位。你的存在被固化在了书页之间——你不老不死，只是在无尽的书籍海洋中整理、接待、守护。时间对你而言失去了意义。你见证了无数来宾的故事化为书籍，也见证了图书馆的不断扩张。罗兰偶尔会来找你聊天，聊起他在查尔斯事务所的往事。在图书馆中，你获得了另一种形式的永生。", effect: "immortal", effText: "司书永生，寿命不再终结", major: true, milestone: "司书永生" });
    addMilestone("司书永生");
    modAttr('int', 3);
    modAttr('wil', 2);
  }

  // === 机械飞升永生 ===
  if (age >= 30 && !getFlag('mech_ascended') && (bp === 'workshop' || hasTag('工坊')) && chance(0.02)) {
    setFlag('mech_ascended', true);
    addEvent({ text: "琅琊工坊的老技师向你展示了一项禁忌的技术——完全机械化的身体改造。心脏换成齿轮泵，骨骼换成合金框架，血液换成冷却液。这是一次不可逆的手术，但一旦成功，只要定期维护就能永远运转。你犹豫了片刻，然后躺上了手术台。当手术结束时，你摸了摸自己的金属胸膛——没有心跳，但你还『活着』。", effect: "immortal", effText: "机械飞升，寿命不再终结", major: true, milestone: "机械飞升" });
    addMilestone("机械飞升");
    modAttr('con', 4);
    modAttr('int', 2);
    modAttr('wil', -2);
  }

  // === 金枝融合永生 ===
  if (age >= 35 && !getFlag('golden_branch_fused') && getFlag('golden_branch') && chance(0.02)) {
    setFlag('golden_branch_fused', true);
    addEvent({ text: "金枝与你完全融合了。那块金色的枝状物不再是外物，而是成为了你身体的一部分。金枝的力量流淌在你的每一滴血液中，维持着你的存在。你感受到了光之种的残余——那是脑叶公司积累的、通过卡巴拉密教『火剑之路』步骤完成的奇迹。你成为了都市中最接近『光之种』本质的存在。但这股力量也在缓慢改变你的心智。", effect: "immortal", effText: "金枝融合，寿命不再终结", major: true, milestone: "金枝融合永生" });
    addMilestone("金枝融合永生");
    modAttr('int', 4);
    modAttr('wil', -1);
  }

  // === 仙人之道完全体 ===
  if (age >= 40 && !getFlag('taixu_immortal_complete') && bp === 'eight' && getFlag('hongyuanResident') && chance(0.02)) {
    setFlag('taixu_immortal_complete', true);
    addEvent({ text: "你在鸿园铁槛寺修成了完整的仙人之道。仙皇虫与你建立了共生关系，你的身体不再受凡人生死的束缚。每月的重构日对你而言不再是危险，而是力量的源泉。铁槛寺的仙人们接纳了你，你成为了他们的一员。在都市的阴影中，你冷眼旁观凡人的生老病死——对于你而言，时间已经失去了意义。", effect: "immortal", effText: "仙人永生，寿命不再终结", major: true, milestone: "仙人完全体" });
    addMilestone("仙人完全体");
    modAttr('con', 2);
    modAttr('int', 3);
    modAttr('wil', 2);

function setGameMode(mode) {
  gameSettings.mode = mode;
}

function updateSetting(key, value) {
  gameSettings[key] = value;
}

function showSettings() {
  hideAllPhases();
  showPhase('phase-settings');
}

function showAchievements() {
  hideAllPhases();
  showPhase('phase-achievements');
  renderAchievements();
}

function backToTitle() {
  hideAllPhases();
  document.getElementById('codex-toggle').style.display = 'none';
  showPhase('phase-title');
}

function renderAchievements() {
  const container = document.getElementById('achievement-list');
  const rarityColors = { common: '#7a7a7a', rare: '#4a7fb5', epic: '#9b59b6', legend: '#f1c40f' };
  const rarityLabels = { common: '普通', rare: '稀有', epic: '史诗', legend: '传说' };

  let html = `<div style="margin-bottom:16px;color:#7a6f5a;text-align:center;font-size:0.9rem;">点击成就查看设定词条</div>`;
  for (const ach of ACHIEVEMENTS) {
    const unlocked = gameState && gameState.milestones && checkAchievement(ach, gameState);
    const color = rarityColors[ach.rarity] || '#7a7a7a';
    const label = rarityLabels[ach.rarity] || '普通';
    const opacity = unlocked ? '1' : '0.35';
    const lockIcon = unlocked ? '&#10022;' : '&#128274;';
    const loreHtml = ach.lore ? ach.lore.replace(/"/g, '&quot;') : '';
    html += `
      <div class="achievement-card" data-lore="${loreHtml}" data-name="${ach.name}" data-color="${color}" onclick="toggleAchievementLore(this)" style="padding:12px;margin:8px 0;background:#111;border:1px solid ${color};border-radius:6px;opacity:${opacity};cursor:pointer;transition:opacity 0.2s;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-weight:bold;color:${color};">${lockIcon} ${ach.name}</span>
          <span style="font-size:0.8rem;color:${color};">${label}</span>
        </div>
        <div style="color:#b8a99a;font-size:0.9rem;margin-top:4px;">${ach.desc}</div>
        <div class="achievement-lore" style="display:none;margin-top:8px;padding:8px;background:#1a0a0a;border-left:3px solid ${color};border-radius:0 4px 4px 0;color:#c8b898;font-size:0.85rem;line-height:1.6;"></div>
      </div>
    `;
  }
  container.innerHTML = html || '<div style="color:#7a6f5a;text-align:center;padding:20px;">暂无已解锁的成就</div>';
}

function toggleAchievementLore(el) {
  const lore = el.dataset.lore;
  const name = el.dataset.name;
  const color = el.dataset.color;
  const loreDiv = el.querySelector('.achievement-lore');
  if (!loreDiv) return;
  if (loreDiv.style.display === 'block') {
    loreDiv.style.display = 'none';
    loreDiv.innerHTML = '';
  } else {
    // Close other open lore panels
    document.querySelectorAll('.achievement-lore').forEach(d => { d.style.display = 'none'; d.innerHTML = ''; });
    loreDiv.style.display = 'block';
    loreDiv.innerHTML = `<div style="font-weight:bold;color:${color};margin-bottom:4px;">&#10022; ${name} — 设定词条 &#10022;</div>${lore}`;
  }
}

function checkAchievement(ach, gs) {
  if (!ach.condition) return false;
  return ach.condition(gs);
}

</script>
</body>
</html>
