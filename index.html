// ============================================================
// 19-30岁 青年期
// ============================================================
function generateYoungAdultEvents(age, a, f, bp, tags) {
  const events = [];

  // 职业选择（19岁）——天赋优先匹配
  if (age === 19) {
    addMilestone('成年');

    // === 天赋优先匹配 ===
    const talentOrg = getTalentOrg();
    if (talentOrg) {
      const mappedOrgs = ORG_MAP[talentOrg] || [talentOrg];
      const targetOrg = pick(mappedOrgs);
      if (!canJoinOrg(targetOrg)) {
        const current = getCurrentOrg();
        events.push(evt(
          `你原本因天赋适合加入${targetOrg}，但你已经是${current}的一员。两个组织水火不容，你的道路被堵死了。`,
          'talent_org_blocked', '意志-1', false
        ));
        modAttr('wil', -1);
      } else {
        // 天赋直接匹配成功
        let joinText = '', joinId = '', effects = {};
        if (isFingerOrg(targetOrg)) {
          joinText = `你成年了。天生属于${targetOrg}的血脉在你体内觉醒，家族的关系网迅速将你吸纳进去。`;
          joinId = 'finger_talent_join_' + targetOrg;
          effects = { con: 1, wea: 2 };
          setFlag('finger_joined', targetOrg);
          if (targetOrg === '食指') setFlag('index_finger_member', true);
          setFlag('org_rank', '外围成员');
        } else if (isAssociation(targetOrg)) {
          joinText = `你的才能引起了${targetOrg}的注意。经过考核，你成为了协会的一名收尾人。`;
          joinId = 'assoc_talent_join_' + targetOrg;
          effects = { con: 1, int: 1, wea: 1 };
          setFlag('org', targetOrg);
          setFlag('org_rank', '九阶收尾人');
        } else if (isGang(targetOrg)) {
          joinText = `后巷的血脉在呼唤你。你顺理成章地加入了${targetOrg}。`;
          joinId = 'gang_talent_join_' + targetOrg;
          effects = { con: 2, wea: 1 };
          setFlag('org', targetOrg);
          setFlag('org_rank', '帮众');
        } else if (targetOrg === '工坊') {
          joinText = '你对奇点技术的敏感让你进入了工坊。这里到处是未完成的实验品和疯狂的创意。';
          joinId = 'workshop_talent_join';
          effects = { int: 2 };
          setFlag('org', '工坊');
        } else if (targetOrg === '事务所') {
          joinText = '你创办了一家事务所。虽然不大，但这是属于你自己的事业。';
          joinId = 'office_talent_join';
          effects = { int: 1, wea: 1 };
          setFlag('org', '事务所');
        } else if (targetOrg === '收尾人') {
          joinText = '你成为了一名自由收尾人。没有协会庇护，但也没有协会的束缚。';
          joinId = 'freelance_talent_join';
          effects = { con: 1, wil: 1 };
          setFlag('org', '收尾人');
        } else if (targetOrg === '翼公司') {
          joinText = '不可思议，你竟获得了翼公司的录用通知。那是无数人梦寐以求的机会。';
          joinId = 'wing_talent_join';
          effects = { int: 2, wea: 3 };
          setFlag('org', '翼公司');
        } else if (targetOrg === '齿轮教会') {
          joinText = '钢铁的呼唤在你的梦中回响。你找到了齿轮教会，他们早已等候多时。';
          joinId = 'gear_talent_join';
          effects = { con: 1, int: 1 };
          setFlag('org', '齿轮教会');
        } else if (targetOrg === '血魔') {
          joinText = '某种古老的血脉在你体内苏醒。你找到了同类，成为了血魔的一员。';
          joinId = 'blood_talent_join';
          effects = { con: 2, wil: -2 };
          setFlag('org', '血魔');
          setFlag('half_immortal', true);
        } else {
          joinText = `你成年了，加入了${targetOrg}。`;
          joinId = 'org_talent_join_' + targetOrg;
          effects = { wea: 1 };
          setFlag('org', targetOrg);
        }
        events.push(evt(joinText, joinId, effects, true, '加入' + targetOrg));
        addMilestone('加入' + targetOrg);
        // 应用效果
        if (effects.con) modAttr('con', effects.con);
        if (effects.int) modAttr('int', effects.int);
        if (effects.wil) modAttr('wil', effects.wil);
        if (effects.wea) modAttr('wea', effects.wea);
      }
    }

    // === 无天赋匹配时的常规职业选择 ===
    if (!getCurrentOrg()) {
      const careers = [
        { name: '翼公司员工', req: { int: 5, wea: 4 }, eff: 'int+2,wea+1' },
        { name: '协会收尾人', req: { con: 5, wil: 4 }, eff: 'con+1,wil+1' },
        { name: '工坊工匠', req: { int: 5 }, eff: 'int+2' },
        { name: '事务所收尾人', req: { con: 4 }, eff: 'con+1,wea+1' },
        { name: '帮派成员', req: { con: 4, wil: 3 }, eff: 'con+1' },
        { name: '手指成员', req: { wil: 5 }, eff: 'wil+1,wea+1' },
        { name: '自由收尾人', req: null, eff: 'con+1,int+1' },
        { name: '废墟探险者', req: { con: 4, int: 4 }, eff: 'int+1' },
        { name: '大湖航海者', req: { con: 4 }, eff: 'con+1' },
        { name: '血棒商贩', req: null, eff: 'wea+1' },
      ];
      const validCareers = careers.filter((c) => {
        if (!c.req) return true;
        return Object.keys(c.req).every((k) => (a[k] || 0) >= c.req[k]);
      });
      const career = pick(validCareers.length > 0 ? validCareers : careers);
      events.push(evt(
        `你成年了。你选择了成为${career.name}，开始了你的都市人生。`,
        'career', career.eff.replace(/,/g, '，'), true, `成为${career.name}`
      ));
      if (career.eff.includes('con+1')) modAttr('con', 1);
      if (career.eff.includes('con+2')) modAttr('con', 2);
      if (career.eff.includes('int+1')) modAttr('int', 1);
      if (career.eff.includes('int+2')) modAttr('int', 2);
      if (career.eff.includes('wil+1')) modAttr('wil', 1);
      if (career.eff.includes('wil+2')) modAttr('wil', 2);
      if (career.eff.includes('wea+1')) modAttr('wea', 1);
      if (career.eff.includes('wea+2')) modAttr('wea', 2);
      setFlag('career', career.name);
    }
  }

  // 手指加入事件（20-28岁）
  if (age >= 20 && age <= 28 && !getFlag('finger_joined') && chance(0.06)) {
    // 如果已在其他组织，先触发冲突/制裁剧情
    const currentOrg = getCurrentOrg();
    if (currentOrg && !isFingerOrg(currentOrg)) {
      events.push(evt(
        `${currentOrg}的对手——某个手指向你伸出了橄榄枝。在都市中，脚踏两条船是危险的，但机会难得。`,
        'finger_invite_conflict', '', true, '手指的邀请'
      ));
      events.push(...orgSanction(currentOrg));
      if (!gameState.alive) return events;
      setFlag('org', null);
    }

    const fingers = [
      { name: '拇指', req: { con: 5 }, attr: 'con', desc: '拇指看重你的体质和战斗能力。红大衣在向你招手。' },
      { name: '食指', req: { int: 5 }, attr: 'int', desc: '食指需要你的智慧来理解和执行指令。' },
      { name: '中指', req: { wil: 5 }, attr: 'wil', desc: '中指认可你的意志。恩怨的链条将你永远束缚。' },
      { name: '环指', req: { int: 5 }, attr: 'int', desc: '环指看上了你的艺术天赋——或者说是扭曲的潜质。' },
      { name: '小指', req: null, attr: null, desc: '小指神秘地向你发出了邀请。没有人知道他们为什么选择你。' },
    ];

    for (const finger of fingers) {
      const meetsReq = !finger.req || Object.keys(finger.req).every((k) => (a[k] || 0) >= finger.req[k]);
      if (meetsReq && chance(0.06)) {
        events.push(evt(
          `${finger.desc}你成为了${finger.name}的一员。`,
          'finger_join', '家境+1，意志+1', true, `加入${finger.name}`
        ));
        modAttr('wea', 1); modAttr('wil', 1);
        setFlag('finger_joined', finger.name);
        if (finger.name === '食指') setFlag('index_finger_member', true);
        addMilestone(`加入${finger.name}`);
        break;
      }
    }
  }

  // 帮派加入事件（20-28岁）
  if (age >= 20 && age <= 28 && !getFlag('gang_joined') && chance(0.06)) {
    // 帮派与手指/协会互斥
    const currentOrg = getCurrentOrg();
    if (currentOrg && (isFingerOrg(currentOrg) || isAssociation(currentOrg))) {
      events.push(evt(
        `帮派的人找到了你，希望你加入他们。但你已经是${currentOrg}的一员，帮派的规矩和${currentOrg}完全不同。`,
        'gang_invite_conflict', '', true, '帮派的邀请'
      ));
      events.push(...orgSanction(currentOrg));
      if (!gameState.alive) return events;
      setFlag('finger_joined', null);
      setFlag('org', null);
    }

    const gangs = [
      { name: '黑云会', cond: () => bp === 'nine' || bp === 'backstreet', eff: 'con+1,wil+1' },

function addEvent(ev) {
  ev.age = gameState.age;
  gameState.events.push(ev);
  if (ev.milestone) gameState.milestones.push(ev.milestone);

  const log = document.getElementById('event-log');
  const entry = document.createElement('div');
  entry.className = 'event-entry' + (ev.major ? ' major' : '');
  entry.innerHTML = `
    <div class="event-age">${gameState.age}岁</div>
    <div>
      <div class="event-text">${formatEventText(ev.text)}</div>
      ${ev.effText ? `<div class="event-effect"><span class="${getEffectClass(ev.effText)}">${ev.effText}</span></div>` : ''}
    </div>
  `;
  log.appendChild(entry);
  // Scroll to bottom
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function getEffectClass(effText) {
  const hasNeg = effText.match(/-\d/);
  return hasNeg ? 'eff-bad' : 'eff-good';
}

function updateSimStats() {
  const a = gameState.attrs;
  const stats = document.getElementById('sim-stats');
  stats.innerHTML = `
    <div class="stat-item">体质 <span class="stat-val">${a.con}</span></div>
    <div class="stat-item">智力 <span class="stat-val">${a.int}</span></div>
    <div class="stat-item">意志 <span class="stat-val">${a.wil}</span></div>
    <div class="stat-item">家境 <span class="stat-val">${a.wea}</span></div>
    <div class="stat-item">快乐 <span class="stat-val" style="color:${gameState.happiness >= 0 ? '#5a9e6f' : '#c0392b'}">${gameState.happiness}</span></div>
  `;
  document.getElementById('sim-age').textContent = `${gameState.age}岁`;
}

function toggleSimSpeed() {
  gameState.simAuto = !gameState.simAuto;
  const btn = document.getElementById('btn-sim-speed');
  const nextBtn = document.getElementById('btn-next-event');
  if (gameState.simAuto) {
    btn.textContent = '暂停';
    if (nextBtn) nextBtn.style.opacity = '0.4';
    // If there are pending events, continue auto-displaying them
    if (gameState.pendingEvents && gameState.eventIndex < gameState.pendingEvents.length) {
      const cb = gameState.afterEventCallback;
      gameState.afterEventCallback = null;
      const speed = getSimSpeed();
      const delay = getEventDelay(speed);
      gameState.simTimer = setTimeout(() => showNextEvent(cb), delay);
    } else if (gameState.alive && !gameState.dead) {
      nextYear();
    }
  } else {
    btn.textContent = '自动播放';
    if (nextBtn) nextBtn.style.opacity = '1';
    if (gameState.simTimer) clearTimeout(gameState.simTimer);
  }
}

function finishSim() {
  gameState.simAuto = false;
  if (gameState.simTimer) clearTimeout(gameState.simTimer);

  // Fast forward all remaining years
  while (gameState.alive) {
    const events = generateEvents(gameState.age);
    events.forEach(ev => {
      ev.age = gameState.age;
      gameState.events.push(ev);
      if (ev.milestone) gameState.milestones.push(ev.milestone);
    });
    if (gameState.happiness <= -10) {
      gameState.alive = false;
      gameState.flags.twisted = true;
      gameState.events.push({ text: '你的内心承受不住都市的重压，理性崩溃了……', effect: '扭曲了', major: true, age: gameState.age });
    }
    if (gameState.attrs.con <= 0) {
      gameState.alive = false;
      gameState.events.push({ text: '你的身体已无法承受都市的残酷。', effect: '体质归零', major: true, age: gameState.age });
    }
    if (!gameState.alive) break;

    gameState.age++;
    let deathChance = 0;
    if (gameState.age > 70) deathChance = (gameState.age - 70) * 0.03;
    if (gameState.age > 80) deathChance += (gameState.age - 80) * 0.05;
    if (gameState.age > 90) deathChance += 0.3;
    if (Math.random() < deathChance) {
      gameState.alive = false;
      gameState.events.push({ text: `你在${gameState.age}岁时安详地离开了这个世界。`, effect: '' });
    }
    const maxAge = 100 + (gameState.lifeExtended || 0);
    if (gameState.age > maxAge) {
      gameState.alive = false;
      gameState.events.push({ text: '你在这个都市活了太久太久。' });
    }
  }

  // Render all events quickly
  const log = document.getElementById('event-log');
  log.innerHTML = '';
  gameState.events.forEach(ev => {
    const entry = document.createElement('div');
    entry.className = 'event-entry' + (ev.major ? ' major' : '');
    entry.style.opacity = '1';
    entry.style.animation = 'none';
    entry.innerHTML = `
      <div class="event-age">${ev.age || '?'}</div>
      <div>
        <div class="event-text">${ev.text}</div>
        ${ev.effText ? `<div class="event-effect"><span class="${getEffectClass(ev.effText)}">${ev.effText}</span></div>` : ''}
      </div>
    `;
    log.appendChild(entry);
  });

  setTimeout(() => endSimulation(), 500);
}

function endSimulation() {
  gameState.simAuto = false;
  if (gameState.simTimer) clearTimeout(gameState.simTimer);
  const ctrl = document.getElementById('sim-controls');
  ctrl.classList.remove('hidden');
  ctrl.innerHTML = '<button class="btn btn-sm btn-gold" onclick="showResults()" style="font-size:1.1em;padding:12px 32px;">查看人生总结</button>';
}

function calculateRank() {
  const gs = gameState;
  const achievements = checkAchievements(gs);
  const achCount = achievements.length;
  const milestoneCount = gs.milestones.length;
  const con = gs.attrs.con || 0, int = gs.attrs.int || 0, wil = gs.attrs.wil || 0, wea = gs.attrs.wea || 0;
  const attrSum = con + int + wil + wea;
  const rarityWeights = { common: 5, rare: 12, epic: 25, legend: 50 };
  let achScore = 0;
  for (const a of achievements) achScore += rarityWeights[a.rarity] || 5;
  const age = gs.age || 0;
  const ext = gs.lifeExtended || 0;
  const ageScore = age >= 100 + ext ? 30 + ext : age >= 80 ? 25 : age >= 60 ? 20 : age >= 40 ? 15 : age >= 25 ? 10 : age >= 15 ? 5 : 0;
  const deathPenalty = gs.alive ? 0 : 15;

  // 快速通道
  if (gs.milestones.includes('杂质') || gs.milestones.includes('都市之星')) {
    return { rank: 'S+', label: '杂质 / 都市之星', quote: '你在都市的历史中留下了不可磨灭的痕迹。无论是作为英雄还是噩梦，你的名字将永远被铭记。', color: '#ff3864', score: 999, achievements, note: '被都市认定为杂质，或是传说般的都市之星。' };
  }
  if (gs.milestones.includes('色彩级收尾人') || gs.milestones.includes('漆黑静默') || gs.milestones.includes('殷红迷雾') || gs.milestones.includes('堇紫泪滴')) {
    return { rank: 'S', label: '色彩级收尾人', quote: '色彩级——收尾人中的传奇。你的名字足以让后巷的耗子停止呼吸。', color: '#f1c40f', score: 900, achievements, note: '你是收尾人中的传奇，色彩级的威名响彻都市。' };
  }
  if (gs.flags.twisted) {
    return { rank: 'S', label: '异想体', quote: '都市的噩梦并非只存在于传说之中。那些扭曲的灵魂，终将化为异想体，永远游荡在这片黑暗之中。', color: '#8B0000', score: 850, achievements, note: '你成为了都市 nightmares 的一部分。' };
  }
  if (gs.flags.book) {
    return { rank: 'S', label: '书籍', quote: '你的故事被收录在了安吉拉的图书馆中。在这座无尽的图书馆里，你将以另一种形式继续存在。', color: '#9b59b6', score: 800, achievements, note: '图书馆中的一本书，另一个永恒的开始。' };
  }

  const total = attrSum * 2 + milestoneCount * 8 + achScore + ageScore - deathPenalty;
  let rank, label, quote, color, note;
  if (total >= 350) { rank='S+'; label='杂质 / 都市之星'; quote='你在都市的历史中留下了不可磨灭的痕迹。'; color='#ff3864'; note='被都市认定为杂质，或是传说般的都市之星。'; }
  else if (total >= 280) { rank='S'; label='色彩级收尾人'; quote='色彩级——收尾人中的传奇。'; color='#f1c40f'; note='你的名字足以让后巷的耗子停止呼吸。'; }
  else if (total >= 220) { rank='A+'; label='一阶收尾人'; quote:'一阶——职业收尾人的顶点。都市的梦魇在你面前不过是一场噩梦。'; color='#daa520'; note:'职业最高等级，精英中的精英。'; }
  else if (total >= 160) { rank='A'; label='二阶收尾人'; quote:'二阶——"上游"的实力。你可以承接都市梦魇级的委托了。'; color='#4a7fb5'; note:'足以应对大多数都市恶疾。'; }
  else if (total >= 110) { rank='B'; label='五阶收尾人'; quote:'五阶——"中游"的起点。你已经在都市中站稳了脚跟。'; color='#7a6f5a'; note:'在后巷中已算一方强者。'; }
  else if (total >= 70) { rank='C'; label='七阶收尾人'; quote:'七阶——你加入了有名气的事务所，但距离真正的强者还差得远。'; color='#555'; note:'勉强在都市的夹缝中求生。'; }
  else if (total >= 35) { rank='D'; label='九阶收尾人'; quote:'九阶——刚握起武器的普通人。都市不会记住你的名字。'; color='#666'; note:'后巷底层的无名之辈。'; }
  else { rank='E'; label='耗子 / 底层'; quote:'在这座巨大的都市里，你连成为九阶的资格都没有。'; color:'#444'; note:'都市从不缺少这样的尘埃。'; }

  return { rank, label, quote, color, score: total, achievements, note };
}

    ];
    storyParts.push(aTexts[Math.floor(Math.random() * aTexts.length)]);
  }

  let story = storyParts.join("");

  }
  if (story.length > 400) story = story.substring(0, 397) + "……";
  return story;
}

function getHighlightMoments() {
  const { events, milestones } = gameState;
  const highlights = [];
  const majorEvents = events.filter(e => e.major);
  for (const ev of majorEvents) {
    highlights.push({
      name: ev.milestone || (ev.text.length > 15 ? ev.text.substring(0, 15) + "……" : ev.text),
      desc: ev.effText || "这是一段改变人生的经历。",
      type: "major"
    });
    if (highlights.length >= 5) break;
  }
  if (highlights.length < 3) {
    for (const ms of milestones) {
      highlights.push({ name: ms, desc: "人生的重要里程碑。", type: "milestone" });
      if (highlights.length >= 5) break;
    }
  }
  if (highlights.length < 3) {
    const sig = events.filter(e => !e.major && e.effText && (/[\+\-]\d/.test(e.effText) || /获得|失去/.test(e.effText)));
    for (const ev of sig.slice(0, 3)) {
      highlights.push({ name: ev.text.substring(0, 15) + "……", desc: ev.effText, type: "significant" });
      if (highlights.length >= 5) break;
    }
  }
  return highlights.slice(0, 5);
}

function getLibraryEnding() {
  const { attrs, flags } = gameState;
  if (!flags.library_invite) return null;
  const a = attrs;
  let aWeight = 0.30, bWeight = 0.25, cWeight = 0.20, bookWeight = 0.25;
  if ((a.wil || 0) >= 8) { cWeight += 0.10; aWeight -= 0.05; bWeight -= 0.05; }
  if ((a.int || 0) >= 8) { bookWeight += 0.10; aWeight -= 0.05; }
  if ((a.con || 0) >= 8) { cWeight += 0.05; bookWeight += 0.05; aWeight -= 0.10; }
  if ((a.con || 0) <= 3) { aWeight += 0.10; cWeight -= 0.10; }
  const roll = Math.random();
  if (roll < aWeight) {
    return { type: 'A', title: '图书馆A结局', desc: '你在图书馆的接待中失败了。安吉拉将你的故事化作了一本书，永远地陈列在图书馆的书架上。', effect: '死亡' };
  } else if (roll < aWeight + bWeight) {
    return { type: 'B', title: '图书馆B结局', desc: '你在图书馆中迷失了。无尽的书架、无尽的走廊，你再也找不到出口。你的意识逐渐消散，成为了图书馆的一部分。', effect: '死亡' };
  } else if (roll < aWeight + bWeight + cWeight) {
    return { type: 'C', title: '图书馆C结局', desc: '你在图书馆的接待中奇迹般地存活了下来。当你再次睁开眼睛时，你发现自己躺在都市的某个角落——你复活了。', effect: '复活' };
  } else {
    return { type: 'BOOK', title: '夺书者', desc: '你不仅存活了下来，还从图书馆中夺走了一本书。那本书中蕴含着某个强大存在的力量。你成为了都市中少数从图书馆全身而退的人。', effect: '获得力量' };
  }
}

function hideAllPhases() {
  document.querySelectorAll('.phase').forEach(p => p.classList.add('hidden'));

  if (gameState.simTimer) clearTimeout(gameState.simTimer);

function showPhase(id) {
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  gameState.phase = id;
  if (id === 'phase-sim') {
    document.getElementById('sim-controls').classList.remove('hidden');
  }
  window.scrollTo(0, 0);
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (gameState.phase === 'phase-sim') {
    if (e.code === 'Space') {
      e.preventDefault();
      if (!gameState.simAuto) {
        nextYear();
      } else {
        toggleSimSpeed();
      }
    }
    if (e.code === 'Enter') {
      e.preventDefault();
      toggleSimSpeed();
    }
  }
});

/**
 * 检查单个组合标签是否匹配当前已选天赋
 * @param {string[]} comboTags — 该组合线要求的标签列表
 * @returns {boolean}
 */
function matchComboTags(comboTags) {
  // 所有标签必须同时满足
  return comboTags.every(tag => hasTag(tag));
}

/**
 * 检查是否匹配某一条特定组合线
 * @param {string} lineId — 组合线ID（如 'anglica'）
 * @returns {object|null} — 匹配返回线定义，否则返回null
 */
function checkComboLine(lineId) {
  const line = COMBO_LINES.find(l => l.line === lineId);
  if (!line) return null;
  if (matchComboTags(line.tags)) {
    return line;
  }
  return null;
}

/**
 * 检查所有组合线，返回所有匹配的结果（按优先级排序，隐藏线优先）
 * @returns {object[]}
 */
function checkAllComboLines() {
  const matched = COMBO_LINES.filter(line => matchComboTags(line.tags));
  // 隐藏线排在前面（它们通常要求更严格）
  matched.sort((a, b) => {
    if (a.hidden && !b.hidden) return -1;
    if (!a.hidden && b.hidden) return 1;
    // 标签更多的组合排在前面（更具体）
    return b.tags.length - a.tags.length;
  });
  return matched;
}

/**
 * 购买生命保险
 * @param {string} companyId — 保险公司ID
 * @returns {boolean} — 是否购买成功
 */
function buyLifeInsurance(companyId) {
  const insurance = INSURANCE_COMPANIES.find(i => i.id === companyId);
  if (!insurance) {
    subEvt('system', 'insurance_invalid', '未知的保险公司。', false, '购买失败');
    return false;
  }

  // 检查年龄（必须成年才能购买）
  if (gameState.age < 18) {
    subEvt('system', 'insurance_too_young', '未成年人无法购买生命保险。', false, '购买失败');
    return false;
  }

  // 检查是否已经持有同一家保险
  const current = getFlag('lifeInsurance');
  if (current && current.companyId === companyId && current.remaining > 0) {
    subEvt('system', 'insurance_duplicate', `你已经持有${insurance.name}。`, false, '购买失败');
    return false;
  }

  // 检查家境
  if ((gameState.attrs.wea || 0) < insurance.costWea) {
    subEvt('system', 'insurance_too_poor', `你的家境不足以支付${insurance.name}的费用（需要${insurance.costWea}）。`, false, '购买失败');
    return false;
  }

  // 扣款并投保
  modAttr('wea', -insurance.costWea);
  setFlag('lifeInsurance', {
    companyId: insurance.id,
    companyName: insurance.name,
    remaining: insurance.resurrectionCount,
    memoryLoss: insurance.memoryLoss,
    attrPenalty: insurance.attrPenalty,
    sideEffect: insurance.sideEffect || false,
    luckPenalty: insurance.luckPenalty || false,
  });

  subEvt('major', `insurance_bought_${companyId}`, `你购买了${insurance.name}。花费家境${insurance.costWea}。死亡后将获得一次复活机会。`, true, '生命保险');
  addMilestone(`购买${insurance.name}`);
  return true;
}

/**
 * 使用生命保险复活（在death()之后调用，若返回true则阻止死亡）
 * @returns {boolean} — 是否成功复活
 */
function useLifeInsurance() {
  const insurance = getFlag('lifeInsurance');
  if (!insurance || insurance.remaining <= 0) return false;

  insurance.remaining -= 1;
  setFlag('lifeInsurance', insurance);

  const company = INSURANCE_COMPANIES.find(i => i.id === insurance.companyId);

  let desc = `${company.name}的复活服务生效了。`;

  // 记忆损失
  if (insurance.memoryLoss) {
    desc += '但你失去了大量记忆，像做了一场很长很长的梦，醒来后什么都不记得了。';
    setFlag('amnesia', true);
    // 清除部分里程碑记录（模拟记忆损失）
    if (gameState.milestones && gameState.milestones.length > 3) {
      const preserved = gameState.milestones.slice(-3); // 只保留最近3个
      gameState.milestones.length = 0;
      gameState.milestones.push(...preserved);
    }
  }

  // 属性惩罚
  if (insurance.attrPenalty > 0) {
    const penalty = insurance.attrPenalty;
    modAttr('con', -(gameState.attrs.con || 0) * penalty);
    modAttr('int', -(gameState.attrs.int || 0) * penalty);
    modAttr('wil', -(gameState.attrs.wil || 0) * penalty);
    desc += `复活对你的身体造成了负担，全属性下降${(penalty * 100).toFixed(0)}%。`;
  }

  // 额外副作用（拇指黑市保险）
  if (insurance.sideEffect && chance(0.5)) {
    const sideEffects = [
      '复活后你发现身上多了一道来历不明的疤痕。',
      '你的味觉完全消失了，食物对你来说只是颜色不同的泥。',
      '你偶尔会听到不属于你的低语声。',
    ];
    const se = pick(sideEffects);
    desc += ` ${se}`;
    setFlag('resurrectionSideEffect', true);
  }

  // 运气惩罚
  if (insurance.luckPenalty) {
    setFlag('badLuck', true);
    desc += ' 你感觉自己的运气变差了。';
  }

  subEvt('major', 'insurance_resurrection', desc, true, '复活');
  addMilestone(`通过${company.name}复活`);

  // 复活后恢复少量体质
  modAttr('con', 5);
  return true;
}

 */
const FLOW_BONUS_MAP = {
  // 拇指 — 强化体质与武力
  '拇指': { con: 2, int: 0, wil: 1, wea: 0 },
  // 食指 — 强化意志与执行力

  // 中指 — 均衡
  '中指': { con: 1, int: 1, wil: 1, wea: 0 },
  // 无名指 — 强化家境（商业）
  '无名指': { con: 0, int: 1, wil: 0, wea: 2 },
  // 小指 — 强化情报与智力
  '小指': { con: 0, int: 2, wil: 1, wea: 0 },
  // 协会 — 综合均衡加成
  '协会': { con: 1, int: 1, wil: 1, wea: 0 },
  // 一阶/高阶收尾人 — 全面提升
  '一阶': { con: 2, int: 2, wil: 2, wea: 0 },
  '二阶': { con: 1, int: 1, wil: 2, wea: 0 },
  // 帮派 — 体质与家境
  '帮派': { con: 1, int: 0, wil: 1, wea: 1 },
  // 血魔 — 体质爆发
  '血魔后裔': { con: 3, int: 0, wil: -1, wea: 0 },
  // 非人之性体 — 智识与异常
  '非人之性体': { con: 0, int: 2, wil: 0, wea: 0 },
  // 实验品 — 不确定
  '实验品': { con: 1, int: 1, wil: 0, wea: 0 },
  // 代行者 — 意志特化
  '代行者': { con: 0, int: 0, wil: 3, wea: 0 },
  // 漆黑缄默/苍蓝残响 — 极端加成
  '双生子': { con: 1, int: 1, wil: 2, wea: 0 },
};

/**
 * 获取指定天赋标签在对应组织事件中的属性加成
 * @param {string} tag — 天赋标签
 * @param {string} attr — 属性名（con/int/wil/wea），可选，若不传则返回全部加成
 * @returns {number|object}
 */
function getFlowBonus(tag, attr) {
  const bonus = FLOW_BONUS_MAP[tag];
  if (!bonus) {
    // 未定义的标签无加成
    return attr ? 0 : { con: 0, int: 0, wil: 0, wea: 0 };
  }

  if (attr) {
    return bonus[attr] || 0;
  }
  return { ...bonus };
}

/**
 * 获取当前所有已选天赋标签的合计流向加成
 * @returns {object} — { con, int, wil, wea }
 */
function getAllFlowBonuses() {
  const total = { con: 0, int: 0, wil: 0, wea: 0 };

  if (!gameState.selectedTalents) return total;

  for (const talent of gameState.selectedTalents) {
    if (!talent.tag) continue;
    const bonus = FLOW_BONUS_MAP[talent.tag];
    if (bonus) {
      total.con += bonus.con || 0;
      total.int += bonus.int || 0;
      total.wil += bonus.wil || 0;
      total.wea += bonus.wea || 0;
    }
  }

  return total;
}

/**
 * 在组织事件中应用天赋流向加成
 * @param {string} orgTag — 组织标签（如 '拇指'）
 * @param {string} eventType — 事件类型（用于日志）
 */
function applyFlowBonusInEvent(orgTag, eventType) {
  const bonus = getFlowBonus(orgTag);
  if (!bonus) return;

  let hasBonus = false;
  for (const [attr, val] of Object.entries(bonus)) {
    if (val !== 0) {
      modAttr(attr, val);
      hasBonus = true;
    }
  }

  if (hasBonus) {
    subEvt('bonus', `flow_${orgTag}_${eventType}`, `你的${orgTag}天赋在此事件中发挥了作用，获得属性加成。`, false, '流向加成');
  }
}

/**
 * 死亡时检查生命保险（包装函数，建议替换原 death() 或在 death() 中调用）
 * @param {string} cause — 死亡原因
 * @returns {boolean} — true = 被保险救活，false = 正常死亡
 */
function checkDeathInsurance(cause) {
  // 先尝试使用保险
  if (useLifeInsurance()) {
    return true;
  }
  // 没有保险或次数用完，正常死亡
  death(cause);
  return false;
}

        "U公司的收购员用冷漠的眼神称量着鲸油。这种黑色的液体是都市运转的血液，也是无数捕鲸者的生命换来的。你获得了一笔可观的报酬。",
        false,
        "鲸油商人"
      );
      modAttr("wea", 8);
      modAttr("int", 1);
      // 接触U公司可能带来后续影响
      if (chance(0.06)) {
        setFlag("u_company_marked", true);
        gameState.events.push("U公司对你产生了兴趣");
      }
    }
  }

  // A4. 船员的叛乱
  function crewMutiny() {
    if (!getFlag("whaling_joined")) return;
    if (getFlag("mutiny_resolved")) return;

    if (chance(0.06)) {
      setFlag("mutiny_resolved", true);
      const leadership = gameState.attrs.wil + gameState.attrs.int;
      if (leadership >= 13) {
        subEvt(
          gameState.age,
          "平息叛乱",
          "船员们受够了U公司的压榨，打算夺船逃跑。你凭借威望和智慧平息了叛乱——或者说，你成为了新的领袖，让叛乱以一种更'体面'的方式结束了。",
          true,
          "叛乱调解者"
        );
        addMilestone("叛乱调解者");
        modAttr("wil", 3);
        modAttr("int", 2);
        modAttr("wea", 3);
        setFlag("whaling_captain", true);
      } else if (gameState.attrs.con >= 7) {
        subEvt(
          gameState.age,
          "叛乱幸存者",
          "叛乱爆发了。在血腥的混战中，你用拳头杀出了一条血路，跳船逃生。捕鲸生涯就此结束。",
          true,
          null
        );
        modAttr("con", 1);
        modAttr("wil", -2);
        modAttr("wea", -3);
        setFlag("whaling_joined", false);
        gameState.events.push("在捕鲸船叛乱中幸存");
      } else {
        subEvt(
          gameState.age,
          "死于叛乱",
          "你选错了站队。在叛乱的内讧中，你被两边都不信任的人从背后捅了刀。",
          true,
          null
        );
        death("捕鲸船叛乱中被杀");
        return;
      }
    }
  }

  // A5. 大湖海盗
  function lakePirates() {
    if (!getFlag("whaling_joined")) return;
    if (getFlag("pirate_encounter")) return;

    if (chance(0.06)) {
      setFlag("pirate_encounter", true);
      const combat = gameState.attrs.con + gameState.attrs.int + (getFlag("whaling_captain") ? 3 : 0);
      if (combat >= 15) {
        subEvt(
          gameState.age,
          "击退海盗",
          "大湖海盗的快船包围了你们。但你早已不是新手——指挥船员们击退了海盗，甚至缴获了他们的船只。U公司对你的评价提升了。",
          true,
          "海盗克星"
        );
        addMilestone("海盗克星");
        modAttr("wea", 6);
        modAttr("wil", 2);
        modAttr("con", 1);
      } else if (gameState.attrs.int >= 6 && chance(0.06)) {
        subEvt(
          gameState.age,
          "智退海盗",
          "面对数倍于己的海盗，你用计谋将他们引入了U公司巡逻队的航线。海盗仓皇逃窜，你安然无恙。",
          false,
          null
        );
        modAttr("int", 2);
        modAttr("wil", 1);
      } else {
        subEvt(
          gameState.age,
          "海盗劫掠",
          "海盗登船了。你的一切都被抢走，被扔在大湖的一叶扁舟上自生自灭。",
          true,
          null
        );
        modAttr("wea", -Math.min(10, gameState.attrs.wea));
        modAttr("con", -3);
        modAttr("wil", -2);
        setFlag("whaling_joined", false);
        gameState.events.push("被大湖海盗洗劫一空");
        // 漂流求生
        if (gameState.attrs.con < 5 || chance(0.06)) {
          subEvt(
            gameState.age,
            "葬身大湖",
            "没有食物，没有淡水。大湖的波涛最终吞噬了你疲惫的身躯。",
            true,
            null
          );
          death("大湖漂流中力竭而死");
        }
      }
    }
  }

  // 执行大湖捕鲸事件链
  joinWhalingShip();
  if (gameState.alive) encounterWhalePod();
  if (gameState.alive) acquireWhaleOil();
  if (gameState.alive) crewMutiny();
  if (gameState.alive) lakePirates();

  // 累积捕鲸年数
  if (getFlag("whaling_joined") && gameState.alive) {
    gameState.flags.whaling_years = (gameState.flags.whaling_years || 0) + 1;
    if (gameState.flags.whaling_years >= 5 && !hasMilestone("资深捕鲸者")) {
      addMilestone("资深捕鲸者");
      subEvt(
        gameState.age,
        "资深捕鲸者",
        "五年的大湖生涯让你成为了一名经验丰富的捕鲸者。你的皮肤被盐水侵蚀，眼神却比任何人都要锐利。",
        false,
        "资深捕鲸者"
      );
      modAttr("con", 2);
      modAttr("wil", 2);
    }
  }
}

// ============================================
// B. 工坊剧情扩展 (Workshop Storyline)
// ============================================

/**
 * 工坊是都市科技的基石，奇点科技在这里诞生。
 * 玩家可以在工坊中学习、成长，也可能遭遇各种事故。
 */
function workshopEvents() {

  // B1. 工坊学徒的日常
  function workshopApprenticeDaily() {
    if (gameState.age < 14 || gameState.age > 60) return;
    if (!getFlag("workshop_apprentice") && chance(0.06)) {
      // 成为工坊学徒的契机
      const workshopTypes = ["武器工坊", "义体工坊", "能源工坊", "防护工坊", "生物医药工坊"];
      const chosen = pick(workshopTypes);
      setFlag("workshop_apprentice", true);
      setFlag("workshop_type", chosen);
      subEvt(
        gameState.age,
        "工坊学徒",
        `你在${chosen}找到了一份学徒工作。工坊师傅是个古怪的老人，他教你的第一件事是：永远不要触碰那些发光的管子。`,
        false,
        "工坊学徒"
      );
      addMilestone("工坊学徒");
      modAttr("int", 2);
      modAttr("wea", -1); // 学徒工资微薄
    }

    if (getFlag("workshop_apprentice") && chance(0.06)) {
      // 日常事件
      const dailyEvents = [
        {
          text: "今天负责清理奇点引擎的残渣。那种蓝紫色的光芒让你头晕目眩，但你学会了如何安全处理它。",
          effect: () => { modAttr("int", 1); }
        },
        {
          text: "师傅让你独立完成一个小型义体零件的打磨。你成功了，虽然磨坏了三个才出一个合格的。",
          effect: () => { modAttr("int", 1); modAttr("con", -1); }
        },
        {
          text: "一个收尾人前来定制装备。你偷听到了他对最近任务的抱怨，对都市的黑暗又多了一分了解。",
          effect: () => { modAttr("wil", -1); modAttr("int", 1); }
        },
        {
          text: "加班到深夜，终于在师傅的指导下完成了第一件独立作品。",
          effect: () => { modAttr("int", 2); modAttr("con", -1); }
        }
      ];
      const daily = pick(dailyEvents);
      subEvt(
        gameState.age,
        "工坊日常",
        daily.text,
        false,
        null
      );
      daily.effect();
    }
  }

  // B2. 奇点科技接触
  function singularityTechEncounter() {
    if (!getFlag("workshop_apprentice")) return;
    if (getFlag("singularity_touched")) return;

    if (chance(0.06)) {
      setFlag("singularity_touched", true);
      const workshopType = getFlag("workshop_type") || "通用工坊";
      const intelligence = gameState.attrs.int;
      const willpower = gameState.attrs.wil;

      if (intelligence >= 8 && willpower >= 6) {
        // 成功掌握奇点科技
        subEvt(
          gameState.age,
          "奇点科技·理解",
          `在${workshopType}的深处，你第一次直接接触到了奇点科技的核心。那不是人类应该理解的知识，但你的智慧和意志承受住了冲击。你学会了它的运作原理——哪怕只是一小部分。`,
          true,
          "奇点理解者"
        );
        addMilestone("奇点理解者");
        modAttr("int", 4);
        modAttr("wil", 2);
        setFlag("singularity_mastered", true);
        // 根据工坊类型给予装备/能力提升
        switch (workshopType) {
          case "武器工坊":
            setFlag("equip_weapon_singularity", true);
            gameState.events.push("获得了奇点科技武器");
            break;
          case "义体工坊":
            setFlag("equip_cyber_singularity", true);
            modAttr("con", 3);
            gameState.events.push("安装了奇点科技义体");
            break;
          case "防护工坊":
            setFlag("equip_armor_singularity", true);
            gameState.events.push("获得了奇点科技护甲");
            break;
          default:
            setFlag("equip_tool_singularity", true);
            gameState.events.push("获得了奇点科技工具");
        }
      } else if (intelligence >= 5) {
        // 勉强理解，但有代价
        subEvt(
          gameState.age,
          "奇点科技·一瞥",
          `你偷看了师傅研究的奇点科技原型。那一刻，你的大脑像是被灼烧。你理解了些什么，却也失去了些什么。`,
          true,
          null
        );
        modAttr("int", 2);
        modAttr("wil", -2);
        modAttr("con", -1);
        gameState.events.push("接触过奇点科技，精神受创");
      } else {
        // 无法理解，遭受反噬
        subEvt(
          gameState.age,
          "奇点科技·疯狂",
          `好奇心害死了猫，也可能害死工坊学徒。你触碰了不该触碰的东西。那一刻，无数的公式和图像涌入脑海，你尖叫了整整三天。`,
          true,
          null
        );
        modAttr("int", -2);
        modAttr("wil", -4);
        modAttr("con", -2);
        if (chance(0.06)) {
          death("奇点科技精神污染");
          return;
        }
      }
    }
  }

  // B3. 工坊事故
  function workshopAccident() {
    if (!getFlag("workshop_apprentice")) return;
    if (getFlag("workshop_accident_survived")) return;

    // 奇点科技接触后事故概率上升
    const accidentChance = getFlag("singularity_touched") ? 0.2 : 0.08;
    if (chance(accidentChance)) {
      setFlag("workshop_accident_survived", true);
      const con = gameState.attrs.con;
      const int = gameState.attrs.int;

      const accidentTypes = [
        {
          name: "奇点引擎过载",
          text: "工坊的奇点引擎突然过载，蓝紫色的能量风暴席卷了整个车间。",
          survive: con >= 7 || int >= 7,
          surviveText: "你凭借本能（或知识）躲进了防护舱，活了下来，但皮肤被严重灼伤。",
          dieText: "能量风暴吞噬了一切。你的身体在奇点辐射中分解成了基本粒子。",
          effect: () => { modAttr("con", -3); modAttr("wea", -2); },
          cause: "工坊奇点引擎过载"
        },
        {
          name: "失控的实验体",
          text: "生物医药工坊的一个实验体挣脱了束缚，那东西已经不能称之为人了。",
          survive: con >= 8 || getFlag("equip_weapon_singularity"),
          surviveText: "你用身边的工具——或武器——击杀了那怪物，但手臂被撕下了大块血肉。",
          dieText: "那东西的力量超出了人类的想象。你成了它的养料。",
          effect: () => { modAttr("con", -4); modAttr("wil", -2); },
          cause: "被工坊失控实验体杀死"
        },
        {
          name: "化学爆炸",
          text: "原料混合时发生了剧烈的化学反应，爆炸将整个工坊掀翻。",
          survive: con >= 6 && int >= 5,
          surviveText: "爆炸前的一秒你察觉到了异常，躲到了承重墙后。浑身是血，但还活着。",
          dieText: "爆炸将你的意识撕成了碎片。甚至来不及感到疼痛。",
          effect: () => { modAttr("con", -4); modAttr("wea", -5); },
          cause: "工坊化学爆炸"
        }
      ];

      const accident = pick(accidentTypes);
      if (accident.survive) {
        subEvt(
          gameState.age,
          accident.name,
          accident.text + accident.surviveText,
          true,
          "工坊事故幸存者"
        );
        addMilestone("工坊事故幸存者");
        accident.effect();
      } else {
        subEvt(
          gameState.age,
          accident.name,
          accident.text + accident.dieText,
          true,
          null
        );
        death(accident.cause);
        return;
      }
    }
  }

  // B4. 成为工坊大师
  function becomeWorkshopMaster() {
    if (!getFlag("workshop_apprentice")) return;
    if (getFlag("workshop_master")) return;
    if (gameState.age < 25) return;

    // 需要足够的智力、经验和时间
    const apprenticeYears = gameState.flags.workshop_apprentice_years || 0;
    gameState.flags.workshop_apprentice_years = apprenticeYears + 1;

    if (gameState.attrs.int >= 8 && apprenticeYears >= 5 && chance(0.15)) {
      setFlag("workshop_master", true);
      const workshopType = getFlag("workshop_type") || "工坊";
      subEvt(
        gameState.age,
        "工坊大师",
        `多年的苦修终于开花结果。师傅将${workshopType}传给了你——或者说，他死于一次实验事故，而你是最有资格继承的人。从今天起，你是大师了。`,
        true,
        "工坊大师"
      );
      addMilestone("工坊大师");
      modAttr("int", 3);
      modAttr("wil", 2);
      modAttr("wea", 5);
      gameState.events.push(`成为了${workshopType}的大师`);
    }
  }

  // B5. 工坊之间的竞争 (Tres协会仲裁)
  function workshopCompetition() {
    if (!getFlag("workshop_master")) return;
    if (getFlag("workshop_competition_resolved")) return;

    if (chance(0.06)) {
      setFlag("workshop_competition_resolved", true);
      const workshopType = getFlag("workshop_type") || "工坊";

      subEvt(
        gameState.age,
        "工坊竞争",
        `另一间${workshopType}指控你窃取了他们的奇点科技专利。Tres协会的仲裁员来到了你的门前——那些穿着黑色西装、面无表情的人。输了的话，你的一切都完了。`,
        true,
        null
      );

      const arbitration = gameState.attrs.int + gameState.attrs.wil + (getFlag("singularity_mastered") ? 5 : 0);
      if (arbitration >= 16) {
        subEvt(
          gameState.age,
          "仲裁胜利",
          "你在Tres协会的仲裁庭上展现了无可辩驳的证据和令人信服的论点。不仅洗清了嫌疑，还反将一军，让对方付出了巨额赔偿。",
          true,
          "Tres仲裁胜利者"
        );
        addMilestone("Tres仲裁胜利者");
        modAttr("wea", 8);
        modAttr("int", 2);
        modAttr("wil", 2);
      } else if (arbitration >= 10) {
        subEvt(
          gameState.age,
          "仲裁和解",
          "仲裁庭的判决对双方各打五十大板。你保住了工坊，但不得不支付一笔可观的和解金，并共享部分技术。",
          false,
          null
        );
        modAttr("wea", -5);
        modAttr("int", 1);
      } else {
        subEvt(
          gameState.age,
          "仲裁败诉",
          "Tres协会的判决残酷而高效。你的工坊被查封，所有资产被没收，你被永远禁止从事相关工作。",
          true,
          null
        );
        modAttr("wea", -Math.min(15, gameState.attrs.wea));
        modAttr("wil", -3);
        modAttr("int", -1);
        setFlag("workshop_master", false);
        setFlag("workshop_banned", true);
        gameState.events.push("被Tres协会终身禁止经营工坊");
      }
    }
  }

  // 执行工坊事件链
  workshopApprenticeDaily();
  if (gameState.alive) singularityTechEncounter();
  if (gameState.alive) workshopAccident();
  if (gameState.alive) becomeWorkshopMaster();
  if (gameState.alive) workshopCompetition();
}

// ============================================
// C. 图书馆线剧情分支 (Library of Ruina Route)
// ============================================

/**
 * 图书馆邀请函事件。
 * 当玩家收到来自图书馆的邀请函后，将触发此剧情线。
 * 图书馆（Library of Ruina）是L Corp崩溃后由安吉拉（Angela）建立的奇异空间。
 * 进入者需要与司书战斗，胜利则向上，失败则化为书籍。
 */
function libraryRoute() {
  if (!getFlag("library_invitation")) return;
  if (getFlag("library_route_completed")) return;

  setFlag("library_route_completed", true);

  subEvt(
    gameState.age,
    "图书馆邀请函",
    "一封烫金的邀请函出现在你的门前。没有寄件人，没有邮戳，只有一行优雅的字迹：'诚邀您莅临图书馆。'你知道这是什么。在都市的传闻中，收到这封信的人，要么成为了'书籍'，要么......",
    true,
    "收到图书馆邀请函"
  );
  addMilestone("收到图书馆邀请函");

  // 判断是否决定前往图书馆
  // 根据意志和智力进行判断
  const willDecision = gameState.attrs.wil;
  const intDecision = gameState.attrs.int;
  const decisionScore = willDecision + intDecision;

  let decision;
  if (decisionScore >= 16) {
    // 高意志高智力：理性分析后决定前往
    decision = "前往";
    subEvt(
      gameState.age,
      "决意前往",
      "你凝视着邀请函许久。图书馆是危险的，但也是机遇。如果传闻属实，那里收藏着都市中一切的知识和力量。你决定去——不是作为猎物，而是作为猎人。",
      true,
      null
    );
  } else if (decisionScore >= 10 && willDecision >= 5) {
    // 中等：犹豫但最终前往
    decision = "前往";
    subEvt(
      gameState.age,
      "被迫前往",
      "你没有选择。邀请函一旦收到，安吉拉的视线就已经盯上了你。逃避只会让你死得更快。你只能赌一把。",
      true,
      null
    );
  } else if (willDecision >= 6) {
    // 意志足够：拒绝
    decision = "拒绝";
    subEvt(
      gameState.age,
      "拒绝邀请",
      "你将邀请函撕碎，扔进火里。你不会成为任何人的书籍。无论安吉拉是谁，你都不会屈服。",
      true,
      null
    );
  } else {
    // 低意志低智力：恐惧，随机决定
    decision = chance(0.4) ? "前往" : "拒绝";
    if (decision === "前往") {
      subEvt(
        gameState.age,
        "恐惧中前往",
        "你的理智告诉你要拒绝，但某种比恐惧更深的东西驱使着你。你握住了邀请函，然后......",
        true,
        null
      );
    } else {
      subEvt(
        gameState.age,
        "懦弱拒绝",
        "你扔掉邀请函，蜷缩在角落里发抖。你告诉自己这是理智的选择。但你知道，这只是懦弱。",
        false,
        null
      );
    }
  }

  // ===== 分支：决定前往图书馆 =====
  if (decision === "前往") {
    // 传送到图书馆
    setFlag("in_library", true);
    subEvt(
      gameState.age,
      "图书馆·入口",
      "光芒闪过，你站在了一座宏伟得不可思议的建筑前。那是超越人类审美的结构，是光与影的迷宫。大门缓缓打开，一位少女站在阴影中——安吉拉。'欢迎，来宾。'",
      true,
      null
    );

    // 第一层接待：与低级司书战斗
    const layer1Power = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil;
    const hasSingularity = getFlag("singularity_mastered") || getFlag("equip_weapon_singularity");
    const layer1Bonus = hasSingularity ? 4 : 0;
    const layer1Total = layer1Power + layer1Bonus;

    subEvt(
      gameState.age,
      "第一层·接待",
      "低级司书们从书架间走出，他们的眼中没有感情，只有战斗的本能。你必须通过第一层，才能见到更多。",
      true,
      null
    );

    // 第一层战斗判定
    if (layer1Total >= 18) {
      // 碾压
      subEvt(
        gameState.age,
        "第一层·完胜",
        "你的力量远超这些低级司书的预料。在奇点科技的加持下——或你本就强大的实力——你迅速击溃了第一层防线。",
        true,
        "图书馆一层通过"
      );
    } else if (layer1Total >= 12) {
      // 惨胜
      subEvt(
        gameState.age,
        "第一层·险胜",
        "战斗比你想象的艰难。司书的攻击方式诡异而致命，你勉强取胜，但身负重伤。",
        true,
        "图书馆一层通过"
      );
      modAttr("con", -3);
      modAttr("wil", -1);
    } else {
      // 败北 -> 化为书籍 (A结局)
      subEvt(
        gameState.age,
        "化为书籍",
        "司书的力量超出了你的想象。在最后一击落下时，你感到身体在分解——化作纸张，化作文字，化作图书馆中新增的一本藏书。你的故事，就此成为了他人的养分。",
        true,
        null
      );
      addMilestone("化为图书馆的书籍");
      death("在图书馆中化为书籍");
      return; // 结局A
    }

    // 第二层及更深层的判定 (简化处理)
    if (gameState.alive) {
      const deepPower = gameState.attrs.con + gameState.attrs.int * 1.5 + gameState.attrs.wil;
      const hasMastery = getFlag("workshop_master") || hasMilestone("资深捕鲸者");
      const deepBonus = hasMastery ? 3 : 0;
      const deepTotal = deepPower + deepBonus;

      if (deepTotal >= 25) {
        // 属性极高：挑战安吉拉
        subEvt(
          gameState.age,
          "深层·攀登",
          "你一层又一层地击败了司书。从文学层到艺术层，从历史层到科技层。每一场战斗都让你更强，也让你更了解图书馆的本质。最终，你站在了总类层的大门前。",
          true,
          "图书馆深层攀登者"
        );
        addMilestone("图书馆深层攀登者");

        // 挑战安吉拉
        const angelaBattle = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil +
                             (getFlag("singularity_mastered") ? 5 : 0) +
                             (hasMilestone("工坊大师") ? 3 : 0);

        if (angelaBattle >= 30) {
          // 击败安吉拉，夺取光之种 (隐藏结局)
          subEvt(
            gameState.age,
            "光之种",
            "安吉拉倒下了。你站在光之种前——那是足以改变都市的力量。你做出了选择。当光芒笼罩都市的那一刻，一切都将不同。",
            true,
            "光之种夺取者"
          );
          addMilestone("光之种夺取者");
          addMilestone("都市变革者");
          setFlag("light_seed_obtained", true);
          modAttr("wil", 10);
          modAttr("int", 5);
          gameState.events.push("夺取了光之种，改变了都市的未来");
          // 此结局不死亡，但人生轨迹彻底改变
        } else {
          // 无法击败安吉拉，但在战斗中幸存
          subEvt(
            gameState.age,
            "安吉拉之战",
            "安吉拉比你强大得多——她毕竟是图书馆的主人。但你的实力赢得了她的尊重。她没有杀你，而是......",
            true,
            null
          );
          // B结局或C结局的判定
          libraryEndingBC();
        }
      } else if (deepTotal >= 16) {
        // 中等实力：到达中层
        subEvt(
          gameState.age,
          "中层·停滞",
          "你在图书馆的中层徘徊。司书们越来越强大，你开始感到力不从心。",
          true,
          null
        );
        libraryEndingBC();
      } else {
        // 实力不足，在中层被击败
        subEvt(
          gameState.age,
          "中层败退",
          "你的力量在图书馆的深层显得渺小。司书们的联合攻击将你逼入了绝境。",
          true,
          null
        );
        // 判定是B还是C结局
        if (gameState.attrs.wil >= 7 && chance(0.06)) {
          // C结局：被释放
          subEvt(
            gameState.age,
            "被释放",
            "就在最后一刻，安吉拉的声音响起：'够了。'司书们停下了手。你被传送出了图书馆，回到了都市的某条后巷。你不明白为什么，但你活下来了。",
            true,
            "图书馆幸存者"
          );
          addMilestone("图书馆幸存者");
          setFlag("library_released", true);
          modAttr("wil", 2);
          modAttr("con", -2);
          gameState.events.push("从图书馆被释放，在都市某处复活");
        } else {
          // B结局：迷失
          subEvt(
            gameState.age,
            "迷失",
            "你在图书馆的迷宫中迷失了方向。没有食物，没有水，只有无尽的书架。你发疯般奔跑，却永远找不到出口。最终，你倒下了——没有化为书籍，只是......消失了。",
            true,
            null
          );
          addMilestone("迷失在图书馆");
          death("迷失在图书馆中");
          return; // 结局B
        }
      }
    }

  // ===== 分支：拒绝前往图书馆 =====
  } else {
    // 邀请函被烧毁
    subEvt(
      gameState.age,
      "安吉拉的监视",
      "你烧掉了邀请函，以为一切就此结束。但你错了。在之后的夜晚，你总感觉有人在注视着你。图书馆的影子，从未远离。",
      false,
      null
    );
    setFlag("angela_watching", true);
    modAttr("wil", -1);

    // 后续影响
    if (chance(0.06)) {
      subEvt(
        gameState.age,
        "监视的持续",
        "街道上的陌生人、窗户对面的房间、甚至你自己的倒影——一切都让你觉得不安。安吉拉的监视是无形的，却真实存在。",
        false,
        null
      );
      modAttr("wil", -2);
    }

    // 极少数情况：被强制邀请
    if (chance(0.03)) {
      subEvt(
        gameState.age,
        "强制邀请",
        "你拒绝了邀请函，但图书馆不打算放过你。某个深夜，光芒笼罩了你的住所。当你再次睁眼时，你已经站在了图书馆的大门前。",
        true,
        null
      );
      setFlag("library_forced", true);
      // 强制进入时意志判定劣势
      modAttr("wil", -2);
      // 重新进入图书馆战斗流程
      // 为简化，直接进入第一层判定（但判定标准更严格）
      const forcedPower = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil - 2;
      if (forcedPower >= 15) {
        subEvt(
          gameState.age,
          "第一层·挣脱",
          "即使在最不利的状况下，你依然击溃了低级司书。你向更深层进发——既然无法逃避，那就征服。",
          true,
          "图书馆一层通过"
        );
        // 继续深层判定（简化）
        libraryEndingBC();
      } else {
        subEvt(
          gameState.age,
          "第一层·终结",
          "措手不及的你无法发挥全力。司书的攻击无情而精准。你成为了图书馆 newest 的藏书。",
          true,
          null
        );
        death("被强制带入图书馆后化为书籍");
        return;
      }
    }
  }
}

/**
 * 图书馆B/C结局分支判定
 * B结局：迷失在图书馆
 * C结局：被释放，在都市某处复活
 */
function libraryEndingBC() {
  const totalAttr = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil;
  const hasInsurance = getFlag("life_insurance_active");

  // 综合判定
  let ending;
  if (totalAttr >= 22 && gameState.attrs.wil >= 8) {
    ending = "C"; // 被释放
  } else if (totalAttr >= 18 && chance(0.06)) {
    ending = "C";
  } else if (hasInsurance && chance(0.06)) {
    ending = "C"; // 生命保险增加存活概率
  } else if (gameState.attrs.wil <= 4) {
    ending = "B"; // 低意志容易迷失
  } else {
    ending = chance(0.4) ? "C" : "B";
  }

  if (ending === "C") {
    subEvt(
      gameState.age,
      "图书馆·释放 (C结局)",
      "当你倒下的那一刻，安吉拉的声音在耳边响起：'你很有趣。'光芒闪过，你发现自己躺在都市某条肮脏的后巷里。你不记得发生了什么，但你知道——你逃出来了。至少，逃出了一部分。",
      true,
      "图书馆释放者"
    );
    addMilestone("图书馆释放者");
    setFlag("library_released", true);
    modAttr("con", -2);
    modAttr("wil", 1);
    modAttr("int", 2); // 图书馆的知识残留
    gameState.events.push("从图书馆被释放，但失去了部分记忆");
  } else {
    subEvt(
      gameState.age,
      "图书馆·迷失 (B结局)",
      "图书馆没有尽头。你走了很久，久到忘记了为什么要走。书架之间的迷宫吞噬了时间，吞噬了空间，最终吞噬了你。你成为了图书馆的一部分——不是作为书籍，而是作为徘徊的幽灵。",
      true,
      "迷失在图书馆"
    );
    addMilestone("迷失在图书馆");
    setFlag("library_lost", true);
    death("迷失在图书馆的无限回廊中");
  }
}

// D. 购买生命保险 (Life Insurance)
// ============================================

/**
 * H巢（鸿园）的生命保险是都市中著名的'复活'服务。
 * 由特殊的奇点技术支持，可以在死亡后将人复活——但代价不菲。
 * 注意：这不是真正的永生，复活伴随着严重的副作用。
 */
function lifeInsuranceEvent() {
  if (gameState.age < 18) return;
  if (getFlag("life_insurance_purchased")) return;

  // 只在H巢/鸿园可以购买
  const canBuy = (bp === "h_nest" || bp === "hong_yuan" || bp === "nest");
  if (!canBuy && chance(0.05)) {
    // 小概率通过黑市购买
    setFlag("insurance_black_market", true);
  } else if (!canBuy) {
    return;
  }

  if (chance(0.06)) {
    const insuranceCost = 8; // 花费家境
    if (gameState.attrs.wea >= insuranceCost) {
      setFlag("life_insurance_purchased", true);
      modAttr("wea", -insuranceCost);

      const isBlackMarket = getFlag("insurance_black_market");
      subEvt(
        gameState.age,
        isBlackMarket ? "黑市生命保险" : "购买生命保险",
        isBlackMarket
          ? "通过地下渠道，你购买了一份来路不明的生命保险。卖家警告你：'复活后的你，可能不再是你。'"
          : "在H巢的保险事务所，你签下了一份昂贵的合同。鸿园的生命保险是都市中少有的'第二次机会'——当然，机会从来都不是免费的。",
        true,
        "生命保险持有者"
      );
      addMilestone("生命保险持有者");
      setFlag("life_insurance_active", true);
      setFlag("can_revive", true);
    }
  }
}

/**
 * 生命保险复活处理函数
 * 当玩家死亡时，如果持有生命保险，则触发复活
 * 注意：此函数应在主程序的死亡判定逻辑中调用
 */
function lifeInsuranceRevive() {
  if (!getFlag("life_insurance_active") || !getFlag("can_revive")) {
    return false; // 无法复活
  }

  // 也检查 combo_tags.js 中购买的保险
  const insurance = getFlag('lifeInsurance');
  if (insurance && insurance.remaining > 0) {
    insurance.remaining -= 1;
    setFlag('lifeInsurance', insurance);
    const companyName = insurance.companyName || '保险公司';
    let desc = companyName + '的复活服务生效了。';
    if (insurance.memoryLoss) {
      desc += '但你失去了大量记忆，像做了一场很长很长的梦，醒来后什么都不记得了。';
      setFlag('amnesia', true);
      if (gameState.milestones && gameState.milestones.length > 3) {
        const preserved = gameState.milestones.slice(-3);
        gameState.milestones.length = 0;
        gameState.milestones.push(...preserved);
      }
    }
    if (insurance.attrPenalty > 0) {
      const penalty = insurance.attrPenalty;
      modAttr('con', -(gameState.attrs.con || 0) * penalty);
      modAttr('int', -(gameState.attrs.int || 0) * penalty);
      modAttr('wil', -(gameState.attrs.wil || 0) * penalty);
      desc += '复活对你的身体造成了负担，全属性下降' + (penalty * 100).toFixed(0) + '%。';
    }
    if (insurance.sideEffect && chance(0.5)) {
      const sideEffects = ['复活后你发现身上多了一道来历不明的疤痕。','你的味觉完全消失了，食物对你来说只是颜色不同的泥。','你偶尔会听到不属于你的低语声。'];
      desc += ' ' + pick(sideEffects);
      setFlag('resurrectionSideEffect', true);
    }
    if (insurance.luckPenalty) {
      setFlag('badLuck', true);
      desc += ' 你感觉自己的运气变差了。';
    }
    addEvent({ text: desc, effect: 'resurrection', effText: '复活', major: true });
    addMilestone('通过' + companyName + '复活');
    modAttr('con', 5);
    return true;
  }

  // 消耗复活机会（每人仅限一次）
  setFlag("can_revive", false);
  setFlag("life_insurance_active", false);
  setFlag("has_revived", true);

  // 复活副作用判定
  const sideEffects = [];

  // 副作用1：记忆损失
  const memoryLoss = chance(0.7);
  if (memoryLoss) {
    setFlag("revive_memory_loss", true);
    sideEffects.push("部分记忆丧失");
    modAttr("int", -3);
    modAttr("wil", -1);
  }

  // 副作用2：属性下降
  const attrDecline = chance(0.8);
  if (attrDecline) {
    setFlag("revive_attr_decline", true);
    sideEffects.push("身体机能衰退");
    modAttr("con", -2);
    modAttr("int", -1);
  }

  // 副作用3：随机副作用
  const randomEffects = [
    { name: "情感缺失", effect: () => { modAttr("wil", -3); setFlag("revive_emotionless", true); } },
    { name: "奇点辐射后遗症", effect: () => { modAttr("con", -2); setFlag("revive_radiation", true); } },
    { name: "身份错置", effect: () => { setFlag("revive_identity_crisis", true); gameState.events.push("复活后产生了身份认知障碍"); } },
    { name: "安吉拉的注视", effect: () => { setFlag("angela_watching", true); gameState.events.push("复活后似乎被某种存在注视着"); } },
    { name: "运气透支", effect: () => { setFlag("revive_bad_luck", true); } },
    { name: "轻微变异", effect: () => { modAttr("con", 1); modAttr("int", -2); setFlag("revive_mutated", true); } }
  ];

  const chosenEffect = pick(randomEffects);
  chosenEffect.effect();
  sideEffects.push(chosenEffect.name);

  // 生成复活事件
  subEvt(
    gameState.age,
    "生命保险·复活",
    `黑暗。然后是刺眼的光芒。你猛地吸了一口气——你本不该再能呼吸的。生命保险履行了它的承诺，但你的身体感受到了异样。副作用：${sideEffects.join("、")}。`,
    true,
    "复活者"
  );
  addMilestone("复活者");

  // 复活后恢复基础生命状态
  gameState.alive = true;

  // 复活不是万能的，如果属性过低，可能再次死亡
  const totalAttr = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil + gameState.attrs.wea;
  if (totalAttr < 5 && chance(0.06)) {
    subEvt(
      gameState.age,
      "复活的代价",
      "复活的身体无法承受灵魂的回归。你在苏醒后的几小时内再次倒下——这次，是真正的终结。",
      true,
      null
    );
    death("生命保险复活失败，灵魂彻底消散");
    return true; // 确实触发了复活，但再次死亡
  }

  return true;
}

// 为 death() 函数提供统一的复活入口
const tryResurrection = lifeInsuranceRevive;

// ============================================
// 模块导出 / 事件调度
// ============================================

/**
 * 每年触发的事件总调度函数
 * 应在主游戏循环的每年阶段调用
 */
function runExtendedEvents() {
  if (!gameState.alive) return;

  // A. 大湖捕鲸剧情
  whaleHuntingEvents();

  // B. 工坊剧情
  if (gameState.alive) workshopEvents();

  // C. 图书馆线（如果被邀请）
  if (gameState.alive && getFlag("library_invitation")) {
    libraryRoute();
  }

  // D. 生命保险购买事件
  if (gameState.alive) lifeInsuranceEvent();
}

    ];
    events.push(evt(pick(texts), 'bridge_elder', '', true, '步入晚年'));
  }
  return events;
}

/**
 * 传奇收尾人遭遇调度。
 * 成年后有概率遭遇都市传说中的色彩级收尾人或其他传奇人物。
 * 遭遇后可能获得传承、属性提升，或死亡。
 */
function legendaryFixerEvents(age) {
  if (age < 18 || !gameState.alive) return;
  if (getFlag("legend_encounter_this_year")) return;

  // 基础遭遇概率，随年龄和属性变化
  let encounterChance = 0.015;
  if (hasMilestone("一阶收尾人") || hasMilestone("色彩级收尾人")) encounterChance += 0.02;
  if (hasTag("收尾人")) encounterChance += 0.01;
  if (gameState.attrs.wil >= 8) encounterChance += 0.01; // 高意志更容易吸引强者注意

  if (!chance(encounterChance)) return;
  setFlag("legend_encounter_this_year", true);

  const legends = [
    { id: "iori", name: "堇紫泪滴", weight: 1 },
    { id: "kali", name: "殷红迷雾", weight: 1 },
    { id: "roland", name: "漆黑缄默", weight: 1 },
    { id: "alb", name: "苍蓝残响", weight: 0.8 },
    { id: "purple", name: "朱红十字", weight: 0.7 },
    { id: "blue", name: "蔚蓝之眼", weight: 0.6 },
    { id: "crimson", name: "猩红凝视", weight: 0.8 },
    { id: "cyan", name: "缃碧少女", weight: 0.6 },
    { id: "winter", name: "冬红布袋", weight: 0.5 },
    { id: "indigo", name: "靛蓝老人", weight: 0.7 },
    { id: "azure", name: "蔚蓝天堂", weight: 0.6 },
  ];
  const legend = pickWeighted(legends);

  switch (legend.id) {
    case "iori":
      encounterIori();
      break;
    case "kali":
      encounterKali();
      break;
    case "roland":
      encounterRoland();
      break;
    case "alb":
      encounterAlb();
      break;
    case "purple":
      encounterPurpleCross();
      break;
    case "blue":
      encounterBlueEye();
      break;
    case "crimson":
      encounterCrimsonGaze();
      break;
    case "cyan":
      encounterCyanGirl();
      break;
    case "winter":
      encounterWinterRed();
      break;
    case "indigo":
      encounterIndigoElder();
      break;
    case "azure":
      encounterAzureHeaven();
      break;
  }
}

function pickWeighted(items) {
  const total = items.reduce((s, i) => s + i.weight, 0);
  let r = Math.random() * total;
  for (const item of items) {
    r -= item.weight;
    if (r <= 0) return item;
  }
  return items[items.length - 1];
}

// ============================================
// B. 时间线历史事件
// ============================================

/**
 * 根据玩家的出生年份和当前年龄计算当前年份，触发对应的历史大事件。
 * 出生年份在游戏开始时随机设定（785 ~ 985）。
 */
function timelineEvents(age) {
  if (!gameState.birthYear || !gameState.alive) return;
  const currentYear = gameState.birthYear + age;
  if (getFlag("timeline_" + currentYear)) return; // 同一年不重复触发

  //  pianoist ~957
  if (currentYear === 957 && !getFlag("pianistEventFired")) {
    setFlag("pianistEventFired", true);
    addEvent({ text: "公元957年。钢琴师的旋律响彻了都市的南部。那不是音乐，而是死亡的安魂曲。无数人在音符中失去了生命，整片区域化为废墟。", effect: "history", effText: "", major: true, milestone: "钢琴师事件" });
    addMilestone("钢琴师事件");
    // 如果玩家在南部/后巷，有死亡风险
    const bp = gameState.birthplace ? gameState.birthplace.id : 'backstreet';
    if ((bp === 'backstreet' || bp === 'south') && gameState.attrs.wil < 6 && chance(0.25)) {
      addEvent({ text: "你当时就在南部。钢琴师的音符切割着你的精神，你试图逃跑，但那旋律无处不在。你的意识逐渐模糊……", effect: "death", effText: "死亡", major: true });
      death("钢琴师事件");
    } else if (bp === 'backstreet' || bp === 'south') {
      addEvent({ text: "你就在南部，但凭借顽强的意志活了下来。然而那旋律将永远在你的噩梦中回响。", effect: "trauma", effText: "意志-2", major: true });
      modAttr("wil", -2);
    }
    return;
  }

  // 烟霾战争 ~878-985 (跨度很长，取关键节点)
  if (currentYear === 878 && !getFlag("smogWarStart")) {
    setFlag("smogWarStart", true);
    addEvent({ text: "公元878年。烟霾战争爆发了。那是都市历史上最惨烈的冲突之一，N公司、K公司、T公司……无数势力卷入其中，后巷变成了人间地狱。", effect: "history", effText: "", major: true, milestone: "烟霾战争爆发" });
    addMilestone("烟霾战争爆发");
    return;
  }
  if (currentYear === 920 && getFlag("smogWarStart") && !getFlag("smogWarPeak")) {
    setFlag("smogWarPeak", true);
    addEvent({ text: "烟霾战争进入了最惨烈的阶段。你所在的城市区域被卷入了战火。每一天都有人在你面前死去，天空被浓烟遮蔽，连阳光都成了奢侈品。", effect: "history", effText: "", major: true, milestone: "烟霾战争白热化" });
    if (gameState.attrs.con < 6 && chance(0.2)) {
      addEvent({ text: "一枚流弹击中了你的藏身之处。你没有死在敌人的手中，而是死在了战争的随机性里。", effect: "death", effText: "死亡", major: true });
      death("烟霾战争");
    } else {
      modAttr("wil", -1);
      modAttr("con", -1);
    }
    return;
  }

  // L Corp 脑叶公司成立/崩溃 ~939
  if (currentYear === 939 && !getFlag("lCorpFounded")) {
    setFlag("lCorpFounded", true);
    addEvent({ text: "公元939年。L公司——脑叶公司在巢中成立了。没人知道这家公司真正的业务是什么，但所有人都知道，进入那栋建筑的人很少有能完整出来的。", effect: "history", effText: "", major: true, milestone: "L公司成立" });
    addMilestone("L公司成立");
    return;
  }

  // 白夜黑昼 ~910 (WhiteNight & DarkDays)
  if (currentYear === 910 && !getFlag("whiteNightEvent")) {
    setFlag("whiteNightEvent", true);
    addEvent({ text: "公元910年。白夜降临了。某个巢中出现了自称『白夜』的存在， followed by the Black Days. 信仰、疯狂、救赎与毁灭在同一天降临。", effect: "history", effText: "", major: true, milestone: "白夜黑昼" });
    addMilestone("白夜黑昼");
    if (gameState.attrs.wil < 7 && chance(0.2)) {
      addEvent({ text: "白夜的声音直接在你的脑海中响起。你无法抵抗那种『拯救』的诱惑，你的理智在信仰与怀疑之间崩溃。", effect: "twist", effText: "意志-3", major: true });
      modAttr("wil", -3);
      if (gameState.attrs.wil <= 0) {
        addEvent({ text: "你彻底屈服于白夜的意志，成为了又一名盲目的信徒。", effect: "death", effText: "精神崩溃", major: true });
        death("白夜黑昼精神崩溃");
      }
    }
    return;
  }

  // 图书馆出现 ~943
  if (currentYear === 943 && !getFlag("libraryAppeared")) {
    setFlag("libraryAppeared", true);
    addEvent({ text: "公元943年。L公司崩溃后，一座神秘的图书馆在废墟中拔地而起。安吉拉——那个非人的存在——开始向都市中的强者们发送烫金的邀请函。", effect: "history", effText: "", major: true, milestone: "图书馆出现" });
    addMilestone("图书馆出现");
    // 小概率直接收到邀请函
    if (gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil >= 20 && chance(0.06)) {
      setFlag("library_invitation", true);
      addEvent({ text: "一封烫金的邀请函出现在你的门前。图书馆向你敞开了大门——无论那是机遇还是陷阱。", effect: "invite", effText: "收到图书馆邀请函", major: true, milestone: "收到图书馆邀请函" });
      addMilestone("收到图书馆邀请函");
    }
    return;
  }

  // 图书馆完结 ~961 (光之种发射)
  if (currentYear === 961 && !getFlag("libraryEnded")) {
    setFlag("libraryEnded", true);
    addEvent({ text: "公元961年。图书馆的故事迎来了终结。光之种从图书馆的顶端射向天空，照亮了整个都市。那光芒中蕴含着救赎，也蕴含着毁灭。", effect: "history", effText: "", major: true, milestone: "光之种发射" });
    addMilestone("光之种发射");
    if (hasMilestone("图书馆释放者") || hasMilestone("光之种夺取者")) {
      addEvent({ text: "你见证了光之种的发射。作为曾经踏入图书馆的人，你比任何人都更理解那光芒的意义。", effect: "blessing", effText: "意志+2", major: false });
      modAttr("wil", 2);
    }
    return;
  }

  // 边狱公司 ~978
  if (currentYear === 978 && !getFlag("limbusFounded")) {
    setFlag("limbusFounded", true);
    addEvent({ text: "公元978年。边狱公司成立了。那辆名为梅菲斯托费勒斯的巴士开始在都市中穿梭，载着一群罪人前往未知的深渊。", effect: "history", effText: "", major: true, milestone: "边狱公司成立" });
    addMilestone("边狱公司成立");
    // 小概率成为边狱公司的罪人
    if (hasTag("边狱公司") || (gameState.attrs.con >= 6 && chance(0.06))) {
      addEvent({ text: "边狱公司找到了你。无论是因为你的罪行还是你的能力，你被选中登上了那辆巴士。从那一刻起，你的命运与十二名罪人紧紧相连。", effect: "join", effText: "成为边狱公司罪人", major: true, milestone: "边狱公司罪人" });
      addMilestone("边狱公司罪人");
      setFlag("lcb_sinner", true);
    }
    return;
  }

  // 扭曲现象大规模爆发 ~950
  if (currentYear === 950 && !getFlag("distortionWave")) {
    setFlag("distortionWave", true);
    addEvent({ text: "公元950年。扭曲现象在都市中大规模爆发。普通人毫无征兆地变成了怪物，负面情绪化为实体，后巷变成了噩梦的温床。", effect: "history", effText: "", major: true, milestone: "扭曲大爆发" });
    addMilestone("扭曲大爆发");
    if (gameState.attrs.wil < 5 && chance(0.06)) {
      addEvent({ text: "扭曲的波纹影响到了你。你的负面情绪开始具象化，你的影子在墙上扭曲成了不属于你的形状。", effect: "corrupt", effText: "意志-2", major: true });
      modAttr("wil", -2);
    }
    return;
  }
}

// ============================================
// C. 总调度
// ============================================
function runLegendEvents(age) {
  legendaryFixerEvents(age);
  if (gameState.alive && !gameState.dead) {
    timelineEvents(age);
  }
}

      { t: '你捡到了一只流浪猫。它很瘦，很脏，但眼睛很亮。你喂了它一块合成肉，它蹭了蹭你的腿，然后消失在废墟中。', e: { wil: 1 }, cond: () => true },
      { t: '你今天没有遇到任何危险。没有清道夫，没有帮派，没有扭曲者。在都市里，「无事发生」本身就是最好的消息。', e: { wil: 1 }, cond: () => true },
      { t: '你在旧货市场淘到了一本旧书。书页泛黄，散发着霉味，但里面的故事让你暂时忘记了都市的压抑。', e: { int: 1 }, cond: () => true },
      { t: '今天食堂的饭菜意外地好吃。你多要了一份，虽然那意味着明天的预算会更紧。', e: { con: 1, wea: -1 }, cond: () => true },
      { t: '你路过了一个街头艺人的表演。他拉小提琴的样子很专注，仿佛周围的一切都不存在。你丢了一枚眼在他的琴盒里。', e: { wil: 1, wea: -1 }, cond: () => true },
      { t: '你的邻居送了你一碟自己做的食物。味道很怪，但你吃完了。在都市里，这种邻里之间的信任比黄金还珍贵。', e: { wil: 1, con: 1 }, cond: () => true },
      { t: '你在后巷的墙上看到了一幅新的涂鸦。画的是一个笑脸，下面写着：「今天也要活下去。」你对着那个笑脸点了点头。', e: { wil: 1 }, cond: () => true },
      { t: '你今天比平时多走了三千步。你的腿很酸，但你知道，能走路本身就是一种幸福——尤其是在这个都市里。', e: { con: 1 }, cond: () => true },
      { t: '你听到了一个笑话。很烂的笑话，但你笑出了声。在都市里，笑声是稀缺资源。', e: { wil: 1 }, cond: () => true },
      { t: '你在垃圾堆里发现了一个还能用的杯子。洗干净后，它成了你最喜欢的杯子。你给它起名叫「幸存者」。', e: { wil: 1 }, cond: () => true },
      { t: '今天的阳光穿透了烟雾，照在了你的脸上。虽然只有短短几分钟，但你闭上眼睛，享受了那片刻的温暖。', e: { wil: 1 }, cond: () => true },
      { t: '你在网上看到了一张郊区的照片。照片里有一片绿色的草地，和一只白色的兔子。你把它设为了手机壁纸。', e: { wil: 1 }, cond: () => true },
      { t: '你今天早早地睡了。没有噩梦，没有枪声，没有清道夫的嗡嗡声。一觉到天亮。', e: { con: 1, wil: 1 }, cond: () => true },
      { t: '你在洗衣房里等衣服时，和一个陌生人聊了半小时。你们交换了名字，然后各自离去。你们都知道，不会再见面了。', e: { wil: 1 }, cond: () => true },
      { t: '你找到了一首老歌。旋律很舒缓，让你想起了某个你已经忘记的人。你单曲循环了一整晚。', e: { wil: 1 }, cond: () => true },
    );

    // 负面一般事件
    generalPool.push(
      { t: '你今天被上司骂了。原因是你没有在他开口之前猜到他要说什么。你低头道歉，心里想着今晚吃什么。', e: { wil: -1 }, cond: () => true },
      { t: '你买到过期食品，吃坏了肚子。黑市药店卖的止泻药价格是正常药的三倍。你买了，因为你别无选择。', e: { con: -1, wea: -1 }, cond: () => true },
      { t: '你的住所停水了整整一天。你用储备水勉强洗漱，但那种黏腻感让你整晚都睡不着。', e: { wil: -1 }, cond: () => true },
      { t: '你在街上被人撞了一下，口袋里的眼少了几枚。你回头时，那人已经消失在人群中了。', e: { wea: -1 }, cond: () => true },
      { t: '你今天偏头痛发作。你没有钱去买K公司的特效药，只能用冷水敷额头，等到疼痛自己消退。', e: { con: -1 }, cond: () => true },
      { t: '你的邻居在深宵中大声争吵。你塞着耳朵试图入睡，但那种噪音像针一样刺进你的大脑。', e: { wil: -1 }, cond: () => true },
      { t: '你在公交车上被扒手光顾了。幸运的是，你今天刚好没带钱包。扒手瞪了你一眼，仿佛那是你的错。', e: { wil: -1 }, cond: () => true },
      { t: '你今天踩到了一滩不明液体。味道很难闻，你花了半小时清理鞋子，但那种气味似乎渗进了皮肤里。', e: { wil: -1 }, cond: () => true },
      { t: '你收到了一张罚单，理由是「在不应该呼吸的地方呼吸了」。罚单金额不高，但你感到某种无名的愤怒。', e: { wea: -1, wil: -1 }, cond: () => true },
      { t: '你今天的工作出了差错。不是什么大问题，但你的同事把责任推给了你。你承担了，因为辩解需要花费更多精力。', e: { wil: -1 }, cond: () => true },
    );

    // 巢/后巷差异
    if (bp.includes('nest')) {
      generalPool.push(
        { t: '巢的电梯又坏了。你爬了十二层楼，气喘吁吁地到达公司。上司看了你一眼，说：「下次早点出门。」', e: { con: 1, wil: -1 }, cond: () => true },
        { t: '你在巢的公园里看到了一株真正的植物。不是合成的，而是真正的、有根的、会开花的植物。你站在那里看了很久，直到保安来赶你走。', e: { wil: 2 }, cond: () => true },
        { t: '巢的空气净化系统发出了一种奇怪的声音，像是某种生物的呼吸。维修人员说是「正常现象」，但你开始怀疑。', e: { int: 1, wil: -1 }, cond: () => true },
        { t: '你在巢的商场里参加了抽奖活动。没有中奖，但店员给了你一个小挂件作为安慰奖。你把它挂在了钥匙上。', e: { wil: 1 }, cond: () => true },
        { t: '你今天在巢的街道上看到了一只真正的鸽子。不是机械仿生的，而是真正的、会拉屎的鸽子。你喂了它一点面包屑。', e: { wil: 1 }, cond: () => true },
      );
    } else {
      generalPool.push(
        { t: '后巷的地面又塌陷了一块。你绕路走了二十分钟，但你知道，那条捷径已经永远消失了。', e: { con: 1 }, cond: () => true },
        { t: '你今天在后巷的垃圾堆里淘到了一件还能穿的夹克。虽然上面有几个弹孔，但款式还不错。你补了补，穿上了它。', e: { wea: 1, wil: 1 }, cond: () => true },
        { t: '后巷的广播里播放了一条消息：「今日深宵清扫范围扩大，请居民提前避险。」你检查了自己的应急物资，又补了一些水。', e: { wil: 1 }, cond: () => true },
        { t: '你在后巷的墙角看到了一只老鼠。它不怕人，只是看着你。你丢给它一块面包，它叼着面包钻进了墙缝。', e: { wil: 1 }, cond: () => true },
        { t: '后巷的某个帮派换了老大。新老大上任的第一件事是「减税」——保护费从每月二十枚眼降到了十五枚。你感到短暂的欣慰。', e: { wea: 1 }, cond: () => true },
      );
    }

    // 季节/天气类
    generalPool.push(
      { t: '今天格外冷。你把所有的衣服都穿上了，还是忍不住发抖。后巷的冬天没有暖气，只有一层又一层的破布。', e: { con: -1 }, cond: () => true },
      { t: '今天格外热。汗水浸透了你的衣服，后巷的空气中弥漫着腐烂和汗水混合的味道。你喝了很多水，但还是口渴。', e: { con: -1 }, cond: () => true },
      { t: '雾很大。你几乎看不到五米以外的东西。这种天气在都市里很危险，因为你看不到危险，危险也看不到你——但愿如此。', e: { wil: -1 }, cond: () => true },
      { t: '风很大。后巷的破招牌在风中吱嘎作响，像是一群垂死的人在呻吟。你把窗户关紧了。', e: { wil: -1 }, cond: () => true },
    );

    // 新一般事件
    generalPool.push(
      { t: '你在街头看到一家新开的工坊。招牌上写着"琅琊工坊——拳套与短刀"。你走进去看了看，但没有买任何东西。', e: { wil: 1 }, cond: () => true },
      { t: '一个Девять协会的送货员骑着摩托车从你身边飞驰而过。他的派送箱在颠簸中发出奇怪的电子音。', e: { int: 1 }, cond: () => true },
      { t: '你在第十区的赌场外看到一个人哭喊着被拖走。"愿力输光了……"他喃喃自语。你摸了摸自己的口袋。', e: { wil: 1 }, cond: () => true },
      { t: 'K公司的推销员向你推销再生安瓿。"试试这个，包治百病！"他的笑容过于灿烂，让你有些不安。', e: { con: 1 }, cond: () => true },
      { t: '你在后巷发现了一家卖血棒的小店。店主是个看起来疲惫的血魔。"来一根？"他问。你摇了摇头。', e: { wil: -1 }, cond: () => true },
      { t: 'WARP列车的广告在街头闪烁。"跨越空间，只需一瞬。"你想起了那些关于折叠空间的恐怖故事。', e: { int: 1 }, cond: () => true },
      { t: '一个R公司的退役士兵坐在街角喝酒。他的义肢在月光下泛着冷光。"战场……不是人待的地方。"', e: { wil: 1 }, cond: () => true },
      { t: '你在第十三区看到月面骑士团巡逻。他们的盔甲在月光下闪闪发亮，像是在守护什么珍贵的东西。', e: { wil: 1 }, cond: () => true },
      { t: '一个Dieci协会的学者在废墟边缘采集样本。"这里面蕴含着都市的秘密……"他兴奋地说，完全没有注意到身后的危险。', e: { int: 1 }, cond: () => true },
      { t: 'T公司的色彩回收装置正在运作。你看到一个人的色彩被抽走，变得灰白。然后他掏出一笔钱，恢复了颜色。', e: { int: 1, wil: -1 }, cond: () => true },
      { t: '你在X区的魔窟入口外看到了招聘广告。"高薪诚聘矿工，无需经验，风险自负。"', e: { con: 1 }, cond: () => true },
      { t: '一个S公司的推奴人从你身边走过。他身上的烙印器具在阳光下反射着刺眼的光。你屏住了呼吸。', e: { wil: -1 }, cond: () => true },
      { t: '你在后巷的近岸湖域闻到了熟悉的臭味。一只废料蟹从水面探出头来，又迅速沉了下去。', e: { wil: 1 }, cond: () => true },
      { t: 'N公司的自杀自动售货机引起了你的注意。投币后可以选择"遗忘"或"死亡"。你加快了脚步。', e: { wil: -1 }, cond: () => true },
      { t: 'P公司的完全保护装置让第十六区的建筑坚不可摧。你抬头看着那些极高的建筑，感到一阵眩晕。', e: { wil: 1 }, cond: () => true },
      { t: '一个齿轮教团的成员在街头宣传机械飞升的好处。他的半边脸已经是金属了。"加入我们，抛弃软弱！"', e: { int: 1 }, cond: () => true },
      { t: '你在黑市上看到一块月长石正在拍卖。起拍价高得离谱，但竞价者依然络绎不绝。', e: { wea: -1 }, cond: () => true },
      { t: 'Hana协会的色彩评定员路过你身边时停顿了一下。他看了你一眼，摇了摇头，然后走开了。', e: { wil: -1 }, cond: () => true },
      { t: '一个Q公司的符咒师向你推销护身符。"这个可以让你的武器附带火焰效果！只要一百眼！"', e: { int: 1 }, cond: () => true },
      { t: 'J公司的锁匠在街头表演。他用一把钥匙锁住了风，然后解开了它。围观者发出惊叹。', e: { int: 1 }, cond: () => true },
    );

    const gen = pick(generalPool.filter(g => g.cond()));
    if (gen) {
      addEvent({ text: gen.t, effect: 'general_event', effText: '一般事件', major: false, milestone: null });
      for (const [k, v] of Object.entries(gen.e)) modAttr(k, v);
    }
  }
}

// ============================================================
// 奇点科技事件系统（Singularity Events）
// WARP列车故障、各翼公司奇点、清道夫、工坊事故等
// ============================================================
function runSingularityEvents(age, a, f, bp, tags) {
  if (age < 5) return; // 幼儿期不触发

  // ========== WARP 列车事件（W公司奇点） ==========
  if (chance(0.05) || (bp === 'w_nest' && chance(0.1))) {
    const warpEvents = [
      {
        t: '你乘坐的WARP列车突然剧烈震动。窗外的景色开始扭曲，空间像被揉皱的纸张。广播里传来乘务员的声音：「各位乘客请注意，本次列车正在进行空间校正，请勿恐慌。」——但所有人的脸都白了。',
        e: { wil: -1, int: 1 },
        ms: 'WARP空间校正',
        cond: () => age >= 10
      },
      {
        t: 'WARP列车的车门在行驶中意外打开。你看到了门外——不是隧道，而是一片虚无。某种东西正从虚无中凝视着你。乘务员冲过来关上了门，但你的手已经伸出去了一半。你感到手指一阵刺痛，收回手时，指节似乎比以前长了一点。',
        e: { con: 1, wil: -2 },
        ms: 'WARP空间泄漏',
        cond: () => age >= 10
      },
      {
        t: '你乘坐的WARP列车到达了错误的车站。站台上的指示牌写着你不认识的名字。乘客们惊慌失措，但乘务员面不改色：「W公司对此次偏差深表歉意。请各位耐心等待，列车将在……不确定时间内返回。」你被困在了一个不属于任何地图的地方。',
        e: { int: 2, wil: -1 },
        ms: 'WARP空间偏差',
        cond: () => age >= 15
      },
      {
        t: 'WARP列车上发生了劫持事件。三个蒙面人声称掌握了「空间炸弹」，要求W公司释放某些政治犯。列车内的空间开始不稳定，墙壁像呼吸一样起伏。你必须在车厢被折叠成二维之前做出选择。',
        e: { con: 1, wil: 2 },
        ms: 'WARP列车劫持',
        cond: () => age >= 18 && (a.con + a.wil) >= 10
      },
      {
        t: 'WARP列车正常运行中，但窗外的景象让你不安——你看到了自己。在空间折叠的褶皱中，另一个「你」站在扭曲的月台上，正好奇地向这边张望。你们的目光穿过空间的裂缝交汇了。列车加速，那个身影消失在折叠的空间中。',
        e: { int: 2, wil: 1 },
        ms: 'WARP折叠观测',
        cond: () => age >= 16
      },
      {
        t: 'WARP列车上的乘务员递给你一份免责声明：「亲爱的乘客，本次列车将于途经H巷的空间褶皱密集区域，部分乘客可能会因空间折叠产生视觉错觉。W公司不对任何因此产生的心理创伤负责。」话音刚落，你注意到对面座位上的老人在空间的扭曲中看起来像一个孩子——那只是折叠空间造成的错觉。',
        e: { int: 2, wil: -1 },
        ms: 'WARP褶皱错觉',
        cond: () => age >= 20
      },
      {
        t: 'WARP列车在运行中突然完全静止。窗外不再是空间隧道，而是——你自己的一生。像电影一样快进播放。你看到了出生、童年、那些你已经忘记的面孔。当画面到达现在时，列车恢复了运行。广播说这是「正常的空间映照现象」。',
        e: { wil: 3, int: 1 },
        ms: 'WARP人生映照',
        cond: () => age >= 30
      },
      {
        t: '你在WARP列车上遇到了一个神情慌张的常客。他说自己曾多次乘坐这趟列车，对空间折叠的不稳定区域有所了解。他预测列车将在三分钟后经过一段危险的褶皱区域，建议你躲进三号车厢的维修通道。你选择相信他。三分钟后，列车确实剧烈震荡，空间像被撕裂的布匹一样抖动，但你按照他的指示行动，毫发无伤。',
        e: { wil: 2, con: 1 },
        ms: 'WARP褶皱预警',
        cond: () => age >= 20
      },
      {
        t: 'WARP列车每次经过某个特定路段时，你都会听到一种低频嗡鸣声。乘务员说那是「空间共振」，无害的。但你开始梦见那个声音。在梦里，嗡鸣变成了语言，讲述着关于都市创建之前的秘密。',
        e: { int: 3, wil: -1 },
        ms: 'WARP空间共振',
        cond: () => age >= 25
      },
    ];
    const we = pick(warpEvents.filter(e => e.cond()));
    if (we) {
      addEvent({ text: we.t, effect: 'warp_event', effText: 'WARP列车事件', major: true, milestone: we.ms });
      addMilestone(we.ms);
      for (const [k, v] of Object.entries(we.e)) modAttr(k, v);
    }
    return; // WARP事件和奇点事件互斥，避免一年触发太多
  }

  // ========== K公司奇点：再生安瓿 ==========
  if ((bp === 'k_nest' || hasTag('K公司')) && chance(0.08) && !getFlag('k_singularity_touched')) {
    setFlag('k_singularity_touched', true);
    const kEvents = pick([
      {
        t: '你在K公司的安瓿工厂实习。再生安瓿的生产过程需要在活体细胞中注入「再生因子」——这些因子提取自某种连K公司都不愿公开的生物。你亲眼看到一瓶安瓿在十秒内修复了一只被切断的老鼠的手臂，完全再生，连疤痕都没有。',
        e: { int: 3, wil: -1 },
        ms: '再生安瓿见证'
      },
      {
        t: '你因重伤被注射了K公司的再生安瓿。伤口在几秒内完全愈合，疼痛消失。但你注意到——愈合后的皮肤比之前年轻了十岁。K公司的安瓿不仅仅是「再生」，它在逆转时间。',
        e: { con: 5, int: 1, wil: 1 },
        ms: '再生安瓿注射'
      },
      {
        t: '你在黑市上买到了一瓶「仿制再生安瓿」。使用后，你的伤口确实愈合了，但新长出的皮肤呈现不自然的灰色。三天后，你发现伤口的位置长出了一小块不属于你的组织——它有自己的脉搏。',
        e: { con: 2, wil: -3 },
        ms: '仿制安瓿副作用'
      },
    ]);
    addEvent({ text: kEvents.t, effect: 'k_singularity', effText: 'K公司奇点', major: true, milestone: kEvents.ms });
    addMilestone(kEvents.ms);
    for (const [k, v] of Object.entries(kEvents.e)) modAttr(k, v);
    return;

// 运行L公司事件链系统
function runLobotomyChain(age) {
  if (!gameState.alive || gameState.dead) return;

  // 检查是否已进入脑叶公司路线
  if (!getFlag('joinedLCompany')) return;

  // 检查是否已经完成光之种
  if (getFlag('lightSeedLaunched')) {
    // 光之种发射后的世界线
    runPostLightSeed(age);
    return;
  }

  // 获取当前Sephirah进度
  const currentStage = getFlag('sephirahStage') || 0;

  // 尝试推进Sephirah事件链
  for (let i = 0; i < SEPHIRAH_CHAIN.length; i++) {
    const chain = SEPHIRAH_CHAIN[i];
    const flagKey = 'sephirah_' + chain.id;

    // 如果已开始但未完成
    if (getFlag(flagKey + '_started') && !getFlag(flagKey + '_done')) {
      const progress = getFlag(flagKey + '_progress') || 0;
      if (progress < chain.eventTexts.length - 1 && chance(0.35)) {
        // 推进一个事件
        const evtText = chain.eventTexts[progress];
        let finalText = evtText;
        // 如果文本包含{abno}或{work}，替换为随机异想体
        if (typeof evtText === 'object' && evtText.text) {
          finalText = evtText.text;
        }
        if (finalText.includes('{abno}')) {
          const abno = pick(ABNORMALITIES.filter(a => a.level === chain.level || a.level === 'HE'));
          finalText = finalText.replace('{abno}', abno ? abno.name : '一个未知的异想体');
        }
        if (finalText.includes('{work}')) {
          const wt = pick(Object.keys(WORK_TYPES));
          finalText = finalText.replace('{work}', wt);
        }
        addEvent({ text: finalText, major: false });
        setFlag(flagKey + '_progress', progress + 1);
        return;
      }
    }

    // 如果到了该Sephirah的年龄且前面的都完成了
    if (i === currentStage && age >= chain.ageStart && age <= chain.ageEnd && chance(0.06)) {
      if (i === 0 || getFlag('sephirah_' + SEPHIRAH_CHAIN[i-1].id + '_done')) {
        const progress = getFlag(flagKey + '_progress') || 0;
        const evtText = chain.eventTexts[progress];
        let finalText;
        if (typeof evtText === 'object' && evtText.text) {
          finalText = evtText.text;
          // 最后一个事件
          setFlag(flagKey + '_done', true);
          setFlag('sephirahStage', i + 1);
          addMilestone(chain.milestone);
          // 应用奖励
          if (chain.reward) {
            const a = gameState.attrs;
            if (chain.reward.con) a.con = (a.con||0) + chain.reward.con;
            if (chain.reward.int) a.int = (a.int||0) + chain.reward.int;
            if (chain.reward.wil) a.wil = (a.wil||0) + chain.reward.wil;
            if (chain.reward.wea) a.wea = (a.wea||0) + chain.reward.wea;
          }
        } else {
          finalText = evtText;
          setFlag(flagKey + '_started', true);
          setFlag(flagKey + '_progress', progress + 1);
        }
        // 替换占位符
        if (finalText.includes('{abno}')) {
          const abno = pick(ABNORMALITIES);
          finalText = finalText.replace('{abno}', abno ? abno.name : '一个未知的异想体');
        }
        if (finalText.includes('{work}')) {
          const wt = pick(Object.keys(WORK_TYPES));
          finalText = finalText.replace('{work}', wt);
        }
        addEvent({ text: finalText, major: false });
        return;
      }
    }
  }
}

// 随机异想体工作事件

// ==================== 事件链辅助适配器 ====================
function hasTalent(tag) {
  return (gameState.tags || []).some(t => (t||'').indexOf(tag) !== -1);
}
function rollCheck(attr, diff) {
  const a = gameState.attrs || {};
  return (a[attr] || 0) + randBetween(1, 6) >= diff + 3;
}
function addLog(msg) { /* 兼容，不做额外操作 */ }
function showEvent(text, choices, flag) {
  addEvent({ text: text, effText: '抉择事件', major: true, milestone: flag });
  if (choices && choices.length > 0) {
    const c = choices[Math.floor(Math.random() * choices.length)];
    if (c && c.effect) setTimeout(() => c.effect(), 100);
  }
}
function takeDamage(n) {
  modAttr('con', -n);
  if ((gameState.attrs.con || 0) <= 0) death('事件链战斗中伤重不治');
}

// 时间裂缝解释系统
function getTimeCrackExplanation(age) {
  // 当玩家出生年份与都市事件时间不匹配时，用时间裂缝解释
  if (!gameState.alive || gameState.dead) return;
  const birthYear = gameState.birthYear || 900;

  // 检测时间异常
  const anomalies = [];
  if (birthYear > 950 && age >= 20 && age <= 50) anomalies.push('WARP列车的发展');
  if (birthYear < 880 && age >= 20) anomalies.push('都市现代科技');
  if (birthYear > 970 && age < 30) anomalies.push('过早的都市事件');

  if (anomalies.length > 0 && !getFlag('timeCrackExplained') && age === 15) {
    addEvent({ text: '你注意到，你所经历的时间线似乎有些不连贯——你看到的都市事件似乎属于不同的时代。也许，WARP列车的空间裂缝不只是地理上的……时间，也会在这里折叠。', major: true, milestone: '时间裂缝' });
    addMilestone('时间裂缝');
    setFlag('timeCrackExplained', true);
  }
}

      { personality: '热血好斗', assoc: '六协会', desc: '他身上缠绕着绷带，脸上带着兴奋的笑容。六协会以义体战斗闻名。', friend: '"哈哈！你这小子/丫头有意思！"他大力拍着你的肩膀，"来六协会吧，我们需要你这样的新人！"拍得你肩膀生疼。', foe: '"就你这种身板？"他嗤笑一声，"六协会的战斗可不是闹着玩的。你连一拳都扛不住。"' },

      { personality: '沉默寡言', assoc: 'し协会', desc: '他是し协会的收尾人，带着一把没有护手的刀。沉默是他唯一的语言。', friend: '"……"他看了你很久，最终从口袋里掏出了一颗子弹递给你。"上好的弹。"仅此一个字，然后他消失在了巷口。', foe: '"……"他摇了摇头，转身离开。没有任何解释。沉默有时比语言更残忍。' }
