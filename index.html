function generateColorTitle() {
  const a = gameState.attrs;
  const max = Math.max(a.con || 0, a.int || 0, a.wil || 0, a.wea || 0);

  // 根据主属性筛选颜色
  let attrFilter = 'mix';
  if ((a.con || 0) === max) attrFilter = 'con';
  else if ((a.int || 0) === max) attrFilter = 'int';
  else if ((a.wil || 0) === max) attrFilter = 'wil';
  else if ((a.wea || 0) === max) attrFilter = 'wea';

  // 倾向主属性的颜色（70%概率），否则混色
  let pool = COLOR_PALETTE.filter(c => c.attr === attrFilter);
  if (Math.random() < 0.3) {
    pool = COLOR_PALETTE.filter(c => c.attr === 'mix' || c.attr !== attrFilter);
  }
  if (pool.length === 0) pool = COLOR_PALETTE;

  const color = pick(pool);
  const suffixCategory = pick(['weapon', 'nature', 'abstract', 'action']);
  const suffix = pick(TITLE_SUFFIXES[suffixCategory]);
  const fullTitle = color.name + suffix;

  // 存储色彩信息到flag
  setFlag('color_title', fullTitle);
  setFlag('color_hex', color.hex);
  setFlag('color_name', color.name);
  setFlag('color_suffix', suffix);

  return fullTitle;
}

function checkCombat(difficulty, attrName) {
  const val = gameState.attrs[attrName] || 0;
  const roll = randBetween(1, 6) + randBetween(1, 6);
  return val + roll >= difficulty;
}

function contestedCheck(myAttr, oppAttr) {
  const myRoll = (gameState.attrs[myAttr] || 0) + randBetween(1, 6) + randBetween(1, 6);
  const oppRoll = oppAttr + randBetween(1, 6) + randBetween(1, 6);
  return myRoll >= oppRoll;
}

  if (!gameState.hiddenChecks) gameState.hiddenChecks = {};
  function hiddenCheck(key, maxPerGame) {
    if (!gameState.hiddenChecks[key]) gameState.hiddenChecks[key] = 0;
    return gameState.hiddenChecks[key] < maxPerGame;
  }
  function recordHidden(key) {
    if (!gameState.hiddenChecks[key]) gameState.hiddenChecks[key] = 0;
    gameState.hiddenChecks[key]++;

    setFlag('blockAngelicaDeath', true);
  }

  if (getFlag('aliveAfterPianist') && age >= 30 && age <= 50) {
    setFlag('blockSadRoland', true);
  }

  // ====== 双轨时序约束系统 ======
  // 第一轨：后续阻断先前（更晚时代的事件已发生 → 不触发更早时代的事件）

    setFlag('blockCarmenEra', true);

  if (getFlag('whiteNightEvent')) {

  // 图书馆已出现 → 白夜黑昼、脑叶公司、烟霾战争不再触发

  if (getFlag('secondWhiteNight')) {

    setFlag('blockLCorp', true);
    setFlag('blockWhiteNight', true);
    setFlag('blockLibrary', true);

    setFlag('blockSmokeWar', true);
    setFlag('blockCarmenEra', true);
    setFlag('blockLCorp', true);
    setFlag('blockWhiteNight', true);
    setFlag('blockLibrary', true);
    setFlag('blockPianist', true);
  }

  // 第二轨：先前接续后续（更早时代的事件已发生 → 解锁更晚时代的事件）
  // 含义：如果你经历了烟霾战争，之后才可能遇到脑叶公司的事

    setFlag('era_whiteNight_done', true);
  }
  // 图书馆已出现 → 解锁南部巨变/图书馆插曲
  if (getFlag('libraryAppeared') || getFlag('library_invite')) {
    setFlag('era_library_active', true);
  }
  // 二次白夜已发生 → 解锁后图书馆时代
  if (getFlag('secondWhiteNight')) {
    setFlag('era_postLibrary', true);
  }
  // 钢琴家事件已发生 → 解锁南部巨变
  if (getFlag('pianistEventFired') || getFlag('pianist_witness')) {
    setFlag('era_pianist_done', true);

  // 运行特殊开局与组合标签系统（0岁时检测组合线）
  if (typeof runAllSpecialStarts === 'function') {
    runAllSpecialStarts(age);

  // 若特殊开局导致死亡，提前返回
  if (gameState.dead || !gameState.alive) return events;

  // ---------- 0-6岁 幼年期 ----------
  if (age <= 6) {
    events.push(...generateChildhoodEvents(age, a, f, bp, tags));

    events.push(...generateTeenEvents(age, a, f, bp, tags));

  if (typeof generateBridgeEvents === 'function' && gameState.alive && !gameState.dead) {

  // 扩展事件：大湖捕鲸、工坊、图书馆、生命保险
  if (typeof runExtendedEvents === 'function' && gameState.alive && !gameState.dead) {
    runExtendedEvents();

  // L公司事件链系统（条件触发型固定事件）
  if (gameState.alive && !gameState.dead) {
    runLobotomyChain(age);

  // 传奇收尾人遭遇与时间线历史事件
  if (typeof runLegendEvents === 'function' && gameState.alive && !gameState.dead) {
    runLegendEvents(age);

  // 四级事件系统：一般 / 特殊 / 极其特殊 / 特别（随机事件靠后加载）
  if (typeof runTieredEvents === 'function' && gameState.alive && !gameState.dead) {

  // 奇点科技事件：WARP列车、各翼公司、清道夫等（随机事件靠后加载）

  // 新事件链调用

  return events;
}

      { t: '一个老人在街头教了你三招防身术。他说这是从一个退役收尾人那里学来的。', e: 'con+1', txt: '体质+1' },
      { t: '你目击了一场拇指和食指的街头谈判。双方最终没有打起来，但你感受到了空气中的杀意。', e: 'wil-1', txt: '意志-1' },
      { t: '你在后巷的墙上涂鸦，画了一只飞翔的鸟。第二天，涂鸦被覆盖了，上面写着：「禁止做梦。」', e: 'wil-1', txt: '意志-1' },
      { t: '你的作文得了奖，题目是《我的梦想》。你写的是：我想看到真正的星星。老师给了你很低的分数。', e: 'wil-1', txt: '意志-1' },
      { t: '你在深宵时被困在了外面。你爬上了一根水管，在屋顶上躲了两个小时。', e: 'con+1', txt: '体质+1' },
      { t: '一个环指的艺术家来学校挑选「素材」。他看了你很久，最后摇了摇头走掉了。你不知道那是什么意思。', e: 'wil-1', txt: '意志-1' },
      { t: '你在废品站找到了一本破旧的都市历史书。书里说，曾经的天空是蓝色的。你把那一页撕下来藏好了。', e: 'int+1', txt: '智力+1' },
      { t: '你和朋友们打赌谁敢去废墟深处。你输了，不得不进去捡了一块石头出来。石头上刻着你不认识的字。', e: 'con+1', txt: '体质+1' },
      { t: '你的学校来了一位新老师，她教你们唱一首关于「光」的歌。一周后，她消失了。', e: 'wil-1', txt: '意志-1' },
      { t: '你在街头帮人跑腿，赚到的钱刚好够买一份巢里的便当。你舍不得吃，带回去给了妈妈。', e: 'wil+1', txt: '意志+1' },
      { t: '一个血棒商贩给了你一根免费试吃的血棒。味道很奇怪，但确实能填饱肚子。', e: 'con+1', txt: '体质+1' },
      { t: '你在WARP列车站台看到了一个迷路的孩子。你帮他找到了妈妈，她给了你一枚眼作为谢礼。', e: 'wea+1', txt: '家境+1' },
      { t: '你的体育老师以前是某个帮派的成员。他教你如何用一根铁管对付三个敌人。', e: 'con+1', txt: '体质+1' },
      { t: '你在夜市里看到了一个卖眼的小贩。他的眼是假的，但做工精致。你差点就上当了。', e: 'int+1', txt: '智力+1' },
      { t: '你的朋友突然「转学」了。你知道那不是真的，但你学会了不要问问题。', e: 'wil-1', txt: '意志-1' },
      { t: '你在网上匿名写了一篇关于后巷生活的文章。文章火了，但第二天你的账号被封禁了。', e: 'int+1', txt: '智力+1' },
      { t: '一个齿轮教会的传教士给了你一本小册子。上面说，钢铁会拯救所有人。你把册子垫了桌脚。', e: 'wil+1', txt: '意志+1' },
      { t: '你在废弃的建筑里发现了一架旧钢琴。你按下一个键，声音在空荡的大楼里回响了很久。', e: 'wil+1', txt: '意志+1' },
      { t: '你第一次独自在深宵中生存了下来。当你看到黎明的灰色天空时，你觉得自己长大了。', e: 'wil+1', txt: '意志+1' },
    ];
    const tev = pick(teenCityEvents);
    events.push(evt(tev.t, 'teen_common', tev.txt, false));
    if (tev.e.includes('con+1')) modAttr('con', 1);
    if (tev.e.includes('con-1')) modAttr('con', -1);
    if (tev.e.includes('int+1')) modAttr('int', 1);
    if (tev.e.includes('int-1')) modAttr('int', -1);
    if (tev.e.includes('wil+1')) modAttr('wil', 1);
    if (tev.e.includes('wil-1')) modAttr('wil', -1);
    if (tev.e.includes('wea+1')) modAttr('wea', 1);
    if (tev.e.includes('wea-1')) modAttr('wea', -1);
  }

  return events;
}

// ============================================================
// 19-30岁 青年期
// ============================================================
function generateYoungAdultEvents(age, a, f, bp, tags) {
  const events = [];

  // 职业选择（19岁）——天赋优先匹配
  if (age === 19) {
    addMilestone('成年');

    // === 天赋优先匹配 ===
    const talentOrg = getTalentOrg();
    if (talentOrg) {
      const mappedOrgs = ORG_MAP[talentOrg] || [talentOrg];
      const targetOrg = pick(mappedOrgs);
      if (!canJoinOrg(targetOrg)) {
        const current = getCurrentOrg();
        events.push(evt(
          `你原本因天赋适合加入${targetOrg}，但你已经是${current}的一员。两个组织水火不容，你的道路被堵死了。`,
          'talent_org_blocked', '意志-1', false
        ));
        modAttr('wil', -1);
      } else {
        // 天赋直接匹配成功
        let joinText = '', joinId = '', effects = {};
        if (isFingerOrg(targetOrg)) {
          joinText = `你成年了。天生属于${targetOrg}的血脉在你体内觉醒，家族的关系网迅速将你吸纳进去。`;
          joinId = 'finger_talent_join_' + targetOrg;
          effects = { con: 1, wea: 2 };
          setFlag('finger_joined', targetOrg);
          if (targetOrg === '食指') setFlag('index_finger_member', true);
          setFlag('org_rank', '外围成员');
        } else if (isAssociation(targetOrg)) {
          joinText = `你的才能引起了${targetOrg}的注意。经过考核，你成为了协会的一名收尾人。`;
          joinId = 'assoc_talent_join_' + targetOrg;
          effects = { con: 1, int: 1, wea: 1 };
          setFlag('org', targetOrg);
          setFlag('org_rank', '九阶收尾人');
        } else if (isGang(targetOrg)) {
          joinText = `后巷的血脉在呼唤你。你顺理成章地加入了${targetOrg}。`;
          joinId = 'gang_talent_join_' + targetOrg;
          effects = { con: 2, wea: 1 };
          setFlag('org', targetOrg);
          setFlag('org_rank', '帮众');
        } else if (targetOrg === '工坊') {
          joinText = '你对奇点技术的敏感让你进入了工坊。这里到处是未完成的实验品和疯狂的创意。';
          joinId = 'workshop_talent_join';
          effects = { int: 2 };
          setFlag('org', '工坊');
        } else if (targetOrg === '事务所') {
          joinText = '你创办了一家事务所。虽然不大，但这是属于你自己的事业。';
          joinId = 'office_talent_join';
          effects = { int: 1, wea: 1 };
          setFlag('org', '事务所');
        } else if (targetOrg === '收尾人') {
          joinText = '你成为了一名自由收尾人。没有协会庇护，但也没有协会的束缚。';
          joinId = 'freelance_talent_join';
          effects = { con: 1, wil: 1 };
          setFlag('org', '收尾人');
        } else if (targetOrg === '翼公司') {
          joinText = '不可思议，你竟获得了翼公司的录用通知。那是无数人梦寐以求的机会。';
          joinId = 'wing_talent_join';
          effects = { int: 2, wea: 3 };
          setFlag('org', '翼公司');
        } else if (targetOrg === '齿轮教会') {
          joinText = '钢铁的呼唤在你的梦中回响。你找到了齿轮教会，他们早已等候多时。';
          joinId = 'gear_talent_join';
          effects = { con: 1, int: 1 };
          setFlag('org', '齿轮教会');
        } else if (targetOrg === '血魔') {
          joinText = '某种古老的血脉在你体内苏醒。你找到了同类，成为了血魔的一员。';
          joinId = 'blood_talent_join';
          effects = { con: 2, wil: -2 };
          setFlag('org', '血魔');
          setFlag('half_immortal', true);
        } else {
          joinText = `你成年了，加入了${targetOrg}。`;
          joinId = 'org_talent_join_' + targetOrg;
          effects = { wea: 1 };
          setFlag('org', targetOrg);
        }
        events.push(evt(joinText, joinId, effects, true, '加入' + targetOrg));
        addMilestone('加入' + targetOrg);
        // 应用效果
        if (effects.con) modAttr('con', effects.con);
        if (effects.int) modAttr('int', effects.int);
        if (effects.wil) modAttr('wil', effects.wil);
        if (effects.wea) modAttr('wea', effects.wea);
      }
    }

    // === 无天赋匹配时的常规职业选择 ===
    if (!getCurrentOrg()) {
      const careers = [
        { name: '翼公司员工', req: { int: 5, wea: 4 }, eff: 'int+2,wea+1' },
        { name: '协会收尾人', req: { con: 5, wil: 4 }, eff: 'con+1,wil+1' },
        { name: '工坊工匠', req: { int: 5 }, eff: 'int+2' },
        { name: '事务所收尾人', req: { con: 4 }, eff: 'con+1,wea+1' },
        { name: '帮派成员', req: { con: 4, wil: 3 }, eff: 'con+1' },
        { name: '手指成员', req: { wil: 5 }, eff: 'wil+1,wea+1' },
        { name: '自由收尾人', req: null, eff: 'con+1,int+1' },
        { name: '废墟探险者', req: { con: 4, int: 4 }, eff: 'int+1' },
        { name: '大湖航海者', req: { con: 4 }, eff: 'con+1' },
        { name: '血棒商贩', req: null, eff: 'wea+1' },
      ];
      const validCareers = careers.filter((c) => {
        if (!c.req) return true;
        return Object.keys(c.req).every((k) => (a[k] || 0) >= c.req[k]);
      });
      const career = pick(validCareers.length > 0 ? validCareers : careers);
      events.push(evt(
        `你成年了。你选择了成为${career.name}，开始了你的都市人生。`,
        'career', career.eff.replace(/,/g, '，'), true, `成为${career.name}`
      ));
      if (career.eff.includes('con+1')) modAttr('con', 1);
      if (career.eff.includes('con+2')) modAttr('con', 2);
      if (career.eff.includes('int+1')) modAttr('int', 1);
      if (career.eff.includes('int+2')) modAttr('int', 2);
      if (career.eff.includes('wil+1')) modAttr('wil', 1);
      if (career.eff.includes('wil+2')) modAttr('wil', 2);
      if (career.eff.includes('wea+1')) modAttr('wea', 1);
      if (career.eff.includes('wea+2')) modAttr('wea', 2);
      setFlag('career', career.name);
    }
  }

  // 手指加入事件（20-28岁）
  if (age >= 20 && age <= 28 && !getFlag('finger_joined') && chance(0.06)) {
    // 如果已在其他组织，先触发冲突/制裁剧情
    const currentOrg = getCurrentOrg();
    if (currentOrg && !isFingerOrg(currentOrg)) {
      events.push(evt(
        `${currentOrg}的对手——某个手指向你伸出了橄榄枝。在都市中，脚踏两条船是危险的，但机会难得。`,
        'finger_invite_conflict', '', true, '手指的邀请'
      ));
      events.push(...orgSanction(currentOrg));
      if (!gameState.alive) return events;
      setFlag('org', null);
    }

    const fingers = [
      { name: '拇指', req: { con: 5 }, attr: 'con', desc: '拇指看重你的体质和战斗能力。红大衣在向你招手。' },
      { name: '食指', req: { int: 5 }, attr: 'int', desc: '食指需要你的智慧来理解和执行指令。' },
      { name: '中指', req: { wil: 5 }, attr: 'wil', desc: '中指认可你的意志。恩怨的链条将你永远束缚。' },
      { name: '环指', req: { int: 5 }, attr: 'int', desc: '环指看上了你的艺术天赋——或者说是扭曲的潜质。' },
      { name: '小指', req: null, attr: null, desc: '小指神秘地向你发出了邀请。没有人知道他们为什么选择你。' },
    ];

    for (const finger of fingers) {
      const meetsReq = !finger.req || Object.keys(finger.req).every((k) => (a[k] || 0) >= finger.req[k]);
      if (meetsReq && chance(0.06)) {
        events.push(evt(
          `${finger.desc}你成为了${finger.name}的一员。`,
          'finger_join', '家境+1，意志+1', true, `加入${finger.name}`
        ));
        modAttr('wea', 1); modAttr('wil', 1);
        setFlag('finger_joined', finger.name);
        if (finger.name === '食指') setFlag('index_finger_member', true);
        addMilestone(`加入${finger.name}`);
        break;
      }
    }
  }

  // 帮派加入事件（20-28岁）
  if (age >= 20 && age <= 28 && !getFlag('gang_joined') && chance(0.06)) {
    // 帮派与手指/协会互斥
    const currentOrg = getCurrentOrg();
    if (currentOrg && (isFingerOrg(currentOrg) || isAssociation(currentOrg))) {
      events.push(evt(
        `帮派的人找到了你，希望你加入他们。但你已经是${currentOrg}的一员，帮派的规矩和${currentOrg}完全不同。`,
        'gang_invite_conflict', '', true, '帮派的邀请'
      ));
      events.push(...orgSanction(currentOrg));
      if (!gameState.alive) return events;
      setFlag('finger_joined', null);
      setFlag('org', null);
    }

    const gangs = [
      { name: '黑云会', cond: () => bp === 'nine' || bp === 'backstreet', eff: 'con+1,wil+1' },
      { name: '剑契组', cond: () => bp === 'backstreet' || bp === 'outskirts', eff: 'con+2' },
      { name: '谢肉祭', cond: () => bp === 'twentythree', eff: 'con+1,int-1' },
      { name: '不来梅乐队', cond: () => chance(0.05), eff: 'wil-1,wea+1' },
      { name: '吊钩事务所', cond: () => true, eff: 'con+1' },
      { name: '视线事务所', cond: () => true, eff: 'int+1' },
      { name: '句点事务所', cond: () => (a.con || 0) >= 5, eff: 'con+1,wil+1' },
    ];

    const validGangs = gangs.filter((g) => g.cond());
    if (validGangs.length > 0) {
      const gang = pick(validGangs);
      events.push(evt(
        `你加入了${gang.name}。从此，你的生命不再只属于你自己。`,
        'gang_join', gang.eff.replace(/,/g, '，'), true, `加入${gang.name}`
      ));
      if (gang.eff.includes('con+1')) modAttr('con', 1);
      if (gang.eff.includes('con+2')) modAttr('con', 2);
      if (gang.eff.includes('int+1')) modAttr('int', 1);
      if (gang.eff.includes('int-1')) modAttr('int', -1);
      if (gang.eff.includes('wil+1')) modAttr('wil', 1);
      if (gang.eff.includes('wil-1')) modAttr('wil', -1);
      if (gang.eff.includes('wea+1')) modAttr('wea', 1);
      setFlag('gang_joined', gang.name);
      setFlag('org', gang.name);
    }
  }

  // 烟霾战争事件（时序约束：必须在脑叶公司成立之前，且未被阻断）
  if (age >= 22 && age <= 26 && chance(0.06) && !hasMilestone('烟霾战争') && !getFlag('lCorpFounded') && !getFlag('blockSmokeWar')) {
    events.push(
      evt(
        '烟霾战争爆发了。你被征召入伍，被迫卷入翼公司之间的战争。',
        'war_draft',
        '',
        true,
        '烟霾战争'
      )
    );
    setFlag('war_participant', true);

    if (checkCombat(12, 'con') && checkCombat(10, 'wil')) {
      events.push(
        evt(
          '你在烟霾战争中存活了下来。战争的残酷让你变得更强大，但也让你失去了进入巢的资格——战争参与者的身上带着无法抹去的印记。',
          'war_survive',
          '体质+2，意志+1，家境-2',
          true,
          '烟霾幸存者'
        )
      );
      modAttr('con', 2);
      modAttr('wil', 1);
      modAttr('wea', -2);
      setFlag('war_survivor', true);
    } else {
      events.push(
        evt(
          '烟霾战争吞噬了你。你在一片灰色的烟霾中倒下，再也没有站起来。',
          'war_death',
          '死亡',
          true,
          '战死烟霾'
        )
      );
      death('烟霾战争');
      return events;
    }
  }

  // WARP列车事件
  if (age >= 20 && chance(0.06) && !hasMilestone('WARP列车')) {
    events.push(
      evt(
        '你登上了WARP列车。空间在你面前折叠扭曲，你感到一阵奇异的晕眩。列车内部的时间与外界不同步——当你下车时，外界只过去数秒，而你感到自己似乎经历了某种漫长的东西，只是记忆已经模糊不清。',
        'warp_ride',
        '',
        true,
        'WARP列车'
      )
    );
    if (chance(0.01)) {
      events.push(
        evt(
          '列车出现了时间异常。当你下车时，发现已经过去了十年——但对你来说，这只是一瞬间。你成为了「时间迷失者」。',
          'time_lost',
          '年龄+10，智力+2',
          true,
          '时间迷失者'
        )
      );
      gameState.age += 10;
      modAttr('int', 2);
      setFlag('time_lost', true);
    } else if (checkCombat(10, 'wil')) {
      events.push(
        evt(
          '你忍受住了WARP旅行的精神冲击。你安全抵达了目的地。',
          'warp_safe',
          '意志+1',
          false
        )
      );
      modAttr('wil', 1);
    } else {
      events.push(
        evt(
          'WARP旅行几乎摧毁了你的精神。你花了很长时间才恢复过来。',
          'warp_trauma',
          '意志-1',
          false
        )
      );
      modAttr('wil', -1);
    }
  }

  // 钢琴家事件
  if (age >= 23 && age <= 27 && (bp === 'nine' || bp === 'backstreet') && chance(0.06) && !hasMilestone('钢琴家事件')) {
    events.push(
      evt(
        '钢琴家的旋律在第九巷回荡。那是一个雨夜，黑色的音符化作实体，收割着生命。',
        'pianist_event',
        '',
        true,
        '钢琴家事件'
      )
    );
    if ((a.con || 0) >= 8 || (a.wil || 0) >= 8) {
      events.push(
        evt(
          '你冲进了钢琴家的旋律中。你的意志（或体质）让你保持清醒，你救下了一个女人——她叫安吉丽卡。',
          'save_angelica',
          '意志+2',
          true,
          '救下安吉丽卡'
        )
      );
      modAttr('wil', 2);
      setFlag('saved_angelica', true);
    } else {
      events.push(
        evt(
          '你试图逃跑，但钢琴家的旋律追上了你。你失去了听觉，但保住了性命。',
          'pianist_escape',
          '意志-1',
          false
        )
      );
      modAttr('wil', -1);
    }
  }

  // 血红之夜
  if (age >= 24 && age <= 30 && chance(0.06) && !hasMilestone('血红之夜')) {
    events.push(
      evt(
        '血红之夜降临了。伊莲娜的仆从们在街道上猎捕猎物。你成为了目标之一。',
        'red_night',
        '',
        true,
        '血红之夜'
      )
    );
    if (checkCombat(12, 'con') || checkCombat(12, 'wil')) {
      events.push(
        evt(
          '你击退了血红之夜的仆从。你的鲜血让它们兴奋，但你的力量让它们退却。',
          'red_night_survive',
          '体质+1',
          false
        )
      );
      modAttr('con', 1);
    } else {
      events.push(
        evt(
          '你被血红之夜的仆从抓住了。当你再次醒来时，你发现自己对血液产生了特殊的感情。',
          'red_night_caught',
          '体质+1，意志-1',
          false
        )
      );
      modAttr('con', 1);
      modAttr('wil', -1);
      setFlag('blood_bond', true);
    }
  }

  // 白夜黑昼（时序约束：必须在脑叶公司成立之后，且未被阻断）
  if (age >= 25 && age <= 30 && chance(0.06) && !hasMilestone('白夜黑昼') && getFlag('lCorpFounded') && !getFlag('blockWhiteNight')) {
    events.push(
      evt(
        '白夜黑昼降临了。三天极昼，四天极夜。太阳不再落下，然后永不再升起。整个都市陷入了混乱。',

function addEvent(ev) {
  ev.age = gameState.age;
  gameState.events.push(ev);
  if (ev.milestone) gameState.milestones.push(ev.milestone);

  const log = document.getElementById('event-log');
  const entry = document.createElement('div');
  entry.className = 'event-entry' + (ev.major ? ' major' : '');
  entry.innerHTML = `
    <div class="event-age">${gameState.age}岁</div>
    <div>
      <div class="event-text">${formatEventText(ev.text)}</div>
      ${ev.effText ? `<div class="event-effect"><span class="${getEffectClass(ev.effText)}">${ev.effText}</span></div>` : ''}
    </div>
  `;
  log.appendChild(entry);
  // Scroll to bottom
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function getEffectClass(effText) {
  const hasNeg = effText.match(/-\d/);
  return hasNeg ? 'eff-bad' : 'eff-good';
}

    <div class="stat-item">智力 <span class="stat-val">${a.int}</span></div>
    <div class="stat-item">意志 <span class="stat-val">${a.wil}</span></div>
    <div class="stat-item">家境 <span class="stat-val">${a.wea}</span></div>
    <div class="stat-item">快乐 <span class="stat-val" style="color:${gameState.happiness >= 0 ? '#5a9e6f' : '#c0392b'}">${gameState.happiness}</span></div>
  `;
  document.getElementById('sim-age').textContent = `${gameState.age}岁`;
}

function toggleSimSpeed() {
  gameState.simAuto = !gameState.simAuto;
  const btn = document.getElementById('btn-sim-speed');
  const nextBtn = document.getElementById('btn-next-event');
  if (gameState.simAuto) {
    btn.textContent = '暂停';
    if (nextBtn) nextBtn.style.opacity = '0.4';
    // If there are pending events, continue auto-displaying them
    if (gameState.pendingEvents && gameState.eventIndex < gameState.pendingEvents.length) {
      const cb = gameState.afterEventCallback;
      gameState.afterEventCallback = null;
      const speed = getSimSpeed();
      const delay = getEventDelay(speed);
      gameState.simTimer = setTimeout(() => showNextEvent(cb), delay);
    } else if (gameState.alive && !gameState.dead) {
      nextYear();
    }
  } else {
    btn.textContent = '自动播放';
    if (nextBtn) nextBtn.style.opacity = '1';
    if (gameState.simTimer) clearTimeout(gameState.simTimer);
  }
}

function finishSim() {
  gameState.simAuto = false;
  if (gameState.simTimer) clearTimeout(gameState.simTimer);

  // Fast forward all remaining years
  while (gameState.alive) {
    const events = generateEvents(gameState.age);
    events.forEach(ev => {
      ev.age = gameState.age;
      gameState.events.push(ev);
      if (ev.milestone) gameState.milestones.push(ev.milestone);
    });
    if (gameState.happiness <= -10) {
      gameState.alive = false;
      gameState.flags.twisted = true;
      gameState.events.push({ text: '你的内心承受不住都市的重压，理性崩溃了……', effect: '扭曲了', major: true, age: gameState.age });
    }
    if (gameState.attrs.con <= 0) {
      gameState.alive = false;
      gameState.events.push({ text: '你的身体已无法承受都市的残酷。', effect: '体质归零', major: true, age: gameState.age });
    }
    if (!gameState.alive) break;

    gameState.age++;
    let deathChance = 0;
    if (gameState.age > 70) deathChance = (gameState.age - 70) * 0.03;
    if (gameState.age > 80) deathChance += (gameState.age - 80) * 0.05;
    if (gameState.age > 90) deathChance += 0.3;
    if (Math.random() < deathChance) {
      gameState.alive = false;
      gameState.events.push({ text: `你在${gameState.age}岁时安详地离开了这个世界。`, effect: '' });
    }
    const maxAge = 100 + (gameState.lifeExtended || 0);
    if (gameState.age > maxAge) {
      gameState.alive = false;
      gameState.events.push({ text: '你在这个都市活了太久太久。' });
    }
  }

  // Render all events quickly
  const log = document.getElementById('event-log');
  log.innerHTML = '';
  gameState.events.forEach(ev => {
    const entry = document.createElement('div');
    entry.className = 'event-entry' + (ev.major ? ' major' : '');
    entry.style.opacity = '1';
    entry.style.animation = 'none';
    entry.innerHTML = `
      <div class="event-age">${ev.age || '?'}</div>
      <div>
        <div class="event-text">${ev.text}</div>
        ${ev.effText ? `<div class="event-effect"><span class="${getEffectClass(ev.effText)}">${ev.effText}</span></div>` : ''}
      </div>
    `;
    log.appendChild(entry);
  });

  setTimeout(() => endSimulation(), 500);
}

function endSimulation() {
  gameState.simAuto = false;
  if (gameState.simTimer) clearTimeout(gameState.simTimer);
  const ctrl = document.getElementById('sim-controls');
  ctrl.classList.remove('hidden');
  ctrl.innerHTML = '<div class="sim-loading-wrap"><div class="sim-loading-bar"><div class="sim-loading-progress" id="sim-loading-progress"></div></div><div class="sim-loading-text" id="sim-loading-text">正在整理人生档案...</div></div>';
  const progressBar = document.getElementById('sim-loading-progress');
  const loadingText = document.getElementById('sim-loading-text');
  requestAnimationFrame(function() { if (progressBar) progressBar.style.width = '100%'; });
  var texts = ['正在整理人生档案...', '正在计算成就...', '正在生成人生总结...'];
  var textIdx = 0;
  var textInterval = setInterval(function() {
    textIdx = (textIdx + 1) % texts.length;
    if (loadingText) loadingText.textContent = texts[textIdx];
  }, 800);
  setTimeout(function() {
    clearInterval(textInterval);
    ctrl.innerHTML = '<button class="btn btn-sm btn-gold" onclick="showResults()" style="font-size:1.1em;padding:12px 32px;">查看人生总结</button>';
  }, 2500);
}

function calculateRank() {
  const gs = gameState;
  const achievements = checkAchievements(gs);
  const achCount = achievements.length;
  const milestoneCount = gs.milestones.length;
  const con = gs.attrs.con || 0, int = gs.attrs.int || 0, wil = gs.attrs.wil || 0, wea = gs.attrs.wea || 0;
  const attrSum = con + int + wil + wea;
  const rarityWeights = { common: 5, rare: 12, epic: 25, legend: 50 };
  let achScore = 0;
  for (const a of achievements) achScore += rarityWeights[a.rarity] || 5;
  const age = gs.age || 0;
  const ext = gs.lifeExtended || 0;
  const ageScore = age >= 100 + ext ? 30 + ext : age >= 80 ? 25 : age >= 60 ? 20 : age >= 40 ? 15 : age >= 25 ? 10 : age >= 15 ? 5 : 0;
  const deathPenalty = gs.alive ? 0 : 15;

  // 快速通道
  if (gs.milestones.includes('杂质') || gs.milestones.includes('都市之星')) {
    return { rank: 'S+', label: '杂质 / 都市之星', quote: '你在都市的历史中留下了不可磨灭的痕迹。无论是作为英雄还是噩梦，你的名字将永远被铭记。', color: '#ff3864', score: 999, achievements, note: '被都市认定为杂质，或是传说般的都市之星。' };
  }
  if (gs.milestones.includes('色彩级收尾人') || gs.milestones.includes('漆黑静默') || gs.milestones.includes('殷红迷雾') || gs.milestones.includes('堇紫泪滴')) {
    return { rank: 'S', label: '色彩级收尾人', quote: '色彩级——收尾人中的传奇。你的名字足以让后巷的耗子停止呼吸。', color: '#f1c40f', score: 900, achievements, note: '你是收尾人中的传奇，色彩级的威名响彻都市。' };
  }
  if (gs.flags.twisted) {
    return { rank: 'S', label: '异想体', quote: '都市的噩梦并非只存在于传说之中。那些扭曲的灵魂，终将化为异想体，永远游荡在这片黑暗之中。', color: '#8B0000', score: 850, achievements, note: '你成为了都市 nightmares 的一部分。' };
  }
  if (gs.flags.book) {
    return { rank: 'S', label: '书籍', quote: '你的故事被收录在了安吉拉的图书馆中。在这座无尽的图书馆里，你将以另一种形式继续存在。', color: '#9b59b6', score: 800, achievements, note: '图书馆中的一本书，另一个永恒的开始。' };
  }

  const total = attrSum * 2 + milestoneCount * 8 + achScore + ageScore - deathPenalty;
  let rank, label, quote, color, note;
  if (total >= 350) { rank='S+'; label='杂质 / 都市之星'; quote='你在都市的历史中留下了不可磨灭的痕迹。'; color='#ff3864'; note='被都市认定为杂质，或是传说般的都市之星。'; }
  else if (total >= 280) { rank='S'; label='色彩级收尾人'; quote='色彩级——收尾人中的传奇。'; color='#f1c40f'; note='你的名字足以让后巷的耗子停止呼吸。'; }
  else if (total >= 220) { rank='A+'; label='一阶收尾人'; quote:'一阶——职业收尾人的顶点。都市的梦魇在你面前不过是一场噩梦。'; color='#daa520'; note:'职业最高等级，精英中的精英。'; }
  else if (total >= 160) { rank='A'; label='二阶收尾人'; quote:'二阶——"上游"的实力。你可以承接都市梦魇级的委托了。'; color='#4a7fb5'; note:'足以应对大多数都市恶疾。'; }
  else if (total >= 110) { rank='B'; label='五阶收尾人'; quote:'五阶——"中游"的起点。你已经在都市中站稳了脚跟。'; color='#7a6f5a'; note:'在后巷中已算一方强者。'; }
  else if (total >= 70) { rank='C'; label='七阶收尾人'; quote:'七阶——你加入了有名气的事务所，但距离真正的强者还差得远。'; color='#555'; note:'勉强在都市的夹缝中求生。'; }
  else if (total >= 35) { rank='D'; label='九阶收尾人'; quote:'九阶——刚握起武器的普通人。都市不会记住你的名字。'; color='#666'; note:'后巷底层的无名之辈。'; }
  else { rank='E'; label='耗子 / 底层'; quote:'在这座巨大的都市里，你连成为九阶的资格都没有。'; color:'#444'; note:'都市从不缺少这样的尘埃。'; }

  return { rank, label, quote, color, score: total, achievements, note };
}
function generateLifeStory() {
  const { birthplace, selectedTalents, milestones, events, age, alive, deathCause, attrs } = gameState;
  const storyParts = [];
  const bpName = birthplace ? birthplace.name : '都市的某个角落';
  const bpDesc = birthplace ? birthplace.desc : '';

  const openers = [
    `你出生在${bpName}，${bpDesc}。`,
    `你的故事始于${bpName}——${bpDesc}。`,
    `${bpName}，${bpDesc}，这就是你生命的起点。`
  ];
  storyParts.push(openers[Math.floor(Math.random() * openers.length)]);

  if (selectedTalents.length > 0) {
    const t = selectedTalents[0];
    const tDescs = [
      `自幼你便展现出与众不同的特质——「${t.name}」，这让你在同龄人中显得格外特别。`,
      `命运赐予你「${t.name}」的烙印，${t.desc.substring(0, 30)}……`,
      `你天生带有「${t.name}」，它成为你成长路上的第一把钥匙。`
    ];
    storyParts.push(tDescs[Math.floor(Math.random() * tDescs.length)]);
  }

  const youthPhase = attrs.int > 6
    ? "你年少时聪慧过人，在知识的海洋中如鱼得水。"
    : attrs.con > 6
      ? "你自幼体格强健，在后巷的险恶环境中磨练出了坚韧的生存意志。"
      : attrs.wil > 6
        ? "你拥有超乎常人的意志力，即使面对都市最黑暗的面相也从未退缩。"
        : attrs.wea > 5
          ? "你出生在一个相对优渥的环境中，金钱为你铺就了不同于常人的道路。"
          : "你在都市的夹缝中艰难成长，每一天都是对生存意志的考验。";
  storyParts.push(youthPhase);

  if (milestones.length > 0) {
    const key = milestones.slice(0, 2);
    const msTexts = [
      `人生的转折来得猝不及防——${key.join("、")}。这些经历如刻刀般在你身上留下不可磨灭的痕迹。`,
      `在你的人生中，「${key[0]}」成为了最重要的分水岭。`,
      `都市从不吝啬它的"馈赠"：${key.join("、")}——这一切塑造了今天的你。`
    ];
    storyParts.push(msTexts[Math.floor(Math.random() * msTexts.length)]);
  }

  const majorEvents = events.filter(e => e.major);
  if (majorEvents.length > 0) {
    const ev = majorEvents[0];
    const evDescs = [
      `那段最刻骨铭心的经历是关于${ev.text.substring(0, 20)}……它彻底改变了你对这个世界的认知。`,
      `你永远不会忘记那一天——${ev.text.substring(0, 25)}……都市的齿轮从不为任何人停转。`,
      `在命运的交叉口，${ev.text.substring(0, 20)}……成为了你灵魂深处最深的烙印。`
    ];
    storyParts.push(evDescs[Math.floor(Math.random() * evDescs.length)]);
  }

  if (gameState.flags.library_invite) {
    storyParts.push("某天，一封金色的邀请函出现在你面前——「图书馆」向你敞开了大门。那是都市中最神秘的传说，是知识的终点，也是无数灵魂的归处。");
  }

  if (!alive) {
    const dTexts = [
      `最终，你在${age}岁时迎来了生命的终结。${deathCause || "都市吞噬了你的存在，如同它吞噬无数无名之辈一样。"}`,
      `${age}岁，你的故事画上了句号。${deathCause || "在都市的阴影中，你的光芒悄然熄灭。"}`,
      `直到${age}岁那年，${deathCause || "死亡如一位沉默的老友，终于叩响了你的门扉。"}`
    ];
    storyParts.push(dTexts[Math.floor(Math.random() * dTexts.length)]);
  } else {
    const aTexts = [
      `如今你已${age}岁，依然在都市的洪流中前行。没有人知道明天会带来什么——但你还活着，这就足够了。`,
      `${age}岁的你，仍在书写属于自己的篇章。在这个疯狂的城市里，生存本身就是一场胜利。`,
      `岁月将你带到${age}岁，你的脚步仍未停歇。都市的故事永无止境，而你的传奇或许才刚刚开始。`
    ];
    storyParts.push(aTexts[Math.floor(Math.random() * aTexts.length)]);
  }

  let story = storyParts.join("");
  if (story.length < 200) {
    story += `后巷的霓虹灯依旧闪烁，巢的巨塔沉默矗立。在这个被称为"都市"的庞大机器中，你的存在或许只是一粒微尘——但即便如此，这也是独属于你的一生。`;
  }
  if (story.length > 400) story = story.substring(0, 397) + "……";
  return story;
}

function getHighlightMoments() {
  const { events, milestones } = gameState;
  const highlights = [];
  const majorEvents = events.filter(e => e.major);
  for (const ev of majorEvents) {
    highlights.push({
      name: ev.milestone || (ev.text.length > 15 ? ev.text.substring(0, 15) + "……" : ev.text),
      desc: ev.effText || "这是一段改变人生的经历。",
      type: "major"
    });
    if (highlights.length >= 5) break;
  }
  if (highlights.length < 3) {
    for (const ms of milestones) {
      highlights.push({ name: ms, desc: "人生的重要里程碑。", type: "milestone" });
      if (highlights.length >= 5) break;
    }
  }
  if (highlights.length < 3) {
    const sig = events.filter(e => !e.major && e.effText && (/[\+\-]\d/.test(e.effText) || /获得|失去/.test(e.effText)));
    for (const ev of sig.slice(0, 3)) {
      highlights.push({ name: ev.text.substring(0, 15) + "……", desc: ev.effText, type: "significant" });
      if (highlights.length >= 5) break;
    }
  }
  return highlights.slice(0, 5);
}

function getLibraryEnding() {
  const { attrs, flags } = gameState;
  if (!flags.library_invite) return null;
  const a = attrs;
  let aWeight = 0.30, bWeight = 0.25, cWeight = 0.20, bookWeight = 0.25;
  if ((a.wil || 0) >= 8) { cWeight += 0.10; aWeight -= 0.05; bWeight -= 0.05; }
  if ((a.int || 0) >= 8) { bookWeight += 0.10; aWeight -= 0.05; }
  if ((a.con || 0) >= 8) { cWeight += 0.05; bookWeight += 0.05; aWeight -= 0.10; }
  if ((a.con || 0) <= 3) { aWeight += 0.10; cWeight -= 0.10; }
  const roll = Math.random();
  if (roll < aWeight) {
    return { type: 'A', title: '图书馆A结局', desc: '你在图书馆的接待中失败了。安吉拉将你的故事化作了一本书，永远地陈列在图书馆的书架上。', effect: '死亡' };
  } else if (roll < aWeight + bWeight) {
    return { type: 'B', title: '图书馆B结局', desc: '你在图书馆中迷失了。无尽的书架、无尽的走廊，你再也找不到出口。你的意识逐渐消散，成为了图书馆的一部分。', effect: '死亡' };
  } else if (roll < aWeight + bWeight + cWeight) {
    return { type: 'C', title: '图书馆C结局', desc: '你在图书馆的接待中奇迹般地存活了下来。当你再次睁开眼睛时，你发现自己躺在都市的某个角落——你复活了。', effect: '复活' };
  } else {
    return { type: 'BOOK', title: '夺书者', desc: '你不仅存活了下来，还从图书馆中夺走了一本书。那本书中蕴含着某个强大存在的力量。你成为了都市中少数从图书馆全身而退的人。', effect: '获得力量' };
  }
}

      if (gameState.egoForm) eq.push(`<span style="padding:4px 10px;border:1px solid #9b59b6;color:#9b59b6;border-radius:4px;font-size:0.85rem;">E.G.O：${gameState.egoForm}</span>`);
      if (gameState.godEquip) eq.push(`<span style="padding:4px 10px;border:1px solid #f1c40f;color:#f1c40f;border-radius:4px;font-size:0.85rem;">神备：${gameState.godEquip}</span>`);
      return eq.length > 0 ? `
      <div style="margin:15px 0;padding:10px;background:#111;border:1px solid #2a2a2a;border-radius:6px;text-align:center;">
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
          ${eq.join('')}
        </div>
      </div>` : '';
    })()}
    ${storySection}
    ${highlightSection}
    ${libSection}
    <div class="result-talents">
      <h4>&#10022; 天赋 &#10022;</h4>
      <div class="result-talent-list">
        ${gameState.selectedTalents.map(t => `<span class="selected-tag">${t.name}</span>`).join('')}
      </div>
    </div>
    ${gameState.milestones.length > 0 ? `
    <div class="result-milestones">
      <h4>&#10022; 人生里程碑 &#10022;</h4>
      ${gameState.milestones.map(m => `<div class="milestone-item">${m}</div>`).join('')}
    </div>` : ''}
  `;

  if (gameState.flags.library && Math.random() < 0.3 && !gameState.flags.twisted && !libEnd) {
    gameState.flags.book = true;
    const libResult = calculateRank();
    card.innerHTML = `
      <div class="result-rank" style="color:${libResult.color}">&#10022; ${libResult.rank} &#10022;</div>
      <div class="result-rank-label">${libResult.label}</div>
      <div class="result-quote">"${libResult.quote}"</div>
      ${commonContent}
    `;
  } else {
    card.innerHTML = `
      <div class="result-rank" style="color:${result.color}">&#10022; ${result.rank} &#10022;</div>
      <div class="result-rank-label">${result.label}</div>
      ${(() => {
        const ct = getFlag('color_title');
        const ch = getFlag('color_hex');
        if (ct && ch && gameState.milestones.some(m => m.includes('色彩级'))) {
          return `<div style="margin:12px 0;padding:8px 16px;border:2px solid ${ch};border-radius:4px;background:rgba(${parseInt(ch.slice(1,3),16)},${parseInt(ch.slice(3,5),16)},${parseInt(ch.slice(5,7),16)},0.08);display:inline-block;">
            <span style="color:${ch};font-size:1.15rem;font-weight:bold;letter-spacing:0.15em;">&#9670; ${ct} &#9670;</span>
          </div>`;
        }
        return '';
      })()}
      <div class="result-quote">"${result.quote}"</div>
      ${commonContent}
    `;
  }
  showSummary();
}

function showSummary() {
  const card = document.getElementById('result-card');
  if (card && !document.getElementById('share-img-btn')) {
    const btn = document.createElement('button');
    btn.id = 'share-img-btn';
    btn.textContent = '\uD83D\uDCE7 保存为图片';
    btn.style.cssText = 'margin:15px auto;display:block;background:#2a6;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:1rem;';
    btn.onclick = function() { saveResultAsImage(); };
    card.appendChild(btn);
  }
}

async function saveResultAsImage() {
  const card = document.getElementById('result-card');
  if (!card) return;
  const btn = document.getElementById('share-img-btn');
  if (btn) btn.style.display = 'none';
  const msg = document.createElement('div');
  msg.textContent = '正在生成图片...';
  msg.style.cssText = 'text-align:center;color:#daa520;padding:15px;';
  card.appendChild(msg);
  try {
    if (typeof html2canvas === 'undefined') {
      msg.textContent = '图片生成库加载失败，请刷新页面重试';
      if (btn) btn.style.display = 'block';
      return;
    }
    const canvas = await html2canvas(card, { backgroundColor: '#0a0a0a', scale: 2, useCORS: true, logging: false });
    const link = document.createElement('a');
    link.download = '都市人生重开_' + (gameState.age || 0) + '岁_' + new Date().toLocaleDateString('zh-CN') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    msg.textContent = '\u2714 图片已保存！';
    msg.style.color = '#5a9e6f';
  } catch(e) {
    msg.textContent = '图片生成失败: ' + e.message;
    msg.style.color = '#c0392b';
  }
  if (btn) btn.style.display = 'block';
}

function restartGame() {
  hideAllPhases();
  document.getElementById('codex-toggle').style.display = 'none';
  showPhase('phase-title');
}

let codexUnlocked = {};
const SECRET_THRESHOLDS = [10, 25, 40, 60, 80];

function unlockCodexEntry(id) {
  codexUnlocked[id] = true;
}

function checkCodexUnlocks() {
  const ms = gameState.milestones;
  const fl = gameState.flags;
  CODEX_DATA.forEach(entry => {
    if (codexUnlocked[entry.id]) return;
    if (entry.secret) return;
    const keywords = entry.unlock.split(/[、，,]/);
    for (const kw of keywords) {
      if (ms.some(m => m.includes(kw)) || Object.keys(fl).some(k => k.includes(kw.toLowerCase()))) {
        unlockCodexEntry(entry.id);
        break;
      }
    }
  });
  const unlockedCount = Object.keys(codexUnlocked).length;
  const achieved = getUnlockedAchievementCount();
  if (achieved >= SECRET_THRESHOLDS[0] && !codexUnlocked['river_recurrence']) {
    unlockCodexEntry('river_recurrence');
    CODEX_DATA.find(e=>e.id==='river_recurrence').desc = '你在不同的人生中反复遇到相似的面孔和事件。这不是巧合——都市的"河"中，所有的可能性都在流动。你的每一次重开，都是河中的一次回旋。';
  }
  if (achieved >= SECRET_THRESHOLDS[1] && !codexUnlocked['true_identity']) {
    unlockCodexEntry('true_identity');
    CODEX_DATA.find(e=>e.id==='true_identity').desc = '你并非普通的都市居民。你的体质中蕴含着对"光"的异常感应——这解释了为何你总是被卷入异想体、扭曲、神备相关的事件。你是什么？光之种的残余？还是某种尚未被分类的存在？';
  }
  if (achieved >= SECRET_THRESHOLDS[2] && !codexUnlocked['light_origin']) {
    unlockCodexEntry('light_origin');
    CODEX_DATA.find(e=>e.id==='light_origin').desc = '光之种——脑叶公司积累的巨大能源，通过卡巴拉密教"火剑之路"的步骤完成。高塔般的大树破土而出，向世界撒落果实。过去与未来、现实与幻想、肉体与心灵、空间与时间的界限正在慢慢消失。你看到了那棵树的残影。';
  }
  if (achieved >= SECRET_THRESHOLDS[3] && !codexUnlocked['city_truth']) {
    unlockCodexEntry('city_truth');
    CODEX_DATA.find(e=>e.id==='city_truth').desc = '都市的真相被层层迷雾包裹。首脑不是一个人，而是规则本身。五指是后巷的暗面。翼公司的奇点是都市的基石。而你——一个反复回旋在河中的存在——也许是唯一能看清全貌的人。但这并不意味着你能改变什么。在都市中，真相往往比谎言更致命。';
  }
}

function getUnlockedAchievementCount() {
  const achieved = ACHIEVEMENTS.filter(a => a.condition(gameState)).length;
  return achieved;
}

function renderCodex() {
  checkCodexUnlocks();
  const total = CODEX_DATA.length;
  const unlocked = Object.keys(codexUnlocked).length;
  document.getElementById('codex-progress').textContent = '已解锁: ' + unlocked + ' / ' + total + ' (' + Math.floor(unlocked/total*100) + '%)';
  const achieved = getUnlockedAchievementCount();
  const nextThreshold = SECRET_THRESHOLDS.find(t => achieved < t);
  const hintEl = document.getElementById('codex-secret-hint');
  if (nextThreshold) {
    hintEl.style.display = 'block';
    hintEl.textContent = '解锁更多隐藏条词需要成就数量达到 ' + nextThreshold + '（当前: ' + achieved + '）';
  } else {
    hintEl.style.display = 'none';
  }
  const cats = [...new Set(CODEX_DATA.map(e => e.cat))];
  let html = '';
  cats.forEach(cat => {
    const entries = CODEX_DATA.filter(e => e.cat === cat);
    html += '<div class="codex-category"><div class="codex-category-title">' + cat + '</div>';
    entries.forEach(entry => {
      const isUnlocked = codexUnlocked[entry.id];
      html += '<div class="codex-entry ' + (isUnlocked ? '' : 'locked') + '">';
      html += '<div class="codex-entry-name">' + (isUnlocked ? entry.name : '???') + '</div>';
      html += '<div class="codex-entry-desc">' + (isUnlocked ? entry.desc : '未解锁——在人生中探索以发现此条词') + '</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('codex-content').innerHTML = html;
}

function toggleCodex() {
  const panel = document.getElementById('codex-panel');
  const overlay = document.getElementById('codex-overlay');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    overlay.classList.remove('open');
  } else {
    renderCodex();
    panel.classList.add('open');
    overlay.classList.add('open');
  }
}

function showPhase(id) {
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  gameState.phase = id;
  if (id === 'phase-sim') {
    document.getElementById('sim-controls').classList.remove('hidden');
  }
  window.scrollTo(0, 0);
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (gameState.phase === 'phase-sim') {
    if (e.code === 'Space') {
      e.preventDefault();
      if (!gameState.simAuto) {
        nextYear();
      } else {
        toggleSimSpeed();
      }
    }
    if (e.code === 'Enter') {
      e.preventDefault();
      toggleSimSpeed();
    }
  }
});

/**
 * 检查单个组合标签是否匹配当前已选天赋
 * @param {string[]} comboTags — 该组合线要求的标签列表
 * @returns {boolean}
 */
function matchComboTags(comboTags) {
  // 所有标签必须同时满足
  return comboTags.every(tag => hasTag(tag));
}

/**
 * 检查是否匹配某一条特定组合线
 * @param {string} lineId — 组合线ID（如 'anglica'）
 * @returns {object|null} — 匹配返回线定义，否则返回null
 */
function checkComboLine(lineId) {
  const line = COMBO_LINES.find(l => l.line === lineId);
  if (!line) return null;
  if (matchComboTags(line.tags)) {
    return line;
  }
  return null;
}

/**
 * 检查所有组合线，返回所有匹配的结果（按优先级排序，隐藏线优先）
 * @returns {object[]}
 */
function checkAllComboLines() {
  const matched = COMBO_LINES.filter(line => matchComboTags(line.tags));
  // 隐藏线排在前面（它们通常要求更严格）
  matched.sort((a, b) => {
    if (a.hidden && !b.hidden) return -1;
    if (!a.hidden && b.hidden) return 1;
    // 标签更多的组合排在前面（更具体）
    return b.tags.length - a.tags.length;
  });
  return matched;
}

      '你在垃圾堆旁找到了半块发霉的面包，那是你今天的晚餐。',

 * 孤儿在深宵时无人保护，死亡概率更高；但高独立性可以降低风险
 */
function deepNightCleanerThreat() {
  const independence = getFlag('independence') || 0;
  // 独立性越高，存活率越高
  const survivalChance = 0.3 + independence * 0.08; // 基础30%，每点独立+8%

  if (!chance(survivalChance)) {
    death('深宵中无人庇护，被清道夫吞噬');
    return;
  }

  // 存活下来了
  const desc = independence >= 3
    ? '深宵再次降临，但你已经熟悉了清道夫的规律。你冷静地躲过了它们的清扫路线。'
    : '深宵降临，清道夫在街道上嗡嗡作响。你蜷缩在角落里，祈祷自己不会被发现。你活了下来，但恐惧加深了。';
  subEvt('danger', 'deep_night_survive', desc, true, '深宵幸存');
  modAttr('wil', 0.5);

/**
 * 购买生命保险
 * @param {string} companyId — 保险公司ID
 * @returns {boolean} — 是否购买成功
 */
function buyLifeInsurance(companyId) {
  const insurance = INSURANCE_COMPANIES.find(i => i.id === companyId);
  if (!insurance) {
    subEvt('system', 'insurance_invalid', '未知的保险公司。', false, '购买失败');
    return false;
  }

  // 检查年龄（必须成年才能购买）
  if (gameState.age < 18) {
    subEvt('system', 'insurance_too_young', '未成年人无法购买生命保险。', false, '购买失败');
    return false;
  }

  // 检查是否已经持有同一家保险
  const current = getFlag('lifeInsurance');
  if (current && current.companyId === companyId && current.remaining > 0) {
    subEvt('system', 'insurance_duplicate', `你已经持有${insurance.name}。`, false, '购买失败');
    return false;
  }

  // 检查家境
  if ((gameState.attrs.wea || 0) < insurance.costWea) {
    subEvt('system', 'insurance_too_poor', `你的家境不足以支付${insurance.name}的费用（需要${insurance.costWea}）。`, false, '购买失败');
    return false;
  }

  // 扣款并投保
  modAttr('wea', -insurance.costWea);
  setFlag('lifeInsurance', {
    companyId: insurance.id,
    companyName: insurance.name,
    remaining: insurance.resurrectionCount,
    memoryLoss: insurance.memoryLoss,
    attrPenalty: insurance.attrPenalty,
    sideEffect: insurance.sideEffect || false,
    luckPenalty: insurance.luckPenalty || false,
  });

  subEvt('major', `insurance_bought_${companyId}`, `你购买了${insurance.name}。花费家境${insurance.costWea}。死亡后将获得一次复活机会。`, true, '生命保险');
  addMilestone(`购买${insurance.name}`);
  return true;
}

/**
 * 使用生命保险复活（在death()之后调用，若返回true则阻止死亡）
 * @returns {boolean} — 是否成功复活
 */
function useLifeInsurance() {
  const insurance = getFlag('lifeInsurance');
  if (!insurance || insurance.remaining <= 0) return false;

  insurance.remaining -= 1;
  setFlag('lifeInsurance', insurance);

  const company = INSURANCE_COMPANIES.find(i => i.id === insurance.companyId);

  let desc = `${company.name}的复活服务生效了。`;

  // 记忆损失
  if (insurance.memoryLoss) {
    desc += '但你失去了大量记忆，像做了一场很长很长的梦，醒来后什么都不记得了。';
    setFlag('amnesia', true);
    // 清除部分里程碑记录（模拟记忆损失）
    if (gameState.milestones && gameState.milestones.length > 3) {
      const preserved = gameState.milestones.slice(-3); // 只保留最近3个
      gameState.milestones.length = 0;
      gameState.milestones.push(...preserved);
    }
  }

  // 属性惩罚
  if (insurance.attrPenalty > 0) {
    const penalty = insurance.attrPenalty;
    modAttr('con', -(gameState.attrs.con || 0) * penalty);
    modAttr('int', -(gameState.attrs.int || 0) * penalty);
    modAttr('wil', -(gameState.attrs.wil || 0) * penalty);
    desc += `复活对你的身体造成了负担，全属性下降${(penalty * 100).toFixed(0)}%。`;
  }

  // 额外副作用（拇指黑市保险）
  if (insurance.sideEffect && chance(0.5)) {
    const sideEffects = [
      '复活后你发现身上多了一道来历不明的疤痕。',
      '你的味觉完全消失了，食物对你来说只是颜色不同的泥。',
      '你偶尔会听到不属于你的低语声。',
    ];
    const se = pick(sideEffects);
    desc += ` ${se}`;
    setFlag('resurrectionSideEffect', true);
  }

  // 运气惩罚
  if (insurance.luckPenalty) {
    setFlag('badLuck', true);
    desc += ' 你感觉自己的运气变差了。';
  }

  subEvt('major', 'insurance_resurrection', desc, true, '复活');
  addMilestone(`通过${company.name}复活`);

  // 复活后恢复少量体质
  modAttr('con', 5);
  return true;
}

};

/**
 * 获取指定天赋标签在对应组织事件中的属性加成
 * @param {string} tag — 天赋标签
 * @param {string} attr — 属性名（con/int/wil/wea），可选，若不传则返回全部加成
 * @returns {number|object}
 */
function getFlowBonus(tag, attr) {
  const bonus = FLOW_BONUS_MAP[tag];
  if (!bonus) {
    // 未定义的标签无加成
    return attr ? 0 : { con: 0, int: 0, wil: 0, wea: 0 };
  }

  if (attr) {
    return bonus[attr] || 0;
  }
  return { ...bonus };
}

/**
 * 获取当前所有已选天赋标签的合计流向加成
 * @returns {object} — { con, int, wil, wea }
 */
function getAllFlowBonuses() {
  const total = { con: 0, int: 0, wil: 0, wea: 0 };

  if (!gameState.selectedTalents) return total;

  for (const talent of gameState.selectedTalents) {
    if (!talent.tag) continue;
    const bonus = FLOW_BONUS_MAP[talent.tag];
    if (bonus) {
      total.con += bonus.con || 0;
      total.int += bonus.int || 0;
      total.wil += bonus.wil || 0;
      total.wea += bonus.wea || 0;
    }
  }

  return total;
}

/**
 * 在组织事件中应用天赋流向加成
 * @param {string} orgTag — 组织标签（如 '拇指'）
 * @param {string} eventType — 事件类型（用于日志）
 */
function applyFlowBonusInEvent(orgTag, eventType) {
  const bonus = getFlowBonus(orgTag);
  if (!bonus) return;

  let hasBonus = false;
  for (const [attr, val] of Object.entries(bonus)) {
    if (val !== 0) {
      modAttr(attr, val);
      hasBonus = true;
    }
  }

  if (hasBonus) {
    subEvt('bonus', `flow_${orgTag}_${eventType}`, `你的${orgTag}天赋在此事件中发挥了作用，获得属性加成。`, false, '流向加成');
  }
}

/**
 * 统一调用所有特殊开局（外部主循环每过一年调用一次）
 * @param {number} age — 当前年龄
 */
function runAllSpecialStarts(age) {
  // 组合线必须先检查并应用
  if (age === 0) {
    const matched = checkAllComboLines();
    for (const line of matched) {
      applyComboEffects(line);
    }
  }

  // 然后运行各线路的年度事件
  orphanStart(age);
  nonhumanStart(age);
  angelicaStart(age);
  albGabrielStart(age);
  experimentStart(age);
  bloodfiendStart(age);
  firstGradeStart(age);
}

/**
 * 死亡时检查生命保险（包装函数，建议替换原 death() 或在 death() 中调用）
 * @param {string} cause — 死亡原因
 * @returns {boolean} — true = 被保险救活，false = 正常死亡
 */
function checkDeathInsurance(cause) {
  // 先尝试使用保险
  if (useLifeInsurance()) {
    return true;
  }
  // 没有保险或次数用完，正常死亡
  death(cause);
  return false;
}

      modAttr("con", 1);

  // A2. 遭遇鲸群

          true,

        );
        addMilestone("鲸群幸存者");
        modAttr("wea", 5);
        modAttr("wil", 2);
        setFlag("whale_oil_acquired", true);
      } else if (survival >= 9) {
        subEvt(
          gameState.age,
          "遭遇鲸群",
          "鲸群来袭，船身剧烈摇晃。你勉强捡回一条命，但身负重伤，目睹了同伴被巨鲸吞噬的惨状。",

    if (!getFlag("whaling_joined")) return;

    if (getFlag("mutiny_resolved")) return;

          true,
          "海盗克星"
        );

        modAttr("wea", 6);
        modAttr("wil", 2);
        modAttr("con", 1);

          gameState.age,
          "智退海盗",

          false,
          null
        );
        modAttr("int", 2);
        modAttr("wil", 1);
      } else {
        subEvt(
          gameState.age,
          "海盗劫掠",
          "海盗登船了。你的一切都被抢走，被扔在大湖的一叶扁舟上自生自灭。",
          true,
          null
        );
        modAttr("wea", -Math.min(10, gameState.attrs.wea));
        modAttr("con", -3);
        modAttr("wil", -2);
        setFlag("whaling_joined", false);
        gameState.events.push("被大湖海盗洗劫一空");
        // 漂流求生
        if (gameState.attrs.con < 5 || chance(0.06)) {
          subEvt(
            gameState.age,

          death("大湖漂流中力竭而死");

  if (gameState.alive) acquireWhaleOil();

      subEvt(
        gameState.age,
        "工坊大师",
        `多年的苦修终于开花结果。师傅将${workshopType}传给了你——或者说，他死于一次实验事故，而你是最有资格继承的人。从今天起，你是大师了。`,
        true,
        "工坊大师"
      );
      addMilestone("工坊大师");
      modAttr("int", 3);
      modAttr("wil", 2);
      modAttr("wea", 5);
      gameState.events.push(`成为了${workshopType}的大师`);
    }
  }

  // B5. 工坊之间的竞争 (Tres协会仲裁)
  function workshopCompetition() {
    if (!getFlag("workshop_master")) return;
    if (getFlag("workshop_competition_resolved")) return;

    if (chance(0.06)) {
      setFlag("workshop_competition_resolved", true);
      const workshopType = getFlag("workshop_type") || "工坊";

      subEvt(
        gameState.age,
        "工坊竞争",
        `另一间${workshopType}指控你窃取了他们的奇点科技专利。Tres协会的仲裁员来到了你的门前——那些穿着黑色西装、面无表情的人。输了的话，你的一切都完了。`,
        true,
        null
      );

      const arbitration = gameState.attrs.int + gameState.attrs.wil + (getFlag("singularity_mastered") ? 5 : 0);
      if (arbitration >= 16) {
        subEvt(
          gameState.age,
          "仲裁胜利",
          "你在Tres协会的仲裁庭上展现了无可辩驳的证据和令人信服的论点。不仅洗清了嫌疑，还反将一军，让对方付出了巨额赔偿。",
          true,
          "Tres仲裁胜利者"
        );
        addMilestone("Tres仲裁胜利者");
        modAttr("wea", 8);
        modAttr("int", 2);
        modAttr("wil", 2);
      } else if (arbitration >= 10) {
        subEvt(
          gameState.age,
          "仲裁和解",
          "仲裁庭的判决对双方各打五十大板。你保住了工坊，但不得不支付一笔可观的和解金，并共享部分技术。",
          false,
          null
        );
        modAttr("wea", -5);
        modAttr("int", 1);
      } else {
        subEvt(
          gameState.age,
          "仲裁败诉",
          "Tres协会的判决残酷而高效。你的工坊被查封，所有资产被没收，你被永远禁止从事相关工作。",
          true,
          null
        );
        modAttr("wea", -Math.min(15, gameState.attrs.wea));
        modAttr("wil", -3);
        modAttr("int", -1);
        setFlag("workshop_master", false);
        setFlag("workshop_banned", true);
        gameState.events.push("被Tres协会终身禁止经营工坊");
      }
    }
  }

  // 执行工坊事件链
  workshopApprenticeDaily();
  if (gameState.alive) singularityTechEncounter();
  if (gameState.alive) workshopAccident();
  if (gameState.alive) becomeWorkshopMaster();
  if (gameState.alive) workshopCompetition();
}

// ============================================
// C. 图书馆线剧情分支 (Library of Ruina Route)
// ============================================

/**
 * 图书馆邀请函事件。
 * 当玩家收到来自图书馆的邀请函后，将触发此剧情线。
 * 图书馆（Library of Ruina）是L Corp崩溃后由安吉拉（Angela）建立的奇异空间。
 * 进入者需要与司书战斗，胜利则向上，失败则化为书籍。
 */
function libraryRoute() {
  if (!getFlag("library_invitation")) return;
  if (getFlag("library_route_completed")) return;

  setFlag("library_route_completed", true);

  subEvt(
    gameState.age,
    "图书馆邀请函",
    "一封烫金的邀请函出现在你的门前。没有寄件人，没有邮戳，只有一行优雅的字迹：'诚邀您莅临图书馆。'你知道这是什么。在都市的传闻中，收到这封信的人，要么成为了'书籍'，要么......",
    true,
    "收到图书馆邀请函"
  );
  addMilestone("收到图书馆邀请函");

  // 判断是否决定前往图书馆
  // 根据意志和智力进行判断
  const willDecision = gameState.attrs.wil;
  const intDecision = gameState.attrs.int;
  const decisionScore = willDecision + intDecision;

  let decision;
  if (decisionScore >= 16) {
    // 高意志高智力：理性分析后决定前往
    decision = "前往";
    subEvt(
      gameState.age,
      "决意前往",
      "你凝视着邀请函许久。图书馆是危险的，但也是机遇。如果传闻属实，那里收藏着都市中一切的知识和力量。你决定去——不是作为猎物，而是作为猎人。",
      true,
      null
    );
  } else if (decisionScore >= 10 && willDecision >= 5) {
    // 中等：犹豫但最终前往
    decision = "前往";
    subEvt(
      gameState.age,
      "被迫前往",
      "你没有选择。邀请函一旦收到，安吉拉的视线就已经盯上了你。逃避只会让你死得更快。你只能赌一把。",
      true,
      null
    );
  } else if (willDecision >= 6) {
    // 意志足够：拒绝
    decision = "拒绝";
    subEvt(
      gameState.age,
      "拒绝邀请",
      "你将邀请函撕碎，扔进火里。你不会成为任何人的书籍。无论安吉拉是谁，你都不会屈服。",
      true,
      null
    );
  } else {
    // 低意志低智力：恐惧，随机决定
    decision = chance(0.4) ? "前往" : "拒绝";
    if (decision === "前往") {
      subEvt(
        gameState.age,
        "恐惧中前往",
        "你的理智告诉你要拒绝，但某种比恐惧更深的东西驱使着你。你握住了邀请函，然后......",
        true,
        null
      );
    } else {
      subEvt(
        gameState.age,
        "懦弱拒绝",
        "你扔掉邀请函，蜷缩在角落里发抖。你告诉自己这是理智的选择。但你知道，这只是懦弱。",
        false,
        null
      );
    }
  }

  // ===== 分支：决定前往图书馆 =====
  if (decision === "前往") {
    // 传送到图书馆
    setFlag("in_library", true);
    subEvt(
      gameState.age,
      "图书馆·入口",
      "光芒闪过，你站在了一座宏伟得不可思议的建筑前。那是超越人类审美的结构，是光与影的迷宫。大门缓缓打开，一位少女站在阴影中——安吉拉。'欢迎，来宾。'",
      true,
      null
    );

    // 第一层接待：与低级司书战斗
    const layer1Power = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil;
    const hasSingularity = getFlag("singularity_mastered") || getFlag("equip_weapon_singularity");
    const layer1Bonus = hasSingularity ? 4 : 0;
    const layer1Total = layer1Power + layer1Bonus;

    subEvt(
      gameState.age,
      "第一层·接待",
      "低级司书们从书架间走出，他们的眼中没有感情，只有战斗的本能。你必须通过第一层，才能见到更多。",
      true,
      null
    );

    // 第一层战斗判定
    if (layer1Total >= 18) {
      // 碾压
      subEvt(
        gameState.age,
        "第一层·完胜",
        "你的力量远超这些低级司书的预料。在奇点科技的加持下——或你本就强大的实力——你迅速击溃了第一层防线。",
        true,
        "图书馆一层通过"
      );
    } else if (layer1Total >= 12) {
      // 惨胜
      subEvt(
        gameState.age,
        "第一层·险胜",
        "战斗比你想象的艰难。司书的攻击方式诡异而致命，你勉强取胜，但身负重伤。",
        true,
        "图书馆一层通过"
      );
      modAttr("con", -3);
      modAttr("wil", -1);
    } else {
      // 败北 -> 化为书籍 (A结局)
      subEvt(
        gameState.age,
        "化为书籍",
        "司书的力量超出了你的想象。在最后一击落下时，你感到身体在分解——化作纸张，化作文字，化作图书馆中新增的一本藏书。你的故事，就此成为了他人的养分。",
        true,
        null
      );
      addMilestone("化为图书馆的书籍");
      death("在图书馆中化为书籍");
      return; // 结局A
    }

    // 第二层及更深层的判定 (简化处理)
    if (gameState.alive) {
      const deepPower = gameState.attrs.con + gameState.attrs.int * 1.5 + gameState.attrs.wil;
      const hasMastery = getFlag("workshop_master") || hasMilestone("资深捕鲸者");
      const deepBonus = hasMastery ? 3 : 0;
      const deepTotal = deepPower + deepBonus;

      if (deepTotal >= 25) {
        // 属性极高：挑战安吉拉
        subEvt(
          gameState.age,
          "深层·攀登",
          "你一层又一层地击败了司书。从文学层到艺术层，从历史层到科技层。每一场战斗都让你更强，也让你更了解图书馆的本质。最终，你站在了总类层的大门前。",
          true,
          "图书馆深层攀登者"
        );
        addMilestone("图书馆深层攀登者");

        // 挑战安吉拉
        const angelaBattle = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil +
                             (getFlag("singularity_mastered") ? 5 : 0) +
                             (hasMilestone("工坊大师") ? 3 : 0);

        if (angelaBattle >= 30) {
          // 击败安吉拉，夺取光之种 (隐藏结局)
          subEvt(
            gameState.age,
            "光之种",
            "安吉拉倒下了。你站在光之种前——那是足以改变都市的力量。你做出了选择。当光芒笼罩都市的那一刻，一切都将不同。",
            true,
            "光之种夺取者"
          );
          addMilestone("光之种夺取者");
          addMilestone("都市变革者");
          setFlag("light_seed_obtained", true);
          modAttr("wil", 10);
          modAttr("int", 5);
          gameState.events.push("夺取了光之种，改变了都市的未来");
          // 此结局不死亡，但人生轨迹彻底改变
        } else {
          // 无法击败安吉拉，但在战斗中幸存
          subEvt(
            gameState.age,
            "安吉拉之战",
            "安吉拉比你强大得多——她毕竟是图书馆的主人。但你的实力赢得了她的尊重。她没有杀你，而是......",
            true,
            null
          );
          // B结局或C结局的判定
          libraryEndingBC();
        }
      } else if (deepTotal >= 16) {
        // 中等实力：到达中层
        subEvt(
          gameState.age,
          "中层·停滞",
          "你在图书馆的中层徘徊。司书们越来越强大，你开始感到力不从心。",
          true,
          null
        );
        libraryEndingBC();
      } else {
        // 实力不足，在中层被击败
        subEvt(
          gameState.age,
          "中层败退",
          "你的力量在图书馆的深层显得渺小。司书们的联合攻击将你逼入了绝境。",
          true,
          null
        );
        // 判定是B还是C结局
        if (gameState.attrs.wil >= 7 && chance(0.06)) {
          // C结局：被释放
          subEvt(
            gameState.age,
            "被释放",
            "就在最后一刻，安吉拉的声音响起：'够了。'司书们停下了手。你被传送出了图书馆，回到了都市的某条后巷。你不明白为什么，但你活下来了。",
            true,
            "图书馆幸存者"
          );
          addMilestone("图书馆幸存者");
          setFlag("library_released", true);
          modAttr("wil", 2);
          modAttr("con", -2);
          gameState.events.push("从图书馆被释放，在都市某处复活");
        } else {
          // B结局：迷失
          subEvt(
            gameState.age,
            "迷失",
            "你在图书馆的迷宫中迷失了方向。没有食物，没有水，只有无尽的书架。你发疯般奔跑，却永远找不到出口。最终，你倒下了——没有化为书籍，只是......消失了。",
            true,
            null
          );
          addMilestone("迷失在图书馆");
          death("迷失在图书馆中");
          return; // 结局B
        }
      }
    }

  // ===== 分支：拒绝前往图书馆 =====
  } else {
    // 邀请函被烧毁
    subEvt(
      gameState.age,
      "安吉拉的监视",
      "你烧掉了邀请函，以为一切就此结束。但你错了。在之后的夜晚，你总感觉有人在注视着你。图书馆的影子，从未远离。",
      false,
      null
    );
    setFlag("angela_watching", true);
    modAttr("wil", -1);

    // 后续影响
    if (chance(0.06)) {
      subEvt(
        gameState.age,
        "监视的持续",
        "街道上的陌生人、窗户对面的房间、甚至你自己的倒影——一切都让你觉得不安。安吉拉的监视是无形的，却真实存在。",
        false,
        null
      );
      modAttr("wil", -2);
    }

    // 极少数情况：被强制邀请
    if (chance(0.03)) {
      subEvt(
        gameState.age,
        "强制邀请",
        "你拒绝了邀请函，但图书馆不打算放过你。某个深夜，光芒笼罩了你的住所。当你再次睁眼时，你已经站在了图书馆的大门前。",
        true,
        null
      );
      setFlag("library_forced", true);
      // 强制进入时意志判定劣势
      modAttr("wil", -2);
      // 重新进入图书馆战斗流程
      // 为简化，直接进入第一层判定（但判定标准更严格）
      const forcedPower = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil - 2;
      if (forcedPower >= 15) {
        subEvt(
          gameState.age,
          "第一层·挣脱",
          "即使在最不利的状况下，你依然击溃了低级司书。你向更深层进发——既然无法逃避，那就征服。",
          true,
          "图书馆一层通过"
        );
        // 继续深层判定（简化）
        libraryEndingBC();
      } else {
        subEvt(
          gameState.age,
          "第一层·终结",
          "措手不及的你无法发挥全力。司书的攻击无情而精准。你成为了图书馆 newest 的藏书。",
          true,
          null
        );
        death("被强制带入图书馆后化为书籍");
        return;
      }
    }
  }
}

/**
 * 图书馆B/C结局分支判定
 * B结局：迷失在图书馆
 * C结局：被释放，在都市某处复活
 */
function libraryEndingBC() {
  const totalAttr = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil;
  const hasInsurance = getFlag("life_insurance_active");

  // 综合判定
  let ending;
  if (totalAttr >= 22 && gameState.attrs.wil >= 8) {
    ending = "C"; // 被释放
  } else if (totalAttr >= 18 && chance(0.06)) {
    ending = "C";
  } else if (hasInsurance && chance(0.06)) {
    ending = "C"; // 生命保险增加存活概率
  } else if (gameState.attrs.wil <= 4) {
    ending = "B"; // 低意志容易迷失
  } else {
    ending = chance(0.4) ? "C" : "B";
  }

  if (ending === "C") {
    subEvt(
      gameState.age,
      "图书馆·释放 (C结局)",
      "当你倒下的那一刻，安吉拉的声音在耳边响起：'你很有趣。'光芒闪过，你发现自己躺在都市某条肮脏的后巷里。你不记得发生了什么，但你知道——你逃出来了。至少，逃出了一部分。",
      true,
      "图书馆释放者"
    );
    addMilestone("图书馆释放者");
    setFlag("library_released", true);
    modAttr("con", -2);
    modAttr("wil", 1);
    modAttr("int", 2); // 图书馆的知识残留
    gameState.events.push("从图书馆被释放，但失去了部分记忆");
  } else {
    subEvt(
      gameState.age,
      "图书馆·迷失 (B结局)",
      "图书馆没有尽头。你走了很久，久到忘记了为什么要走。书架之间的迷宫吞噬了时间，吞噬了空间，最终吞噬了你。你成为了图书馆的一部分——不是作为书籍，而是作为徘徊的幽灵。",
      true,
      "迷失在图书馆"
    );
    addMilestone("迷失在图书馆");
    setFlag("library_lost", true);
    death("迷失在图书馆的无限回廊中");
  }
}

// ============================================
// D. 购买生命保险 (Life Insurance)
// ============================================

/**
 * H巢（鸿园）的生命保险是都市中著名的'复活'服务。
 * 由特殊的奇点技术支持，可以在死亡后将人复活——但代价不菲。
 * 注意：这不是真正的永生，复活伴随着严重的副作用。
 */
function lifeInsuranceEvent() {
  if (gameState.age < 18) return;
  if (getFlag("life_insurance_purchased")) return;

  // 只在H巢/鸿园可以购买
  const canBuy = (bp === "h_nest" || bp === "hong_yuan" || bp === "nest");
  if (!canBuy && chance(0.05)) {
    // 小概率通过黑市购买
    setFlag("insurance_black_market", true);
  } else if (!canBuy) {
    return;
  }

  if (chance(0.06)) {
    const insuranceCost = 8; // 花费家境
    if (gameState.attrs.wea >= insuranceCost) {
      setFlag("life_insurance_purchased", true);
      modAttr("wea", -insuranceCost);

      const isBlackMarket = getFlag("insurance_black_market");
      subEvt(
        gameState.age,
        isBlackMarket ? "黑市生命保险" : "购买生命保险",
        isBlackMarket
          ? "通过地下渠道，你购买了一份来路不明的生命保险。卖家警告你：'复活后的你，可能不再是你。'"
          : "在H巢的保险事务所，你签下了一份昂贵的合同。鸿园的生命保险是都市中少有的'第二次机会'——当然，机会从来都不是免费的。",
        true,
        "生命保险持有者"
      );
      addMilestone("生命保险持有者");
      setFlag("life_insurance_active", true);
      setFlag("can_revive", true);
    }
  }
}

/**
 * 生命保险复活处理函数
 * 当玩家死亡时，如果持有生命保险，则触发复活
 * 注意：此函数应在主程序的死亡判定逻辑中调用
 */
function lifeInsuranceRevive() {
  if (!getFlag("life_insurance_active") || !getFlag("can_revive")) {
    return false; // 无法复活
  }

  // 也检查 combo_tags.js 中购买的保险
  const insurance = getFlag('lifeInsurance');
  if (insurance && insurance.remaining > 0) {
    insurance.remaining -= 1;
    setFlag('lifeInsurance', insurance);
    const companyName = insurance.companyName || '保险公司';
    let desc = companyName + '的复活服务生效了。';
    if (insurance.memoryLoss) {
      desc += '但你失去了大量记忆，像做了一场很长很长的梦，醒来后什么都不记得了。';
      setFlag('amnesia', true);
      if (gameState.milestones && gameState.milestones.length > 3) {
        const preserved = gameState.milestones.slice(-3);
        gameState.milestones.length = 0;
        gameState.milestones.push(...preserved);
      }
    }
    if (insurance.attrPenalty > 0) {
      const penalty = insurance.attrPenalty;
      modAttr('con', -(gameState.attrs.con || 0) * penalty);
      modAttr('int', -(gameState.attrs.int || 0) * penalty);
      modAttr('wil', -(gameState.attrs.wil || 0) * penalty);
      desc += '复活对你的身体造成了负担，全属性下降' + (penalty * 100).toFixed(0) + '%。';
    }
    if (insurance.sideEffect && chance(0.5)) {
      const sideEffects = ['复活后你发现身上多了一道来历不明的疤痕。','你的味觉完全消失了，食物对你来说只是颜色不同的泥。','你偶尔会听到不属于你的低语声。'];
      desc += ' ' + pick(sideEffects);
      setFlag('resurrectionSideEffect', true);
    }
    if (insurance.luckPenalty) {
      setFlag('badLuck', true);
      desc += ' 你感觉自己的运气变差了。';
    }
    addEvent({ text: desc, effect: 'resurrection', effText: '复活', major: true });
    addMilestone('通过' + companyName + '复活');
    modAttr('con', 5);
    return true;
  }

  // 消耗复活机会（每人仅限一次）
  setFlag("can_revive", false);
  setFlag("life_insurance_active", false);
  setFlag("has_revived", true);

  // 复活副作用判定
  const sideEffects = [];

  // 副作用1：记忆损失
  const memoryLoss = chance(0.7);
  if (memoryLoss) {
    setFlag("revive_memory_loss", true);
    sideEffects.push("部分记忆丧失");
    modAttr("int", -3);
    modAttr("wil", -1);
  }

  // 副作用2：属性下降
  const attrDecline = chance(0.8);
  if (attrDecline) {
    setFlag("revive_attr_decline", true);
    sideEffects.push("身体机能衰退");
    modAttr("con", -2);
    modAttr("int", -1);
  }

  // 副作用3：随机副作用
  const randomEffects = [
    { name: "情感缺失", effect: () => { modAttr("wil", -3); setFlag("revive_emotionless", true); } },
    { name: "奇点辐射后遗症", effect: () => { modAttr("con", -2); setFlag("revive_radiation", true); } },
    { name: "身份错置", effect: () => { setFlag("revive_identity_crisis", true); gameState.events.push("复活后产生了身份认知障碍"); } },
    { name: "安吉拉的注视", effect: () => { setFlag("angela_watching", true); gameState.events.push("复活后似乎被某种存在注视着"); } },
    { name: "运气透支", effect: () => { setFlag("revive_bad_luck", true); } },
    { name: "轻微变异", effect: () => { modAttr("con", 1); modAttr("int", -2); setFlag("revive_mutated", true); } }
  ];

  const chosenEffect = pick(randomEffects);
  chosenEffect.effect();
  sideEffects.push(chosenEffect.name);

  // 生成复活事件
  subEvt(
    gameState.age,
    "生命保险·复活",
    `黑暗。然后是刺眼的光芒。你猛地吸了一口气——你本不该再能呼吸的。生命保险履行了它的承诺，但你的身体感受到了异样。副作用：${sideEffects.join("、")}。`,
    true,
    "复活者"
  );
  addMilestone("复活者");

  // 复活后恢复基础生命状态
  gameState.alive = true;

  // 复活不是万能的，如果属性过低，可能再次死亡
  const totalAttr = gameState.attrs.con + gameState.attrs.int + gameState.attrs.wil + gameState.attrs.wea;
  if (totalAttr < 5 && chance(0.06)) {
    subEvt(
      gameState.age,
      "复活的代价",
      "复活的身体无法承受灵魂的回归。你在苏醒后的几小时内再次倒下——这次，是真正的终结。",
      true,
      null
    );
    death("生命保险复活失败，灵魂彻底消散");
    return true; // 确实触发了复活，但再次死亡
  }

  return true;
}

function pickWeighted(items) {
  const total = items.reduce((s, i) => s + i.weight, 0);
  let r = Math.random() * total;
  for (const item of items) {
    r -= item.weight;
    if (r <= 0) return item;
  }
  return items[items.length - 1];
}

    modAttr("con", 2);
    modAttr("wil", 2);
    modAttr("int", 1);
    setFlag("crimsonTeach", true);
  } else if (gameState.attrs.con >= 6) {
    addEvent({ text: "维吉里乌斯看了你一眼，没有拔剑。『你还不够格让我出手。』但你感到一股无形的压迫感——那就是「望」的力量，仅仅是视线就足以让人丧失战意。", effect: "survive", effText: "体质+1，意志+1", major: false });
    modAttr("con", 1);
    modAttr("wil", 1);
  } else {
    addEvent({ text: "维吉里乌斯的视线落在你身上。那一眼中蕴含的灼热与审视让你的膝盖不由自主地弯曲。你跪倒在地，汗流浃背，直到他移开目光。", effect: "trauma", effText: "意志-2", major: true });
    modAttr("wil", -2);
  }
}

/** 缃碧少女 */
function encounterCyanGirl() {
  addEvent({ text: "一个身着碧色衣裙的少女从巷口走出。她的面容精致得不似凡人，举手投足间散发着某种不属于都市的优雅。那是『缃碧少女』，都市中最神秘的色彩级之一。", effect: "legend", effText: "", major: true, milestone: "遭遇缃碧少女" });
  addMilestone("遭遇缃碧少女");
  setFlag("colorFixerWeight", (getFlag("colorFixerWeight") || 0) + 2);

  if (gameState.attrs.int >= 8 && chance(0.06)) {
    addEvent({ text: "缃碧少女对你微微一笑。『你很有意思。』她留下了一个碧色的铃铛。『当你需要庇护时，摇响它。』", effect: "gift", effText: "智力+2，意志+1", major: true, milestone: "缃碧少女的铃铛" });
    modAttr("int", 2);
    modAttr("wil", 1);
    setFlag("cyanBell", true);
  } else {
    addEvent({ text: "缃碧少女只是从你身旁走过，仿佛你只是路边的一株野草。然而那擦肩而过的瞬间，你闻到了一种奇异的香气——那让你想起了遥远的、从未存在过的故乡。", effect: "none", effText: "", major: false });
  }
}

/** 冬红布袋 */
function encounterWinterRed() {
  addEvent({ text: "寒风凛冽的街道上，一个裹着红色布袋的身影静静伫立。你看不清布袋下的面容，只能感受到某种古老而冰冷的气息。『冬红布袋』——那是都市居民在冬季不敢提及的名字。", effect: "legend", effText: "", major: true, milestone: "遭遇冬红布袋" });
  addMilestone("遭遇冬红布袋");
  setFlag("colorFixerWeight", (getFlag("colorFixerWeight") || 0) + 1);

  if (gameState.attrs.wil >= 9) {
    addEvent({ text: "冬红布袋缓缓抬起头。布袋下露出的眼睛平静如深潭。『你不怕冷。』一个沙哑的声音说。『带走这个。』一块红色的布片落入你手中——它散发着不可思议的温暖。", effect: "gift", effText: "意志+3", major: true, milestone: "冬红布袋的布片" });
    modAttr("wil", 3);
    setFlag("winterCloth", true);
  } else {
    addEvent({ text: "冬红布袋没有理会你。它只是站在那里，像一座被雪覆盖的墓碑。你感到一股寒意从骨髓深处升起——那不是普通的寒冷，而是某种更接近死亡本身的温度。", effect: "trauma", effText: "意志-2", major: true });
    modAttr("wil", -2);
  }
}

/** 靛蓝老人 · 大湖捕鲸人 */
function encounterIndigoElder() {
  addEvent({ text: "大湖的岸边，一个苍老的身影正凝视着水面。他的船锚型武器插在地上，像一座沉默的纪念碑。那是『靛蓝老人』——大湖上最可怕的捕鲸人，也是都市中最古老的色彩级收尾人之一。", effect: "legend", effText: "", major: true, milestone: "遭遇靛蓝老人" });
  addMilestone("遭遇靛蓝老人");
  setFlag("colorFixerWeight", (getFlag("colorFixerWeight") || 0) + 2);

  if (gameState.attrs.con >= 9 && chance(0.06)) {
    addEvent({ text: "靛蓝老人转过身来，浑浊的眼中闪过一丝光芒。『你想学大湖的法则？』他用三重「望」向你展示了捕鲸人的技艺——那是与巨兽搏斗、在死亡边缘舞蹈的技艺。", effect: "train", effText: "体质+3，意志+2", major: true, milestone: "靛蓝老人的传授" });
    modAttr("con", 3);
    modAttr("wil", 2);
    setFlag("indigoTeach", true);
  } else if (gameState.attrs.con >= 7) {
    addEvent({ text: "靛蓝老人看了你一眼，点了点头。『能走到这里，不错了。』他没有多说什么，但那简单的认可让你感到一种前所未有的力量。", effect: "survive", effText: "体质+1，意志+1", major: false });
    modAttr("con", 1);
    modAttr("wil", 1);
  } else {
    addEvent({ text: "靛蓝老人甚至没有看你。他的目光穿透了你，看向大湖深处某种你无法感知的东西。你感到自己是如此渺小——在大湖面前，在都市面前，在命运面前。", effect: "trauma", effText: "意志-2", major: true });
    modAttr("wil", -2);
  }
}

/** 蔚蓝天堂 */
function encounterAzureHeaven() {
  addEvent({ text: "天空呈现出一种不自然的蔚蓝。一个身披白色斗篷的人从光芒中走出，他的存在本身就像是一道温暖的光。『蔚蓝天堂』——那是传说中能净化一切污秽的色彩级收尾人。", effect: "legend", effText: "", major: true, milestone: "遭遇蔚蓝天堂" });

  setFlag("colorFixerWeight", (getFlag("colorFixerWeight") || 0) + 2);

  if (gameState.attrs.wil >= 8 && gameState.attrs.int >= 7 && chance(0.06)) {
    addEvent({ text: "蔚蓝天堂向你伸出了手。『你的灵魂很干净。』温暖的光芒笼罩了你，你感到过去的一切创伤、恐惧和愧疚都在这光芒中消融了。", effect: "heal", effText: "意志+3，体质+2", major: true, milestone: "蔚蓝天堂的净化" });
    modAttr("wil", 3);
    modAttr("con", 2);
    setFlag("azureBless", true);
  } else {
    addEvent({ text: "蔚蓝天堂看了你一眼，目光中带着悲悯。『还不够。』然后他转身离去，留下你站在原地，感到一种说不清的失落。", effect: "none", effText: "", major: false });
  }
}

// ============================================
// B. 时间线历史事件
// ============================================

/**
 * 根据玩家的出生年份和当前年龄计算当前年份，触发对应的历史大事件。
 * 出生年份在游戏开始时随机设定（785 ~ 985）。
 */
function timelineEvents(age) {
  if (!gameState.birthYear || !gameState.alive) return;
  const currentYear = gameState.birthYear + age;
  if (getFlag("timeline_" + currentYear)) return; // 同一年不重复触发

  // pianoist ~957 (removed, now handled in chronological order below)


  // ===== 按月亮计划官方时间线排列的历史事件 =====
  // 时间线：远古 → 血魔之战 → 卡门时代 → 烟霾战争 → 脑叶公司 → 白夜黑昼 → 图书馆 → 二次白夜 → 边狱公司

  // --- 远古时代 (birthYear ~ 785-800) ---
  // 河流的传说
  if (currentYear >= 786 && currentYear <= 790 && !getFlag("riverLegend") && chance(0.03)) {
    setFlag("riverLegend", true);
    addEvent({ text: "你在古老的文献残片中读到了一段不可思议的文字——在世界的最底层，有一条古老的暗流。它或许无始无终，或许生死并存，是万事万物的源头。没有人知道这是传说还是真相。", effect: "lore", effText: "", major: true, milestone: "河流的传说" });
    addMilestone("河流的传说");
    return;
  }

  // 星星的俯瞰
  if (currentYear >= 788 && currentYear <= 793 && !getFlag("starGaze") && chance(0.02)) {
    setFlag("starGaze", true);
    addEvent({ text: "都市的郊区边界之外，据说有『星星』的存在。那宛若不可理解的神明，会赐予人类奇迹——以祂的方式实现人类的愿望。但除此以外，没有人知道星星究竟是什么。", effect: "lore", effText: "", major: true, milestone: "星星的俯瞰" });
    addMilestone("星星的俯瞰");
    return;
  }

  // 都市建立
  if (currentYear >= 790 && currentYear <= 795 && !getFlag("cityFounded") && chance(0.05)) {
    setFlag("cityFounded", true);
    addEvent({ text: "A公司——首脑，B公司——眼线，C公司——爪牙。三家公司构成了都市现今的秩序基础。首脑设置了不可触碰的都市禁忌，眼线负责监控，爪牙负责执行。二十六个区域、六十多亿居民，皆在其统治之下。", effect: "lore", effText: "", major: true, milestone: "都市秩序建立" });
    addMilestone("都市秩序建立");
    return;
  }

  // 大观园建立
  if (currentYear >= 792 && currentYear <= 798 && !getFlag("hongluanLegend") && chance(0.03)) {
    setFlag("hongluanLegend", true);
    addEvent({ text: "第八区的大观园，是鸿园家族世代经营的土地。第一任家主将自身炼制为了可以传承知识与见闻的仙皇虫，从此在每代继任家主的身上流转，使得鸿园长盛不衰。铁槛寺中，历代仙人静默地注视着这片土地。", effect: "lore", effText: "", major: true, milestone: "大观园传说" });
    addMilestone("大观园传说");
    return;
  }

  // 宅邸事件（血魔诞生）
  if (currentYear >= 793 && currentYear <= 799 && !getFlag("mansionEvent") && chance(0.03)) {
    setFlag("mansionEvent", true);
    addEvent({ text: "很久以前，在一处宅邸浸满血液的瞬间开始，血魔诞生了。他们开始像对待金钱一样对待人类的血液，为此克制——或为此疯狂。这就是血魔的起源，没有人知道那座宅邸究竟发生了什么。", effect: "lore", effText: "", major: true, milestone: "血魔诞生" });
    addMilestone("血魔诞生");
    return;
  }

  // 都市英雄谭
  if (currentYear >= 795 && currentYear <= 805 && !getFlag("heroTales") && chance(0.04)) {
    setFlag("heroTales", true);
    addEvent({ text: "都市465年，犀牛树大战，『清天收尾人』大获全胜。都市505年，收尾人岳飞完成了他最著名的战斗。不知何时，Zwei协会的埃葵斯带队前往大湖历险。不知何时，缃碧少女从D巢启程，成为了伟大的收尾人。这些名字在都市的角落里流传。", effect: "lore", effText: "", major: true, milestone: "都市英雄谭" });
    addMilestone("都市英雄谭");
    return;
  }

  // 血魔之战（约200年前）
  if (currentYear >= 800 && currentYear <= 815 && !getFlag("bloodDemonWar") && chance(0.03)) {
    setFlag("bloodDemonWar", true);
    addEvent({ text: "大约二百年前，部分血魔决定与正常人类交战，战争旷日持久。然而拉曼却领长老堂吉诃德选择支持人类而参战，正常人类最终取得了胜利，将敌对的血魔驱逐和消灭。", effect: "lore", effText: "", major: true, milestone: "血魔之战" });
    addMilestone("血魔之战");
    return;
  }

  // 拉曼却领的建立与封闭
  if (currentYear >= 810 && currentYear <= 830 && !getFlag("laManchaLegend") && chance(0.03)) {
    setFlag("laManchaLegend", true);
    addEvent({ text: "长老堂吉诃德与其子嗣开发的血棒使血魔不需吸血也能生存。由此，由血液铸就的游乐园拉·曼却领建立了。然而，当第一次事故产生受害者时，一切走向了悲剧——堂吉诃德独自面对疯狂的眷属，被钉在摩天轮底部，永远地关闭了乐园。", effect: "lore", effText: "", major: true, milestone: "拉曼却领" });
    addMilestone("拉曼却领");
    return;
  }

  // --- 卡门时代 ---
  // K公司崛起（星空事件）
  if (currentYear >= 825 && currentYear <= 840 && !getFlag("kCorpRise") && chance(0.03)) {
    setFlag("kCorpRise", true);
    addEvent({ text: "K公司创始人史蒂芬内特曾与无名男孩前往郊区边界探险。那个男孩因『拯救他人』的强烈渴望，在星星的注视下化为了名为『眼球』的存在——即『流泪之物』。其分泌的绿色液体，成为了日后K公司再生安瓿的根源。", effect: "lore", effText: "", major: true, milestone: "K公司崛起" });
    addMilestone("K公司崛起");
    return;
  }

  // T公司崛起
  if (currentYear >= 830 && currentYear <= 845 && !getFlag("tCorpRise") && chance(0.03)) {
    setFlag("tCorpRise", true);
    addEvent({ text: "名为赫伯特的男人前往郊区边界，向星星许愿满足自身『停止时间』的理想。结果是——他成为了T公司的现任代表，推动了T巢每天至少拥有四个小时的福利政策。没有人知道那个愿望的代价是什么。", effect: "lore", effText: "", major: true, milestone: "T公司崛起" });
    addMilestone("T公司崛起");
    return;
  }

  // 卡门巡回演讲
  if (currentYear >= 835 && currentYear <= 848 && !getFlag("carmenLecture") && chance(0.04)) {
    setFlag("carmenLecture", true);
    addEvent({ text: "一位名叫卡门的医生在都市中巡回演讲，她发现了一种会让人走向自我毁灭的疾病——『都市病』。她在此基础上提出了『灵魂治疗』的理论，开始在都市获得知名度，并吸引了一批志同道合的追随者。", effect: "lore", effText: "", major: true, milestone: "卡门巡回演讲" });
    addMilestone("卡门巡回演讲");
    return;
  }

  // 研究所初建
  if (currentYear >= 840 && currentYear <= 852 && !getFlag("labBuilt") && chance(0.04)) {
    setFlag("labBuilt", true);
    addEvent({ text: "在都市郊区，因位于郊区而可尽可能规避禁忌的研究所建立了。卡门、艾因、本杰明三人成为核心，伊利亚、加百列、米切莉、双子丽萨和伊诺、乔凡尼、卡莉、丹尼尔——一群被命运牵引的人们聚集在此。", effect: "lore", effText: "", major: true, milestone: "研究所建立" });
    addMilestone("研究所建立");
    return;
  }

  // 殷红迷雾传说
  if (currentYear >= 845 && currentYear <= 855 && !getFlag("redMistLegend") && chance(0.04)) {
    setFlag("redMistLegend", true);
    addEvent({ text: "都市中流传着『殷红迷雾』的传说。卡门将实验中偶然提取的血肉大刀赠送给了收尾人卡莉，她在使用这把怪刀的过程中觉醒了被称为『神备』的力量。单杀五个食指代行者和三个传令员、随手砍灭大规模帮派斗争——她成为了最强之人。", effect: "lore", effText: "", major: true, milestone: "殷红迷雾" });
    addMilestone("殷红迷雾");
    return;
  }

  // 卡门之死
  if (currentYear >= 850 && currentYear <= 858 && !getFlag("carmenDeath") && chance(0.04)) {
    setFlag("carmenDeath", true);
    addEvent({ text: "卡门的研究需要人体试验，而双子中较为成熟的男孩伊诺自愿成为实验体。第一次实验命运般地失败。女孩对卡门的哭喊刺破了卡门内心最后一道防线，浑浊的几日后，卡门在浴缸中自杀。灵魂治疗的研究，陷入了漫长的停滞。", effect: "lore", effText: "", major: true, milestone: "卡门之死" });
    addMilestone("卡门之死");
    return;
  }

  // 加里翁袭击研究所
  if (currentYear >= 855 && currentYear <= 862 && !getFlag("garionAttack") && chance(0.04)) {
    setFlag("garionAttack", true);
    addEvent({ text: "首脑——调律者加里翁带着至少两位爪牙光临了研究所。加里翁使用F公司的妖灵奇点如入无人之境，迫使丹尼尔释放了所有异想体。卡莉击杀了两位爪牙后，用生命作为代价刺穿了加里翁的胸口。幸存的艾因与本杰明保存了这位首脑几乎死亡的肉身。", effect: "lore", effText: "", major: true, milestone: "加里翁袭击" });
    addMilestone("加里翁袭击");
    return;
  }

  // --- 烟霾战争 ---
  // 烟霾战争爆发
  if (currentYear >= 858 && currentYear <= 863 && !getFlag("smogWarStart")) {
    setFlag("smogWarStart", true);
    addEvent({ text: "烟霾战争爆发了。野心家狄亚斯和本杰明的合作使得旧L公司的奇点机密无法被遏制地泄露，诡异烟雾包裹了L巢并不断扩展，最终覆盖了大半个都市。R公司第四集团军、前G公司、I公司、拇指等诸多势力被引诱卷入。", effect: "history", effText: "", major: true, milestone: "烟霾战争爆发" });
    addMilestone("烟霾战争爆发");
    return;
  }

  // 烟霾战争白热化
  if (currentYear >= 864 && currentYear <= 869 && getFlag("smogWarStart") && !getFlag("smogWarPeak")) {
    setFlag("smogWarPeak", true);
    addEvent({ text: "烟霾战争进入了最惨烈的阶段。G公司出动了决战个体——蛆虫王子、飞蛾公主、苍蝇之王。T公司投放了使人急剧衰老的炸弹。拇指重新启用了前二老板瓦伦希娜。每一天都有无数人在你面前死去，天空被浓烟遮蔽，连阳光都成了奢侈品。", effect: "history", effText: "", major: true, milestone: "烟霾战争白热化" });
    if (gameState.attrs.con < 6 && chance(0.2)) {
      addEvent({ text: "一枚流弹击中了你的藏身之处。你没有死在敌人的手中，而是死在了战争的随机性里。", effect: "death", effText: "死亡", major: true });
      death("烟霾战争");
    } else {
      modAttr("wil", -1);
      modAttr("con", -1);
    }
    return;
  }

  // 烟霾战争结束
  if (currentYear >= 870 && currentYear <= 875 && getFlag("smogWarPeak") && !getFlag("smogWarEnd")) {
    setFlag("smogWarEnd", true);
    addEvent({ text: "烟霾战争结束了。前L公司、前G公司等势力倒台消失，拇指成为了胜利方。烟杆造型的E.G.O持有者摩西因战争的惨剧而怀疑自己的使命，带着新人以斯拉远离了狄亚斯，成为了Seven协会的收尾人。", effect: "history", effText: "", major: true, milestone: "烟霾战争结束" });
    setFlag("war_survivor", true);
    return;
  }

  // 安吉拉诞生
  if (currentYear >= 873 && currentYear <= 878 && !getFlag("angelaBorn") && chance(0.04)) {
    setFlag("angelaBorn", true);

  // 边狱公司

}

      { t: '你收到了一封来自「A公司」的信。信上只有一句话：「你被选中成为下一任调律者。」你把信烧了，但那句话烙在了你的脑海里。', e: { wil: 3, int: 3, wea: 3 }, ms: '调律者候选' },

      { t: '一位身着白衣的老人出现在你面前。他说他是「都市的记录者」，已经活了五千年。他问你：「你想知道都市的真相吗？」你摇头。他笑了：「明智的选择。」', e: { int: 5, wil: 2 }, ms: '记录者的询问' },

      { t: '某个午夜，所有的异想体同时停止了活动。整个都市陷入了诡异的宁静，持续了整整十三秒。在那十三秒里，你听到了某种声音——像是叹息，又像是歌唱。', e: { wil: 3, int: 3 }, ms: '十三秒的宁静' },
