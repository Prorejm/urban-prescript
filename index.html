    let wins = 0;
    for (let i = 0; i < 3; i++) {
      const oppRank = 8 - i * 2 + randBetween(-1, 1); // 对手从八阶到四阶左右
      const oppPower = Math.max(3, oppRank) * 3 + randBetween(-2, 2);
      const playerPower = a.con + a.wil + Math.floor(a.int / 2);
      if (playerPower >= oppPower) {
        wins++;
        modAttr('con', 1);
      } else {
        modAttr('con', -1);
      }
    }
    if (wins === 3) {
      addEvent({ text: "三战三胜！你在比武大会上一路过关斩将，最终夺得了冠军。观众席上传来掌声和欢呼。一个神秘人递给你一张名片：「有兴趣加入我的事务所吗？」", effect: "champion", effText: "体质+3，家境+2", major: true, milestone: "比武大会冠军" });
      addMilestone("比武大会冠军");
      modAttr('con', 3);
      modAttr('wea', 2);
    } else if (wins >= 2) {
      addEvent({ text: "你赢得了" + wins + "场比赛。虽然不是冠军，但你的表现引起了不少人的注意。一些事务所开始对你发出邀请。", effect: "runnerup", effText: "体质+1，家境+1", major: false, milestone: "比武大会佳绩" });
      addMilestone("比武大会佳绩");
      modAttr('con', 1);
      modAttr('wea', 1);
    } else {
      addEvent({ text: "你只赢了" + wins + "场。比武大会的残酷让你明白了自己的不足。回到训练场后，你加倍努力修炼。", effect: "defeat", effText: "意志+1", major: false, milestone: "比武大会落败" });
      addMilestone("比武大会落败");
      modAttr('wil', 1);
    }
  }
}

// =============================
// 残响乐团事件
// =============================
function runReverberationEvents(age) {
  if (!gameState.alive || gameState.dead) return;

  // 普鲁托 - 契约事件
  if (age >= 20 && age <= 50 && !getFlag('pluto_contract') && chance(0.03)) {
    setFlag('pluto_contract', true);
    addEvent({ text: "一个身着西装、面容模糊的男人出现在你面前。他自称是『普鲁托』，可以为任何人起草契约。『你想要什么？力量？财富？复仇？』他的笑容让人不安，『但请记住，所有契约都有代价。』", effect: "contract", effText: "家境+2，意志-1", major: true, milestone: "普鲁托的契约" });
    addMilestone("普鲁托的契约");
    modAttr('wea', 2);
    modAttr('wil', -1);
  }

  // 伊莲娜 - 血红之夜
  if (age >= 25 && age <= 55 && !getFlag('elena_blood') && chance(0.025)) {
    setFlag('elena_blood', true);
    addEvent({ text: "夜晚，一个穿着红色礼服的女人站在血泊中。她的美丽与危险成正比——那是『血红之夜』伊莲娜。在她身后，朱红十字静静地站立着，像是被抽空了灵魂的血袋。『你也想变得和我一样吗？』她微笑着问。", effect: "encounter", effText: "意志-2", major: true, milestone: "血红之夜" });
    addMilestone("血红之夜");
    modAttr('wil', -2);
    if (gameState.attrs.wil <= 0) {
      addEvent({ text: "你成为了伊莲娜的血袋。你的意识还在，但身体不再属于自己。", effect: "death", effText: "死亡", major: true });
      death("血红之夜");
    }
  }

  // 奥斯瓦尔德 - 八点半马戏团
  if (age >= 18 && age <= 50 && !getFlag('oswald_circus') && chance(0.03)) {
    setFlag('oswald_circus', true);
    addEvent({ text: "一张传单塞到了你手中：『八点半马戏团——今晚开演！』你本不想去，但某种力量让你踏入了那个帐篷。奥斯瓦尔德——那个小丑——在舞台上向你鞠躬。『欢迎来到永远的演出！』", effect: "trap", effText: "智力-1，意志+1", major: true, milestone: "八点半马戏团" });
    addMilestone("八点半马戏团");
    modAttr('int', -1);
    modAttr('wil', 1);
  }

  // 塔尼娅 - W公司
  if (age >= 20 && age <= 50 && !getFlag('tanya_warp') && chance(0.025)) {
    setFlag('tanya_warp', true);
    addEvent({ text: "在WARP列车站，你遇到了一个自称塔尼娅的女人。她似乎与W公司有着某种特殊联系。『你知道经济舱里发生了什么吗？』她低声说，『时间在那里是扭曲的……有些人经历了数百年，却只过了十秒。』", effect: "lore", effText: "智力+2", major: true, milestone: "塔尼娅的忠告" });
    addMilestone("塔尼娅的忠告");
    modAttr('int', 2);
  }

  // 在宪 - 爱之小镇
  if (age >= 20 && age <= 55 && !getFlag('jaxon_town') && chance(0.025)) {
    setFlag('jaxon_town', true);
    addEvent({ text: "你误入了一个看似宁静的小镇。但镇上的居民举止僵硬，眼神空洞——他们是木偶。在宪从阴影中走出，手中提着操控线。『欢迎来到爱之小镇。这里每个人都被爱着……以我的方式。』", effect: "trap", effText: "意志-2", major: true, milestone: "爱之小镇" });
    addMilestone("爱之小镇");
    modAttr('wil', -2);
    if (gameState.attrs.wil < 4 && chance(0.3)) {
      addEvent({ text: "你的意志在木偶们空洞的注视下崩溃了。在宪微笑着将你变成了小镇的新居民。", effect: "death", effText: "死亡", major: true });
      death("爱之小镇");
    }
  }

  // 菲利普 - 哭泣之子
  if (age >= 18 && age <= 50 && !getFlag('philip_cry') && chance(0.03)) {
    setFlag('philip_cry', true);
    addEvent({ text: "一个年轻人跪倒在街头，浑身燃烧着蓝色的火焰。那不是普通的火——它在燃烧他的悲伤。菲利普，哭泣之子，正在经历扭曲的最后阶段。他抬起头看着你，眼中是无尽的泪水。『为什么……为什么我总是失败……』", effect: "distortion", effText: "意志-2", major: true, milestone: "哭泣之子" });
    addMilestone("哭泣之子");
    modAttr('wil', -2);
  }

  // 艾琳 - 齿轮教团
  if (age >= 20 && age <= 55 && !getFlag('eileen_church') && chance(0.025)) {
    setFlag('eileen_church', true);
    addEvent({ text: "一个身着机械牧师袍的女人拦住了你。艾琳——齿轮教团的领袖——向你伸出一只由齿轮构成的手。『都市是一部巨大的机器，而我们都是其中的零件。你想知道这部机器的真相吗？』", effect: "cult", effText: "智力+1，意志-1", major: true, milestone: "齿轮教团" });
    addMilestone("齿轮教团");
    modAttr('int', 1);
    modAttr('wil', -1);
  }

  // 格蕾塔 - 飨宴
  if (age >= 20 && age <= 50 && !getFlag('greta_feast') && chance(0.025)) {
    setFlag('greta_feast', true);
    addEvent({ text: "你收到了一张邀请函：『格蕾塔的飨宴』。餐桌上的食物精美得不可思议，但你注意到其他客人的眼神逐渐变得空洞。当你意识到那些『食材』的来源时，已经太晚了。", effect: "trap", effText: "体质-1，意志-2", major: true, milestone: "格蕾塔的飨宴" });
    addMilestone("格蕾塔的飨宴");
    modAttr('con', -1);
    modAttr('wil', -2);
  }

  // 不莱梅 - 音乐家
  if (age >= 18 && age <= 50 && !getFlag('bremen_music') && chance(0.025)) {
    setFlag('bremen_music', true);
    addEvent({ text: "街头传来不协调的乐声——驴叫、犬吠、猫叫与鸡啼以某种诡异的方式组合成旋律。不莱梅的乐队从巷口走出，每个成员都戴着动物面具。『不来听听我们的演奏吗？』", effect: "music", effText: "意志-1，智力+1", major: true, milestone: "不莱梅乐队" });
    addMilestone("不莱梅乐队");
    modAttr('wil', -1);
    modAttr('int', 1);
  }
}

// =============================
// 设置与成就系统
// =============================
let gameSettings = {
  mode: 'normal', // normal, free, notalent
  fastSkip: false,
};

function setGameMode(mode) {
  gameSettings.mode = mode;
}

function updateSetting(key, value) {
  gameSettings[key] = value;
}

function showSettings() {
  hideAllPhases();
  showPhase('phase-settings');
}

function showAchievements() {
  hideAllPhases();
  showPhase('phase-achievements');
  renderAchievements();
}

function backToTitle() {
  hideAllPhases();
  showPhase('phase-title');
}

function renderAchievements() {
  const container = document.getElementById('achievement-list');
  const rarityColors = { common: '#7a7a7a', rare: '#4a7fb5', epic: '#9b59b6', legend: '#f1c40f' };
  const rarityLabels = { common: '普通', rare: '稀有', epic: '史诗', legend: '传说' };

  let html = `<div style="margin-bottom:16px;color:#7a6f5a;text-align:center;font-size:0.9rem;">点击成就查看设定词条</div>`;
  for (const ach of ACHIEVEMENTS) {
    const unlocked = gameState && gameState.milestones && checkAchievement(ach, gameState);
    const color = rarityColors[ach.rarity] || '#7a7a7a';
    const label = rarityLabels[ach.rarity] || '普通';
    const opacity = unlocked ? '1' : '0.35';
    const lockIcon = unlocked ? '&#10022;' : '&#128274;';
    const loreHtml = ach.lore ? ach.lore.replace(/"/g, '&quot;') : '';
    html += `
      <div class="achievement-card" data-lore="${loreHtml}" data-name="${ach.name}" data-color="${color}" onclick="toggleAchievementLore(this)" style="padding:12px;margin:8px 0;background:#111;border:1px solid ${color};border-radius:6px;opacity:${opacity};cursor:pointer;transition:opacity 0.2s;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-weight:bold;color:${color};">${lockIcon} ${ach.name}</span>
          <span style="font-size:0.8rem;color:${color};">${label}</span>
        </div>
        <div style="color:#b8a99a;font-size:0.9rem;margin-top:4px;">${ach.desc}</div>
        <div class="achievement-lore" style="display:none;margin-top:8px;padding:8px;background:#1a0a0a;border-left:3px solid ${color};border-radius:0 4px 4px 0;color:#c8b898;font-size:0.85rem;line-height:1.6;"></div>
      </div>
    `;
  }
  container.innerHTML = html || '<div style="color:#7a6f5a;text-align:center;padding:20px;">暂无已解锁的成就</div>';
}

function toggleAchievementLore(el) {
  const lore = el.dataset.lore;
  const name = el.dataset.name;
  const color = el.dataset.color;
  const loreDiv = el.querySelector('.achievement-lore');
  if (!loreDiv) return;
  if (loreDiv.style.display === 'block') {
    loreDiv.style.display = 'none';
    loreDiv.innerHTML = '';
  } else {
    // Close other open lore panels
    document.querySelectorAll('.achievement-lore').forEach(d => { d.style.display = 'none'; d.innerHTML = ''; });
    loreDiv.style.display = 'block';
    loreDiv.innerHTML = `<div style="font-weight:bold;color:${color};margin-bottom:4px;">&#10022; ${name} — 设定词条 &#10022;</div>${lore}`;
  }
}

function checkAchievement(ach, gs) {
  if (!ach.condition) return false;
  return ach.condition(gs);
}

</script>
