<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都市指令生成器 | Urban Prescript Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    
    <div class="floating-lyrics" id="floatingLyrics"></div>

    <main class="container">
        <header class="header">
            <div class="header-border top"></div>
            <h1 class="title">
                <span class="title-main">都市指令</span>
                <span class="title-sub">URBAN PRESCRIPT</span>
            </h1>
            <div class="header-decoration">
                <span class="decoration-line"></span>
                <span class="decoration-symbol">&#10022;</span>
                <span class="decoration-line"></span>
            </div>
            <p class="subtitle">唯一的准则 即是谨遵指令之意</p>
            <div class="header-border bottom"></div>
        </header>

        <section class="generator-section">
            <div class="receive-button-container">
                <button class="receive-btn" id="receiveBtn">
                    <span class="btn-border"></span>
                    <span class="btn-text">Click to Receive</span>
                    <span class="btn-glow"></span>
                </button>
            </div>

            <div class="card-container" id="cardContainer">
                <div class="prescript-card" id="prescriptCard">
                    <div class="card-frame">
                        <div class="card-corner tl"></div>
                        <div class="card-corner tr"></div>
                        <div class="card-corner bl"></div>
                        <div class="card-corner br"></div>
                        
                        <div class="card-header">
                            <span class="card-id" id="cardId">NO.000</span>
                            <span class="card-seal">&#10022;</span>
                        </div>
                        
                        <div class="card-body">
                            <div class="card-prefix" id="cardPrefix">致都市的子民……</div>
                            <div class="card-content" id="cardContent"></div>
                            <div class="card-suffix" id="cardSuffix"></div>
                        </div>
                        
                        <div class="card-footer">
                            <div class="footer-line"></div>
                            <span class="footer-text">食指代行者 · The Index</span>
                            <div class="footer-line"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-buttons" id="actionButtons" style="display: none;">
                <button class="action-btn copy-btn" id="copyBtn">
                    <span>复制指令</span>
                </button>
                <button class="action-btn new-btn" id="newBtn">
                    <span>再次接收</span>
                </button>
            </div>
        </section>

        <section class="history-section" id="historySection">
            <h2 class="section-title">
                <span class="section-icon">&#10022;</span>
                历史指令
                <span class="section-icon">&#10022;</span>
            </h2>
            <div class="history-list" id="historyList"></div>
        </section>

        <footer class="footer">
            <div class="footer-quote">
                "Children of the city see only the neon stars"
            </div>
            <div class="footer-quote-cn">
                都市之子目及之处 尽霓虹星光在污水沟之中闪耀
            </div>
            <div class="footer-credit">
                Inspired by Project Moon · Library of Ruina · Limbus Company
            </div>
        </footer>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
